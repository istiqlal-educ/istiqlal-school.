<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة نتائج الامتحانات الاستقلال</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --primary: #1e3a8a;
            --accent: #b45309;
            --success: #059669;
            --danger: #e11d48;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #1e293b;
            --border: #cbd5e1;
        }

        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); padding: 5px; min-height: 100vh; overflow: hidden; }
        .container { max-width: 900px; margin: 5px auto; position: relative; }
        
        #loadingOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8); z-index: 9999; justify-content: center; align-items: center; flex-direction: column;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .main-card { 
            background: var(--card); border-radius: 15px; padding: 12px; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.1); border: 1px solid var(--border);
            position: relative; z-index: 1; width: 100%;
        }
        
        input, select { width: 100%; padding: 8px; border-radius: 8px; border: 2px solid var(--border); background: #f8fafc; outline: none; font-size: 14px; margin-bottom: 8px; text-align: center; }
        .btn { width: 100%; padding: 10px; border-radius: 10px; border: none; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 15px; }
        .btn-primary { background: var(--primary); color: white; }
        
        #resultView { display: none; margin-top: 5px; padding: 5px; border-radius: 10px; background: #fff; }
        
        /* تصغير الجدول ليناسب الشاشة الواحدة */
        .res-table { width: 100%; border-collapse: collapse; table-layout: fixed; border: 1px solid var(--border); margin-top: 8px; }
        .res-table th { 
            background: var(--primary); color: white; padding: 3px 1px; font-size: 9px; border: 1px solid #fff;
            line-height: 1.1; word-wrap: break-word; vertical-align: middle;
        }
        .res-table td { padding: 5px 1px; border: 1px solid #e2e8f0; text-align: center; font-weight: 900; color: #000; font-size: 11px; }

        /* صندوق الملخص في الأسفل مع تصميم مضغوط */
        .summary-box { margin-top: 10px; border: 2px solid var(--primary); background: #f8fafc; border-radius: 8px; font-size: 13px; }
        
        .status-pass-text { color: var(--success) !important; font-weight: 900; }
        .status-fail-text { color: var(--danger) !important; font-weight: 900; }
        .grade-success-color { color: var(--success) !important; font-weight: 900; }

        .dev-footer-simple { text-align: center; margin-top: 15px; padding: 10px; color: #000; font-weight: 700; font-size: 12px; border-top: 1px solid #e2e8f0; }
        
        .school-header h1 { font-size: 20px !important; margin-bottom: 2px !important; }
        .school-header p { font-size: 12px !important; margin: 0 !important; }

        @media print {
            .btn, .search-container, #adminPortal, .dev-footer-simple { display: none !important; }
            #resultView { display: block !important; width: 100%; }
        }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner"></div>
</div>

<div class="container" id="searchSection">
    <div class="main-card">
        <div id="welcomeArea">
            <div class="school-header" style="text-align:center; margin-bottom:10px;">
                <div class="school-icon" style="font-size:30px; color:var(--primary); cursor:pointer;" ondblclick="enterAdmin()"><i class="fas fa-school"></i></div>
                <h1 style="margin: 0; font-weight: 900; color: var(--primary);">منظومة نتائج الاستقلال</h1>
                <p style="color: #64748b; font-weight: 700;">نتائج الامتحانات 2026</p>
            </div>

            <div class="search-container" id="searchBox" style="max-width:400px; margin:0 auto;">
                <label style="font-weight:800; display:block; text-align:center; margin-bottom:5px;">الرقم الوطني للطالبة:</label>
                <input type="number" id="searchID" placeholder="أدخل الرقم هنا...">
                <button class="btn btn-primary" onclick="loadResult()"><i class="fas fa-search"></i> استخراج النتيجة</button>
            </div>
        </div>

        <div id="resultView">
            <div style="text-align: center; margin-bottom: 8px; border-bottom: 1px solid #eee; padding-bottom: 5px;">
                <h2 id="outName" style="margin: 0; font-size: 18px; color: var(--text);"></h2>
                <div id="outYear" style="color: var(--accent); font-weight: 800; font-size: 13px;"></div>
            </div>

            <div id="failMissions" style="display:none; background:#fee2e2; border:1px solid var(--danger); color:#991b1b; padding:8px; border-radius:8px; margin-bottom:8px; text-align:center; font-size:12px; font-weight:900;">
                <div id="failListItems"></div>
            </div>

            <table class="res-table">
                <thead>
                    <tr>
                        <th style="width: 26%;">المادة</th>
                        <th>أعمال</th>
                        <th>صغرى</th>
                        <th>امتحان</th>
                        <th>كبرى</th>
                        <th>المجموع</th>
                    </tr>
                </thead>
                <tbody id="resTbody"></tbody>
            </table>

            <!-- الملخص في مكانه الأصلي تحت الجدول -->
            <div class="summary-box">
                <div id="totalRow" style="display:flex; justify-content:space-between; padding:5px 12px; border-bottom:1px solid #e2e8f0;">
                    <span>المجموع الكلي:</span><span id="outTotalSum" style="font-weight:900; color:var(--primary);"></span>
                </div>
                <div id="percentRow" style="display:flex; justify-content:space-between; padding:5px 12px; border-bottom:1px solid #e2e8f0;">
                    <span>النسبة المئوية:</span><span id="outPercent" style="font-weight:900; color:var(--primary);"></span>
                </div>
                <div style="display:flex; justify-content:space-between; padding:5px 12px;">
                    <span>التقدير العام:</span><span id="outGrade" style="font-weight:900;"></span>
                </div>
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-top:10px;">
                <button class="btn" style="background:#475569; color:white; font-size:13px;" onclick="window.print()"><i class="fas fa-print"></i> طباعة</button>
                <button class="btn" style="background:#e2e8f0; font-size:13px;" onclick="location.reload()">بحث جديد</button>
            </div>
        </div>
        <div class="dev-footer-simple">تم تطويره بواسطة عماد الدين نجم</div>
    </div>
</div>

<!-- بقية الكود البرمجي (Script) والأدمن بدون أي تغيير نهائياً -->
<div class="container" id="adminPortal" style="display:none;">
    <!-- (نفس محتوى الأدمن السابق) -->
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyDKEPjQMKD2lt74sdGM0k7hY2Wb8E-X55g", 
      databaseURL: "https://istiqlal-school-302c8-default-rtdb.firebaseio.com",
      projectId: "istiqlal-school-302c8",
      appId: "1:1037263844752:web:56dc0ba0d346045610a514"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const schoolSubjects = {
        "خامس": ["التاريخ", "التربية الإسلامية", "الجغرافيا", "الحاسوب", "الرياضيات", "العلوم", "الكتابة", "اللغة الإنجليزية", "اللغة العربية"],
        "سادس": ["التاريخ", "التربية الإسلامية", "الجغرافيا", "الحاسوب", "الرياضيات", "العلوم", "الكتابة", "اللغة الإنجليزية", "اللغة العربية"],
        "سابع": ["التاريخ", "التربية الإسلامية", "الجغرافيا", "الحاسوب", "الرياضيات", "العلوم", "الكتابة", "اللغة الإنجليزية", "اللغة العربية"],
        "ثامن": ["التاريخ", "التربية الإسلامية", "الجغرافيا", "الحاسوب", "الرياضيات", "العلوم", "الكتابة", "اللغة الإنجليزية", "اللغة العربية"]
    };

    function enterAdmin() {
        const pass = prompt("رمز المطور:");
        db.ref('settings/dev_pass').once('value', snap => {
            if(String(pass).trim() === String(snap.val()).trim()) {
                document.getElementById('searchSection').style.display='none';
                document.getElementById('adminPortal').style.display='block';
            }
        });
    }

    function loadResult() {
        const sid=document.getElementById('searchID').value;
        if(!sid) return;
        db.ref('students/'+sid).once('value', snap=>{ 
            if(snap.exists()) showData(snap.val()); 
            else { alert("عذراً، الرقم غير مسجل."); location.reload(); }
        });
    }

    function showData(data) {
        document.getElementById('welcomeArea').style.display = 'none';
        document.getElementById('resultView').style.display='block';
        document.getElementById('outName').innerText = data.name;
        document.getElementById('outYear').innerText = "الصف: " + data.year;
        let h=""; let failed=[]; let hasFail=false;
        const sortedKeys = schoolSubjects[data.year] || Object.keys(data.subjects);
        sortedKeys.forEach(k => {
            if(data.subjects[k]) {
                const s = data.subjects[k]; 
                const isFail = s.sum < (s.max/2);
                if(isFail) { hasFail=true; failed.push(k); }
                h+=`<tr><td>${k}</td><td>${s.wG}</td><td>${s.wM}</td><td>${s.eG}</td><td>${s.eM}</td><td style="color:${isFail?'red':'black'}">${s.sum}</td></tr>`;
            }
        });
        document.getElementById('resTbody').innerHTML=h;
        const gradeEl = document.getElementById('outGrade');
        if(hasFail) {
            gradeEl.innerText = "لها دور ثانٍ"; gradeEl.className = "status-fail-text";
            document.getElementById('totalRow').style.display="none"; document.getElementById('percentRow').style.display="none";
            document.getElementById('failMissions').style.display="block"; document.getElementById('failListItems').innerText = "المواد: " + failed.join(' - ');
        } else {
            document.getElementById('totalRow').style.display="flex"; document.getElementById('percentRow').style.display="flex";
            document.getElementById('failMissions').style.display="none";
            document.getElementById('outTotalSum').innerText = data.totalGot + " / " + data.totalMax;
            document.getElementById('outPercent').innerText = data.percent + "%";
            let p=parseFloat(data.percent);
            gradeEl.classList.add('grade-success-color');
            if(p>=85) gradeEl.innerText="ممتاز"; else if(p>=75) gradeEl.innerText="جيد جداً"; else if(p>=65) gradeEl.innerText="جيد"; else gradeEl.innerText="مقبول";
            triggerCelebration();
        }
    }

    function triggerCelebration() {
        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
    }
</script>
</body>
</html>
