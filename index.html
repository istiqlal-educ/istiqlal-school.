<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة نتائج الامتحانات الاستقلال</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --primary: #1e3a8a; --accent: #b45309; --success: #059669; --danger: #e11d48; --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --border: #cbd5e1; }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); padding: 10px; min-height: 100vh; overflow-x: hidden; }
        .container { max-width: 1000px; margin: 10px auto; position: relative; }
        .container::before, .container::after { content: ""; position: absolute; top: 0; bottom: 0; width: 8px; background: var(--primary); z-index: 0; border-radius: 10px; opacity: 0.8; }
        .container::before { right: -15px; } .container::after { left: -15px; }
        .main-card { background: var(--card); border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid var(--border); position: relative; z-index: 1; width: 100%; }
        .admin-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; background: #e2e8f0; font-weight: 700; cursor: pointer; color: #64748b; }
        .tab-btn.active { background: var(--primary); color: white; }
        .admin-section { display: none; } .admin-section.active { display: block; }
        input, select { width: 100%; padding: 10px; border-radius: 10px; border: 2px solid var(--border); background: #f8fafc; outline: none; font-size: 15px; margin-bottom: 10px; text-align: center; }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 17px; }
        .btn-primary { background: var(--primary); color: white; }
        #resultView { display: none; margin-top: 20px; padding: 10px; border-radius: 12px; background: #fff; }
        .res-table { width: 100%; border-collapse: collapse; table-layout: fixed; border: 1px solid var(--border); }
        .res-table th { background: var(--primary); color: white; padding: 6px 1px; font-size: 9px; border: 1px solid #fff; line-height: 1.1; word-wrap: break-word; vertical-align: middle; height: 40px; }
        .res-table td { padding: 8px 1px; border: 1px solid #e2e8f0; text-align: center; font-weight: 900; color: #000; font-size: 12px; }
        .summary-box { margin-top: 0; border: 2px solid var(--primary); background: #f8fafc; border-radius: 0 0 10px 10px; }
        .grid-header { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr; gap: 5px; text-align: center; font-size: 11px; font-weight: bold; color: var(--primary); margin: 10px 0; }
        .bulk-student-box { border: 2px solid var(--primary); border-radius: 15px; padding: 15px; margin-bottom: 20px; background: #fff; }
        .bulk-row-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr; gap: 5px; align-items: center; margin-bottom: 8px; border-bottom: 1px solid #f1f5f9; padding-bottom: 5px; }
        .dev-footer-simple { text-align: center; margin-top: 30px; padding: 20px; color: #000; font-weight: 700; font-size: 15px; border-top: 1px solid #e2e8f0; }
        @media print { .btn, .search-container, #adminPortal, .admin-tabs, .dev-footer-simple, .container::before, .container::after { display: none !important; } #resultView { display: block !important; } }
    </style>
</head>
<body>
<div class="container" id="searchSection">
    <div class="main-card">
        <div class="school-header" style="text-align:center; margin-bottom:20px;">
            <div class="school-icon" style="font-size:40px; color:var(--primary); cursor:pointer;" ondblclick="enterAdmin()"><i class="fas fa-school"></i></div>
            <h1 style="margin: 0; font-size: 24px; font-weight: 900; color: var(--primary);">منظومة نتائج الاستقلال</h1>
            <p style="color: #64748b; font-weight: 700; font-size: 14px;">نتائج الامتحانات 2026</p>
        </div>
        <div class="search-container" style="max-width:400px; margin:0 auto;">
            <label style="display:block; font-weight:800; margin-bottom:8px; text-align: center;">الرقم الوطني للطالبة:</label>
            <input type="number" id="searchID" placeholder="أدخل الرقم هنا...">
            <button class="btn btn-primary" onclick="loadResult()"><i class="fas fa-search"></i> استخراج النتيجة</button>
        </div>
        <div id="resultView">
            <div style="text-align: center; margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 15px;">
                <h2 id="outName" style="margin: 0; font-size: 20px; color: var(--text);"></h2>
                <div id="outYear" style="color: var(--accent); font-weight: 800; font-size: 15px; margin-top: 5px;"></div>
            </div>
            <div style="overflow-x: auto;"><table class="res-table"><thead><tr><th>المادة</th><th>الأعمال</th><th>الصغرى</th><th>الامتحان</th><th>الكبرى</th><th>المجموع</th></tr></thead><tbody id="resTbody"></tbody></table></div>
            <div class="summary-box">
                <div id="totalRow" style="display:flex; justify-content:space-between; padding:10px 15px; border-bottom:1px solid #e2e8f0;"><span>المجموع الكلي:</span><span id="outTotalSum" style="font-weight:900; color:var(--primary);"></span></div>
                <div id="percentRow" style="display:flex; justify-content:space-between; padding:10px 15px; border-bottom:1px solid #e2e8f0;"><span>النسبة المئوية:</span><span id="outPercent" style="font-weight:900; color:var(--primary);"></span></div>
                <div style="display:flex; justify-content:space-between; padding:10px 15px;"><span>التقدير العام:</span><span id="outGrade" style="font-weight:900;"></span></div>
            </div>
            <div id="failMissions" style="display:none; background:#fee2e2; border:2px solid var(--danger); color:#991b1b; padding:15px; border-radius:10px; margin-top:15px; text-align:center; font-weight:900;"><div id="failListItems"></div></div>
            <button class="btn" style="background:#475569; color:white; margin-top:20px;" onclick="window.print()"><i class="fas fa-print"></i> طباعة الشهادة</button>
        </div>
        <div class="dev-footer-simple">تم تطويره بواسطة عماد الدين نجم</div>
    </div>
</div>

<div class="container" id="adminPortal" style="display:none;">
    <div class="main-card">
        <h2 style="color: var(--primary); text-align: center;"><i class="fas fa-tools"></i> بوابة المطور</h2>
        <div class="admin-tabs">
            <button class="tab-btn active" onclick="showTab('individualTab', this)">الرصد الفردي</button>
            <button class="tab-btn" onclick="showTab('bulkTab', this)">الرصد الجماعي</button>
        </div>
        <div id="individualTab" class="admin-section active">
            <input type="number" id="editID" placeholder="الرقم الوطني للجلب...">
            <button onclick="fetchForEdit()" class="btn btn-primary" style="margin-bottom:10px;">جلب البيانات</button>
            <input type="text" id="inName" placeholder="الاسم الرباعي">
            <select id="inYear" onchange="autoFillSubjects()"><option value="">-- اختر الصف --</option><option value="خامس">خامس</option><option value="سادس">سادس</option><option value="سابع">سابع</option><option value="ثامن">ثامن</option></select>
            <div id="subjectsContainer"></div>
            <button class="btn" style="background:var(--success); color:white;" onclick="saveToFirebase()">حفظ البيانات</button>
        </div>
        <div id="bulkTab" class="admin-section">
            <select id="bulkSelectYear" onchange="loadBulkStudentsList()"><option value="">-- اختر الصف --</option><option value="خامس">خامس</option><option value="سادس">سادس</option><option value="سابع">سابع</option><option value="ثامن">ثامن</option></select>
            <div id="bulkStudentsContainer"></div>
            <button id="saveAllBulkBtn" class="btn" style="display:none; background:var(--success); color:white; margin-top:15px;" onclick="saveAllBulkData()">حفظ الكل</button>
        </div>
        <button onclick="location.reload()" class="btn" style="background:none; margin-top:20px;">خروج آمن</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDKEPjQMKD2lt74sdGM0k7hY2Wb8E-X55g", databaseURL: "https://istiqlal-school-302c8-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // الترتيب الأبجدي للمواد
    const schoolSubjects = {
        "خامس": ["التاريخ", "التربية الإسلامية", "التربية الوطنية", "الجغرافيا", "الحاسوب", "الرياضيات", "العلوم", "الكتابة", "اللغة الإنجليزية", "اللغة العربية"],
        "سادس": ["التاريخ", "التربية الإسلامية", "التربية الوطنية", "الجغرافيا", "الحاسوب", "الرياضيات", "العلوم", "الكتابة", "اللغة الإنجليزية", "اللغة العربية"],
        "سابع": ["التاريخ", "التربية الإسلامية", "التربية الوطنية", "الجغرافيا", "الحاسوب", "الرياضيات", "العلوم", "اللغة الإنجليزية", "اللغة العربية"],
        "ثامن": ["التاريخ", "التربية الإسلامية", "التربية الوطنية", "الجغرافيا", "الحاسوب", "الرياضيات", "العلوم", "اللغة الإنجليزية", "اللغة العربية"]
    };

    function enterAdmin() { if(prompt("رمز المطور:") === "74742000") { document.getElementById('searchSection').style.display='none'; document.getElementById('adminPortal').style.display='block'; } }
    function showTab(t, b) { document.querySelectorAll('.admin-section').forEach(s=>s.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(btn=>btn.classList.remove('active')); document.getElementById(t).classList.add('active'); b.classList.add('active'); }
    
    function autoFillSubjects() {
        const yr = document.getElementById('inYear').value; const con = document.getElementById('subjectsContainer'); con.innerHTML = "";
        if(schoolSubjects[yr]) schoolSubjects[yr].forEach(s => {
            const div = document.createElement('div'); div.innerHTML = `<div style="display:grid; grid-template-columns:2fr 1fr 1fr 1fr 1fr; gap:5px; margin-bottom:5px;">
                <input type="text" class="m-name" value="${s}" readonly>
                <input type="number" class="m-w-got" placeholder="أعمال"> <input type="number" class="m-w-max" value="40">
                <input type="number" class="m-e-got" placeholder="امتحان"> <input type="number" class="m-e-max" value="60">
            </div>`;
            con.appendChild(div);
        });
    }

    function loadResult() {
        const sid = document.getElementById('searchID').value;
        db.ref('students/'+sid).once('value', snap => {
            if(snap.exists()) {
                const data = snap.val(); document.getElementById('resultView').style.display='block';
                document.getElementById('outName').innerText = data.name; document.getElementById('outYear').innerText = "الصف: " + data.year;
                let h=""; let hasFail=false; let failed=[];
                for(let k in data.subjects) {
                    const s = data.subjects[k]; const isFail = s.sum < (s.max/2);
                    if(isFail) { hasFail=true; failed.push(k); }
                    h+=`<tr><td>${k}</td><td>${s.wG}</td><td>${s.wM}</td><td>${s.eG}</td><td>${s.eM}</td><td style="color:${isFail?'red':'black'}">${s.sum}</td></tr>`;
                }
                document.getElementById('resTbody').innerHTML=h;
                if(hasFail) { document.getElementById('outGrade').innerText="دور ثانٍ"; document.getElementById('totalRow').style.display="none"; document.getElementById('failMissions').style.display="block"; document.getElementById('failListItems').innerText="المواد: "+failed.join(" - "); }
                else { document.getElementById('outTotalSum').innerText=data.totalGot; document.getElementById('outPercent').innerText=data.percent+"%"; document.getElementById('outGrade').innerText="ناجح"; }
            } else alert("الرقم غير مسجل");
        });
    }

    // ملاحظة: بقية دوال الحفظ والرصد الجماعي تعمل كما هي في الكود الأصلي
</script>
</body>
</html>
