<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الاستقلال الأكاديمي | الاستعلام الذكي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --primary: #1e40af; --accent: #10b981; --bg: #f1f5f9; 
            --glass: rgba(255, 255, 255, 0.95); --text-main: #0f172a;
        }

        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { 
            margin: 0; background: var(--bg); color: var(--text-main); 
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px; padding: 20px;
        }

        .container { max-width: 900px; margin: 40px auto; }

        /* الواجهة الاحترافية */
        .glass-card { 
            background: var(--glass); backdrop-filter: blur(10px);
            border-radius: 30px; padding: 40px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255,255,255,0.3);
            position: relative; overflow: hidden;
        }

        .glass-card::before {
            content: ''; position: absolute; top: 0; right: 0; width: 100%; height: 6px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
        }

        .hero-section { text-align: center; margin-bottom: 40px; }
        .hero-section i { 
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-size: 60px; margin-bottom: 15px;
        }

        /* حقول الإدخال المطورة */
        .input-group { position: relative; margin-bottom: 25px; }
        .input-group label { display: block; font-weight: 800; margin-bottom: 10px; color: #475569; font-size: 14px; }
        .input-group input { 
            width: 100%; padding: 18px 25px; border-radius: 16px; border: 2px solid #e2e8f0;
            font-size: 18px; font-weight: 700; transition: all 0.3s; background: #f8fafc;
        }
        .input-group input:focus { border-color: var(--primary); background: #fff; outline: none; box-shadow: 0 0 0 5px rgba(30,64,175,0.1); }

        .btn-modern { 
            width: 100%; padding: 18px; border-radius: 16px; border: none;
            background: var(--text-main); color: white; font-weight: 900;
            font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); transition: 0.3s;
        }
        .btn-modern:hover { transform: translateY(-3px); background: #000; box-shadow: 0 15px 30px rgba(0,0,0,0.2); }

        /* عرض النتيجة - كأنه لوحة بيانات */
        #resultView { display: none; margin-top: 40px; animation: fadeIn 0.6s ease; }
        .student-header { 
            display: flex; align-items: center; justify-content: space-between;
            padding: 25px; background: #f8fafc; border-radius: 20px; margin-bottom: 25px;
            border-right: 8px solid var(--primary);
        }

        .res-table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        .res-table th { padding: 15px; color: #64748b; font-size: 12px; text-transform: uppercase; font-weight: 900; }
        .res-table td { background: white; padding: 20px; border-top: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9; }
        .res-table tr td:first-child { border-right: 1px solid #f1f5f9; border-radius: 0 15px 15px 0; font-weight: 900; color: var(--primary); }
        .res-table tr td:last-child { border-left: 1px solid #f1f5f9; border-radius: 15px 0 0 15px; }

        .badge-percent {
            background: linear-gradient(135deg, #eff6ff, #dbeafe);
            padding: 30px; border-radius: 25px; text-align: center; margin-top: 25px;
        }
        .percent-val { font-size: 55px; font-weight: 900; color: var(--primary); display: block; line-height: 1; }

        /* لوحة المطور - Dark Mode Style */
        #adminPortal { display: none; }
        .admin-card { background: #1e293b; color: white; border-radius: 30px; padding: 35px; }
        .admin-card input, .admin-card select { background: #334155; border-color: #475569; color: white; }
        .admin-card label { color: #94a3b8; }
        
        .subject-row { background: #334155; padding: 20px; border-radius: 15px; margin-bottom: 15px; border-right: 5px solid var(--accent); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        footer { text-align: center; margin-top: 50px; color: #94a3b8; font-size: 14px; font-weight: 600; }
    </style>
</head>
<body>

<div class="container" id="searchSection">
    <div class="glass-card">
        <div class="hero-section">
            <i class="fas fa-shield-halved" ondblclick="enterAdmin()"></i>
            <h1 style="margin:0; font-weight:900; letter-spacing:-1px;">بوابة مدرسة الاستقلال</h1>
            <p style="color:#64748b; font-weight:600;">نظام الاستعلام الأكاديمي الموحد</p>
        </div>

        <div class="input-group">
            <label>سجل الرقم الوطني للطالب</label>
            <input type="number" id="searchID" placeholder="مثال: 119900000000">
        </div>

        <button class="btn-modern" onclick="loadResult()">
            <span>فحص البيانات</span>
            <i class="fas fa-arrow-left"></i>
        </button>

        <div id="resultView">
            <div class="student-header">
                <div>
                    <div style="font-size:12px; color:#64748b; font-weight:800;">اسم الطالب</div>
                    <div id="outName" style="font-size:22px; font-weight:900;">--</div>
                </div>
                <div style="text-align:left">
                    <div style="font-size:12px; color:#64748b; font-weight:800;">السنة الدراسية</div>
                    <div id="outYear" style="font-size:18px; font-weight:900; color:var(--primary);">--</div>
                </div>
            </div>

            <table class="res-table">
                <thead>
                    <tr>
                        <th>المادة</th>
                        <th>أعمال</th>
                        <th>أعمال (من)</th>
                        <th>امتحان</th>
                        <th>امتحان (من)</th>
                        <th>المجموع</th>
                    </tr>
                </thead>
                <tbody id="resTbody"></tbody>
            </table>

            <div class="badge-percent">
                <span id="outGrade" style="font-weight:900; font-size:20px;">--</span>
                <span class="percent-val" id="outPercent">0%</span>
                <div style="color:#64748b; font-weight:700; margin-top:10px;">النسبة المئوية العامة</div>
            </div>
        </div>
    </div>
</div>

<div class="container" id="adminPortal">
    <div class="admin-card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h2 style="margin:0"><i class="fas fa-code" style="color:var(--accent)"></i> لوحة التحكم</h2>
            <button onclick="location.reload()" style="background:#ef4444; border:none; color:white; padding:8px 20px; border-radius:10px; cursor:pointer; font-weight:bold;">خروج آمن</button>
        </div>

        <div class="input-group">
            <label>الاسم الرباعي</label>
            <input type="text" id="inName">
        </div>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
            <div class="input-group">
                <label>الرقم الوطني</label>
                <input type="number" id="inID">
            </div>
            <div class="input-group">
                <label>الصف</label>
                <select id="inYear" style="width:100%; padding:18px; border-radius:16px; background:#334155; color:white; border:none;">
                    <option>سادس</option><option>سابع</option><option>ثامن</option>
                </select>
            </div>
        </div>

        <div id="subjectsContainer"></div>
        
        <button onclick="addNewSubject()" style="background:transparent; color:#94a3b8; border:2px dashed #475569; width:100%; padding:15px; border-radius:16px; cursor:pointer; margin-bottom:25px; font-weight:bold;">+ إضافة سجل مادة</button>
        
        <button class="btn-modern" style="background:var(--accent)" onclick="saveToFirebase()">
            <i class="fas fa-cloud-upload-alt"></i>
            <span>اعتماد وترحيل البيانات</span>
        </button>
    </div>
</div>

<footer>حقوق النظام محفوظة لـ عماد الدين نجم &copy; 2026</footer>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyDKEPjQMKD2lt74sdGM0k7hY2Wb8E-X55g", 
      databaseURL: "https://istiqlal-school-302c8-default-rtdb.firebaseio.com",
      projectId: "istiqlal-school-302c8",
      appId: "1:1037263844752:web:56dc0ba0d346045610a514"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function enterAdmin() {
        if(prompt("النظام يتطلب رمز وصول:") === "74742000") {
            document.getElementById('searchSection').style.display = 'none';
            document.getElementById('adminPortal').style.display = 'block';
            if(document.querySelectorAll('.subject-row').length === 0) addNewSubject();
        }
    }

    function addNewSubject(val = {n:'', wg:'', wm:'', eg:'', em:''}) {
        const div = document.createElement('div');
        div.className = 'subject-row';
        div.innerHTML = `
            <input type="text" class="m-name" placeholder="اسم المادة" value="${val.n}" style="width:100%; margin-bottom:10px;">
            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap:10px;">
                <input type="number" class="m-w-got" placeholder="أعمال" value="${val.wg}">
                <input type="number" class="m-w-max" placeholder="من" value="${val.wm}">
                <input type="number" class="m-e-got" placeholder="نهائي" value="${val.eg}">
                <input type="number" class="m-e-max" placeholder="من" value="${val.em}">
            </div>`;
        document.getElementById('subjectsContainer').appendChild(div);
    }

    function saveToFirebase() {
        const id = document.getElementById('inID').value;
        const name = document.getElementById('inName').value;
        const year = document.getElementById('inYear').value;
        if(!id || !name) return alert("خطأ: يرجى إدخال البيانات الأساسية");
        let subjects = {}; let tS = 0, tM = 0;
        document.querySelectorAll('.subject-row').forEach(row => {
            const n = row.querySelector('.m-name').value;
            const wg = parseFloat(row.querySelector('.m-w-got').value)||0;
            const wm = parseFloat(row.querySelector('.m-w-max').value)||0;
            const eg = parseFloat(row.querySelector('.m-e-got').value)||0;
            const em = parseFloat(row.querySelector('.m-e-max').value)||0;
            if(n) { subjects[n] = {wg, wm, eg, em, sum:(wg+eg)}; tS+=(wg+eg); tM+=(wm+em); }
        });
        const p = (tS/tM)*100;
        const g = p>=85?'ممتاز':p>=75?'جيد جداً':p>=65?'جيد':p>=50?'مقبول':'ضعيف';
        db.ref('students/'+id).set({name, year, subjects, percent:p.toFixed(1), gradeText:g})
        .then(()=>alert("تم الترحيل بنجاح"));
    }

    function loadResult() {
        const id = document.getElementById('searchID').value;
        if(!id) return alert("أدخل الرقم الوطني");
        
        db.ref('students/'+id).once('value', snap => {
            const data = snap.val();
            if(data) {
                document.getElementById('resultView').style.display = 'block';
                document.getElementById('outName').innerText = data.name;
                document.getElementById('outYear').innerText = data.year;
                document.getElementById('outPercent').innerText = data.percent + "%";
                document.getElementById('outGrade').innerText = data.gradeText;
                
                let h = "";
                for(let k in data.subjects) {
                    const s = data.subjects[k];
                    h += `<tr><td>${k}</td><td>${s.wg}</td><td>${s.wm}</td><td>${s.eg}</td><td>${s.em}</td><td style="font-weight:900; color:var(--accent)">${s.sum}</td></tr>`;
                }
                document.getElementById('resTbody').innerHTML = h;
                window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'});
            } else alert("الرقم الوطني غير مسجل بالنظام");
        });
    }
</script>
</body>
</html>
