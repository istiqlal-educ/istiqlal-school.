<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة مدرسة الاستقلال</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root { --primary: #1e3a8a; --accent: #b45309; --success: #059669; --danger: #e11d48; --bg: #f8fafc; }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { margin: 0; background: var(--bg); color: #1e293b; padding: 10px; }
        
        .main-card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); max-width: 1000px; margin: auto; }
        
        /* تنسيق الجدول الأساسي للشهادة */
        .res-table { width: 100%; border-collapse: collapse; margin-top: 15px; border: 2px solid #000; }
        .res-table th { background: #f1f5f9; border: 1px solid #000; padding: 5px; font-size: 11px; font-weight: 900; color: #000; text-align: center; }
        .res-table td { border: 1px solid #000; padding: 8px 4px; text-align: center; font-weight: 700; font-size: 13px; color: #000; }
        .score-box { font-size: 10px; color: #444; display: block; border-top: 1px solid #ddd; margin-top: 2px; }

        /* تنسيق حقول الإدخال في المنظومة */
        input, select, textarea { width: 100%; padding: 10px; border: 2px solid #cbd5e1; border-radius: 8px; font-weight: 700; text-align: center; margin-bottom: 10px; }
        .btn { cursor: pointer; border: none; padding: 12px; border-radius: 10px; font-weight: 900; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        
        .admin-tabs { display: flex; gap: 5px; margin-bottom: 20px; overflow-x: auto; }
        .tab-btn { flex: 1; padding: 10px; background: #e2e8f0; border-radius: 8px; font-weight: 700; border: none; cursor: pointer; min-width: 100px; }
        .tab-btn.active { background: var(--primary); color: white; }

        /* تنسيق الرصد الجماعي ليصبح واضحاً */
        .bulk-row { background: #fff; border: 2px solid var(--primary); padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        .grid-header { display: grid; grid-template-columns: 2fr repeat(8, 1fr) 1fr; gap: 5px; font-size: 10px; font-weight: 900; text-align: center; background: #eee; padding: 5px; border-radius: 5px; }
        .grid-inputs { display: grid; grid-template-columns: 2fr repeat(8, 1fr) 1fr; gap: 5px; margin-top: 5px; }
        .grid-inputs input { padding: 5px 2px; font-size: 11px; margin-bottom: 0; border: 1px solid #94a3b8; }

        #loadingOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; }
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media print {
            .no-print { display: none !important; }
            body { padding: 0; background: white; }
            .main-card { box-shadow: none; border: none; width: 100%; max-width: 100%; }
        }
    </style>
</head>
<body>

<div id="loadingOverlay"><div class="spinner"></div><p>جاري المعالجة...</p></div>

<div class="main-card no-print" id="searchUI">
    <div style="text-align:center;">
        <img src="1000255629.jpg" ondblclick="showLogin()" style="width:100px; cursor:pointer;">
        <h1 style="color:var(--primary); margin:10px 0;">مدرسة الاستقلال للتعليم الأساسي</h1>
        <p style="font-weight:700;">منظومة استخراج النتائج 2026</p>
    </div>
    
    <div style="max-width:400px; margin:20px auto;">
        <label style="display:block; margin-bottom:5px; font-weight:900;">الرقم الوطني للطالبة:</label>
        <input type="number" id="searchID" placeholder="أدخل الرقم هنا...">
        <button class="btn btn-primary" onclick="loadStudentResult()"><i class="fas fa-search"></i> عرض الشهادة</button>
    </div>
</div>

<!-- واجهة الشهادة (النتيجة) -->
<div class="main-card" id="resultView" style="display:none;">
    <div style="text-align:center; border-bottom:3px solid var(--primary); padding-bottom:10px;">
        <h2 id="outName" style="margin:0; color:var(--primary);"></h2>
        <p id="outYear" style="margin:5px 0; font-weight:900; color:var(--accent);"></p>
    </div>

    <table class="res-table">
        <thead>
            <tr>
                <th rowspan="2" style="width:20%">المادة</th>
                <th colspan="2">الفصل الأول</th>
                <th colspan="2">الفصل الثاني</th>
                <th rowspan="2">المجموع</th>
                <th rowspan="2">الدرجة الكبرى</th>
                <th rowspan="2">درجة النجاح</th>
                <th rowspan="2">النتيجة</th>
            </tr>
            <tr>
                <th>أعمال / من</th>
                <th>امتحان / من</th>
                <th>أعمال / من</th>
                <th>امتحان / من</th>
            </tr>
        </thead>
        <tbody id="resBody"></tbody>
    </table>

    <div style="margin-top:15px; border:2px solid #000; padding:10px; border-radius:10px;">
        <div style="display:flex; justify-content:space-between; font-weight:900; margin-bottom:5px;">
            <span>المجموع الكلي:</span> <span id="finalTotal"></span>
        </div>
        <div style="display:flex; justify-content:space-between; font-weight:900; margin-bottom:5px;">
            <span>النسبة المئوية:</span> <span id="finalPercent"></span>
        </div>
        <div style="display:flex; justify-content:space-between; font-weight:900;">
            <span>التقدير العام:</span> <span id="finalGrade"></span>
        </div>
    </div>

    <div id="failPanel" style="display:none; background:#fee2e2; border:2px solid var(--danger); padding:10px; margin-top:10px; border-radius:10px; text-align:center; font-weight:900;">
        <p style="margin:0; color:var(--danger);">مواد الدور الثاني:</p>
        <p id="failList" style="margin:5px 0;"></p>
    </div>

    <div class="no-print" style="margin-top:20px; display:grid; grid-template-columns:1fr 1fr; gap:10px;">
        <button class="btn" style="background:#475569; color:white;" onclick="window.print()">طباعة الشهادة</button>
        <button class="btn" style="background:#e2e8f0;" onclick="location.reload()">بحث جديد</button>
    </div>
</div>

<!-- واجهة المطور -->
<div class="main-card no-print" id="adminPanel" style="display:none;">
    <h2 style="text-align:center; color:var(--primary);"><i class="fas fa-user-shield"></i> لوحة التحكم</h2>
    
    <div class="admin-tabs">
        <button class="tab-btn active" onclick="switchTab('single')">رصد فردي</button>
        <button class="tab-btn" onclick="switchTab('bulk')">رصد جماعي</button>
        <button class="tab-btn" onclick="switchTab('add')">إضافة طالبات</button>
    </div>

    <!-- الرصد الفردي -->
    <div id="tab-single" class="tab-content">
        <input type="number" id="editID" placeholder="الرقم الوطني للبحث...">
        <button class="btn btn-primary" onclick="fetchStudentForEdit()">جلب بيانات الطالبة</button>
        <hr>
        <input type="text" id="inName" placeholder="الاسم الكامل">
        <select id="inYear" onchange="generateSubjectInputs()">
            <option value="">-- اختر الصف --</option>
            <option value="خامس">خامس</option><option value="سادس">سادس</option>
            <option value="سابع">سابع</option><option value="ثامن">ثامن</option>
        </select>
        <div id="singleSubjectsArea"></div>
        <button class="btn" style="background:var(--success); color:white; margin-top:10px;" onclick="saveSingleStudent()">حفظ البيانات</button>
    </div>

    <!-- الرصد الجماعي -->
    <div id="tab-bulk" class="tab-content" style="display:none;">
        <select id="bulkYear" onchange="loadBulkList()">
            <option value="">-- اختر الصف --</option>
            <option value="خامس">خامس</option><option value="سادس">سادس</option>
            <option value="سابع">سابع</option><option value="ثامن">ثامن</option>
        </select>
        <div id="bulkArea"></div>
        <button class="btn" style="background:var(--success); color:white; margin-top:15px;" onclick="saveBulkAll()">حفظ جميع التغييرات</button>
    </div>

    <!-- إضافة طالبات -->
    <div id="tab-add" class="tab-content" style="display:none;">
        <select id="addYear">
            <option value="">-- اختر الصف --</option>
            <option value="خامس">خامس</option><option value="سادس">سادس</option>
            <option value="سابع">سابع</option><option value="ثامن">ثامن</option>
        </select>
        <textarea id="addList" rows="10" placeholder="الاسم - الرقم الوطني (كل طالبة في سطر)"></textarea>
        <button class="btn btn-primary" onclick="processQuickAdd()">إضافة للمنظومة</button>
    </div>

    <button class="btn" style="margin-top:20px; background:#eee;" onclick="location.reload()">خروج</button>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDKEPjQMKD2lt74sdGM0k796icnyFTmmIQ",
    authDomain: "istiqlal-school-302c8.firebaseapp.com",
    databaseURL: "https://istiqlal-school-302c8-default-rtdb.firebaseio.com",
    projectId: "istiqlal-school-302c8",
    storageBucket: "istiqlal-school-302c8.firebasestorage.app",
    messagingSenderId: "1037263844752",
    appId: "1:1037263844752:web:56dc0badd84262b5e3ef15"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const subjectsMap = {
    "خامس": ["التربية الإسلامية", "اللغة العربية", "الرياضيات", "العلوم", "اللغة الإنجليزية", "الاجتماعيات", "الحاسوب", "الكتابة"],
    "سادس": ["التربية الإسلامية", "اللغة العربية", "الرياضيات", "العلوم", "اللغة الإنجليزية", "الاجتماعيات", "الحاسوب", "الكتابة"],
    "سابع": ["التربية الإسلامية", "اللغة العربية", "الرياضيات", "العلوم", "اللغة الإنجليزية", "التاريخ", "الجغرافيا", "الحاسوب", "الكتابة"],
    "ثامن": ["التربية الإسلامية", "اللغة العربية", "الرياضيات", "العلوم", "اللغة الإنجليزية", "التاريخ", "الجغرافيا", "الحاسوب", "الكتابة"]
};

// وظائف التنقل
function switchTab(t) {
    document.querySelectorAll('.tab-content').forEach(c => c.style.display='none');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-'+t).style.display='block';
    event.currentTarget.classList.add('active');
}

function showLogin() {
    let p = prompt("أدخل رمز المطور:");
    if(p === "7474") {
        document.getElementById('searchUI').style.display='none';
        document.getElementById('adminPanel').style.display='block';
    }
}

// عرض النتيجة للطالب
function loadStudentResult() {
    let id = document.getElementById('searchID').value;
    if(!id) return;
    document.getElementById('loadingOverlay').style.display='flex';
    db.ref('students/'+id).once('value', snap => {
        document.getElementById('loadingOverlay').style.display='none';
        if(!snap.exists()) return alert("الرقم غير مسجل");
        renderCertificate(snap.val());
    });
}

function renderCertificate(data) {
    document.getElementById('searchUI').style.display='none';
    document.getElementById('resultView').style.display='block';
    document.getElementById('outName').innerText = data.name;
    document.getElementById('outYear').innerText = "نتيجة الصف " + data.year;

    let html = ""; let hasFail = false; let fails = [];
    let subList = subjectsMap[data.year] || Object.keys(data.subjects);

    subList.forEach(sName => {
        let s = data.subjects[sName] || {wG1:0, wm1:20, eG1:0, em1:30, wG2:0, wm2:20, eG2:0, em2:30};
        let total = (s.wG1||0) + (s.eG1||0) + (s.wG2||0) + (s.eG2||0);
        let max = (s.wm1||20) + (s.em1||30) + (s.wm2||20) + (s.em2||30);
        let passMark = max / 2;
        let isF = total < passMark;
        if(isF) { hasFail = true; fails.push(sName); }

        html += `<tr>
            <td style="text-align:right; padding-right:10px;">${sName}</td>
            <td>${s.wG1||0} <span class="score-box">من ${s.wm1||20}</span></td>
            <td>${s.eG1||0} <span class="score-box">من ${s.em1||30}</span></td>
            <td>${s.wG2||0} <span class="score-box">من ${s.wm2||20}</span></td>
            <td>${s.eG2||0} <span class="score-box">من ${s.em2||30}</span></td>
            <td style="color:${isF?'red':'black'}">${total}</td>
            <td>${max}</td>
            <td>${passMark}</td>
            <td style="color:${isF?'red':'green'}">${isF?'ض':'ن'}</td>
        </tr>`;
    });
    
    document.getElementById('resBody').innerHTML = html;
    
    if(hasFail) {
        document.getElementById('finalGrade').innerText = "له دور ثانٍ";
        document.getElementById('finalGrade').style.color = "red";
        document.getElementById('failPanel').style.display = "block";
        document.getElementById('failList').innerText = fails.join(' - ');
        document.getElementById('finalTotal').innerText = "---";
        document.getElementById('finalPercent').innerText = "---";
    } else {
        document.getElementById('finalGrade').style.color = "green";
        document.getElementById('failPanel').style.display = "none";
        document.getElementById('finalTotal').innerText = data.totalGot + " من " + data.totalMax;
        document.getElementById('finalPercent').innerText = data.percent + "%";
        let p = parseFloat(data.percent);
        if(p>=85) document.getElementById('finalGrade').innerText = "ممتاز";
        else if(p>=75) document.getElementById('finalGrade').innerText = "جيد جداً";
        else if(p>=65) document.getElementById('finalGrade').innerText = "جيد";
        else document.getElementById('finalGrade').innerText = "مقبول";
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
    }
}

// وظائف الرصد والمنظومة
function generateSubjectInputs() {
    let yr = document.getElementById('inYear').value;
    let con = document.getElementById('singleSubjectsArea'); con.innerHTML = "";
    if(!subjectsMap[yr]) return;
    
    subjectsMap[yr].forEach(s => {
        let div = document.createElement('div');
        div.className = "bulk-row";
        div.innerHTML = `<label style="font-weight:900; color:var(--primary);">${s}</label>
        <div class="grid-inputs">
            <input type="number" class="wG1" placeholder="أ1"> <input type="number" class="wm1" value="20">
            <input type="number" class="eG1" placeholder="إ1"> <input type="number" class="em1" value="30">
            <input type="number" class="wG2" placeholder="أ2"> <input type="number" class="wm2" value="20">
            <input type="number" class="eG2" placeholder="إ2"> <input type="number" class="em2" value="30">
            <input type="text" placeholder="المادة" value="${s}" hidden>
        </div>`;
        con.appendChild(div);
    });
}

function saveSingleStudent() {
    let id = document.getElementById('newStudentID')?.value || document.getElementById('editID').value;
    let name = document.getElementById('inName').value;
    let yr = document.getElementById('inYear').value;
    if(!id || !name || !yr) return alert("امسح الحقول أولاً");

    let subs = {}; let tG = 0; let tM = 0;
    document.querySelectorAll('#singleSubjectsArea .bulk-row').forEach(row => {
        let n = row.querySelector('label').innerText;
        let w1 = parseFloat(row.querySelector('.wG1').value)||0; let wm1 = parseFloat(row.querySelector('.wm1').value)||20;
        let e1 = parseFloat(row.querySelector('.eG1').value)||0; let em1 = parseFloat(row.querySelector('.em1').value)||30;
        let w2 = parseFloat(row.querySelector('.wG2').value)||0; let wm2 = parseFloat(row.querySelector('.wm2').value)||20;
        let e2 = parseFloat(row.querySelector('.eG2').value)||0; let em2 = parseFloat(row.querySelector('.em2').value)||30;
        let sum = w1+e1+w2+e2; let max = wm1+em1+wm2+em2;
        subs[n] = {wG1:w1, wm1, eG1:e1, em1, wG2:w2, wm2, eG2:e2, em2, sum, max};
        tG += sum; tM += max;
    });

    db.ref('students/'+id).set({name, year:yr, subjects:subs, totalGot:tG, totalMax:tM, percent:((tG/tM)*100).toFixed(1)})
    .then(()=>alert("تم الحفظ بنجاح"));
}

function loadBulkList() {
    let yr = document.getElementById('bulkYear').value;
    let con = document.getElementById('bulkArea'); con.innerHTML = "جاري التحميل...";
    db.ref('students').orderByChild('year').equalTo(yr).once('value', snap => {
        let html = "";
        snap.forEach(child => {
            let s = child.val(); let id = child.key;
            html += `<div class="bulk-row" data-id="${id}">
                <div style="font-weight:900; margin-bottom:10px;">${s.name} (${id})</div>
                <div class="grid-header"><span>المادة</span><span>أ1</span><span>من</span><span>إ1</span><span>من</span><span>أ2</span><span>من</span><span>إ2</span><span>من</span><span>-</span></div>`;
            subjectsMap[yr].forEach(sub => {
                let d = (s.subjects && s.subjects[sub]) ? s.subjects[sub] : {wG1:0, wm1:20, eG1:0, em1:30, wG2:0, wm2:20, eG2:0, em2:30};
                html += `<div class="grid-inputs" data-sub="${sub}">
                    <span style="font-size:9px; font-weight:900;">${sub}</span>
                    <input type="number" class="wG1" value="${d.wG1||0}"> <input type="number" class="wm1" value="${d.wm1||20}">
                    <input type="number" class="eG1" value="${d.eG1||0}"> <input type="number" class="em1" value="${d.em1||30}">
                    <input type="number" class="wG2" value="${d.wG2||0}"> <input type="number" class="wm2" value="${d.wm2||20}">
                    <input type="number" class="eG2" value="${d.eG2||0}"> <input type="number" class="em2" value="${d.em2||30}">
                </div>`;
            });
            html += `</div>`;
        });
        con.innerHTML = html || "لا توجد طالبات في هذا الصف";
    });
}

function saveBulkAll() {
    let yr = document.getElementById('bulkYear').value;
    let updates = {};
    document.querySelectorAll('#bulkArea .bulk-row').forEach(row => {
        let id = row.getAttribute('data-id');
        let name = row.querySelector('div').innerText.split(' (')[0];
        let subs = {}; let tG=0; let tM=0;
        row.querySelectorAll('.grid-inputs').forEach(g => {
            let sub = g.getAttribute('data-sub');
            let w1 = parseFloat(g.querySelector('.wG1').value)||0; let wm1 = parseFloat(g.querySelector('.wm1').value)||20;
            let e1 = parseFloat(g.querySelector('.eG1').value)||0; let em1 = parseFloat(g.querySelector('.em1').value)||30;
            let w2 = parseFloat(g.querySelector('.wG2').value)||0; let wm2 = parseFloat(g.querySelector('.wm2').value)||20;
            let e2 = parseFloat(g.querySelector('.eG2').value)||0; let em2 = parseFloat(g.querySelector('.em2').value)||30;
            let sum = w1+e1+w2+e2; let max = wm1+em1+wm2+em2;
            subs[sub] = {wG1:w1, wm1, eG1:e1, em1, wG2:w2, wm2, eG2:e2, em2, sum, max};
            tG += sum; tM += max;
        });
        updates['students/'+id] = {name, year:yr, subjects:subs, totalGot:tG, totalMax:tM, percent:((tG/tM)*100).toFixed(1)};
    });
    db.ref().update(updates).then(()=>alert("تم تحديث الكل"));
}

function processQuickAdd() {
    let yr = document.getElementById('addYear').value;
    let list = document.getElementById('addList').value.trim().split('\n');
    if(!yr || list.length === 0) return alert("أكمل البيانات");
    let updates = {};
    list.forEach(line => {
        let p = line.split(/[-،,]/);
        if(p.length>=2) {
            let name = p[0].trim(); let id = p[1].trim();
            let subs = {};
            subjectsMap[yr].forEach(s => { subs[s] = {wG1:0, wm1:20, eG1:0, em1:30, wG2:0, wm2:20, eG2:0, em2:30, sum:0, max:100}; });
            updates['students/'+id] = {name, year:yr, subjects:subs, totalGot:0, totalMax:subjectsMap[yr].length*100, percent:"0.0"};
        }
    });
    db.ref().update(updates).then(()=>alert("تمت الإضافة"));
}
</script>

</body>
</html>
