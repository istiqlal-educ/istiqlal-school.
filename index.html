<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة نتائج الامتحانات - مدرسة الاستقلال</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --primary: #1e3a8a;
            --accent: #b45309;
            --success: #059669;
            --danger: #e11d48;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #1e293b;
            --border: #cbd5e1;
        }

        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); padding: 10px; min-height: 100vh; overflow-x: hidden; }
        .container { max-width: 1000px; margin: 10px auto; position: relative; }
        
        #loadingOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8); z-index: 9999; justify-content: center; align-items: center; flex-direction: column;
        }
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .main-card { 
            background: var(--card); border-radius: 20px; padding: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid var(--border);
            position: relative; z-index: 1; width: 100%;
        }
        
        /* تنسيق الشعار الرسمي المختار */
        .school-logo-main {
            width: 180px;
            height: auto;
            margin: 0 auto 15px auto;
            display: block;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .school-logo-main:hover { transform: scale(1.05); }

        .admin-tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { flex: 1; min-width: 120px; padding: 12px; border-radius: 10px; border: none; background: #e2e8f0; font-weight: 700; cursor: pointer; color: #64748b; }
        .tab-btn.active { background: var(--primary); color: white; }

        .admin-section { display: none; }
        .admin-section.active { display: block; }

        input, select { width: 100%; padding: 10px; border-radius: 10px; border: 2px solid var(--border); background: #f8fafc; outline: none; font-size: 15px; margin-bottom: 10px; text-align: center; }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 17px; }
        .btn-primary { background: var(--primary); color: white; }
        
        #resultView { display: none; margin-top: 20px; padding: 10px; border-radius: 12px; background: #fff; }
        
        .res-table { width: 100%; border-collapse: collapse; table-layout: fixed; border: 1px solid var(--border); }
        .res-table th { 
            background: var(--primary); color: white; padding: 8px 2px; font-size: 11px; border: 1px solid #fff;
        }
        .res-table td { padding: 10px 2px; border: 1px solid #e2e8f0; text-align: center; font-weight: 900; color: #000; font-size: 13px; }

        .summary-box { margin-top: 0; border: 2px solid var(--primary); background: #f8fafc; border-radius: 0 0 10px 10px; }
        
        .status-pass-text { color: var(--success) !important; font-weight: 900; }
        .status-fail-text { color: var(--danger) !important; font-weight: 900; }

        .dev-footer-simple { text-align: center; margin-top: 30px; padding: 20px; color: #000; font-weight: 700; font-size: 15px; border-top: 1px solid #e2e8f0; }
        .wish-text-inline { color: #e11d48; font-weight: 800; font-size: 13px; margin-right: 10px; }

        @media print {
            .btn, .search-container, #adminPortal, .admin-tabs, .dev-footer-simple, #backToStatsBtn, .school-header { display: none !important; }
            #resultView { display: block !important; width: 100%; border: none; padding: 0; }
        }
    </style>
</head>
<body>

<div id="loadingOverlay"><div class="spinner"></div></div>

<div class="container" id="searchSection">
    <div class="main-card">
        <div id="welcomeArea">
            <div class="school-header" style="text-align:center; margin-bottom:20px;">
                <img src="https://i.ibb.co/L637WMT/1000255595.jpg" alt="شعار مدرسة الاستقلال" class="school-logo-main" ondblclick="enterAdmin()">
                <h1 style="margin: 0; font-size: 24px; font-weight: 900; color: var(--primary);">مدرسة الإستقلال للتعليم الأساسي</h1>
                <p style="color: #64748b; font-weight: 700; font-size: 14px;">Al-Istiklal School For Basic Education</p>
            </div>

            <div class="search-container" id="searchBox" style="max-width:450px; margin:0 auto;">
                <div style="display: flex; align-items: center; justify-content: center; margin-bottom: 8px;">
                    <label style="font-weight:800; margin-bottom:0;">الرقم الوطني للطالبة:</label>
                    <span class="wish-text-inline">بالتوفيق لجميع طالباتنا</span>
                </div>
                <input type="number" id="searchID" placeholder="أدخل الرقم هنا...">
                <button class="btn btn-primary" onclick="loadResult()"><i class="fas fa-search"></i> استخراج النتيجة</button>
            </div>
        </div>

        <div id="resultView">
            <button id="backToStatsBtn" class="btn" style="background:var(--accent); color:white; margin-bottom:15px; display:none;" onclick="returnToStats()">
                <i class="fas fa-arrow-right"></i> العودة للإحصائيات
            </button>

            <div style="text-align: center; margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 15px;">
                <h2 id="outName" style="margin: 0; font-size: 20px; color: var(--text);"></h2>
                <div id="outYear" style="color: var(--accent); font-weight: 800; font-size: 15px; margin-top: 5px;"></div>
            </div>
            
            <table class="res-table">
                <thead>
                    <tr>
                        <th style="width: 26%;">المادة</th>
                        <th>أعمال</th>
                        <th>النهاية الصغرى</th>
                        <th>امتحان</th>
                        <th>النهاية الكبرى</th>
                        <th>المجموع</th>
                    </tr>
                </thead>
                <tbody id="resTbody"></tbody>
            </table>

            <div class="summary-box">
                <div id="totalRow" style="display:flex; justify-content:space-between; padding:10px 15px; border-bottom:1px solid #e2e8f0;">
                    <span>المجموع الكلي:</span><span id="outTotalSum" style="font-weight:900; color:var(--primary);"></span>
                </div>
                <div id="percentRow" style="display:flex; justify-content:space-between; padding:10px 15px; border-bottom:1px solid #e2e8f0;">
                    <span>النسبة المئوية:</span><span id="outPercent" style="font-weight:900; color:var(--primary);"></span>
                </div>
                <div style="display:flex; justify-content:space-between; padding:10px 15px;">
                    <span>التقدير العام:</span><span id="outGrade" style="font-weight:900;"></span>
                </div>
            </div>
            
            <div id="failMissions" style="display:none; background:#fee2e2; border:2px solid var(--danger); color:#991b1b; padding:15px; border-radius:10px; margin-top:15px; text-align:center; font-weight:900;">
                <div style="margin-bottom:5px; text-decoration:underline;">المواد التي لم توفق فيها:</div>
                <div id="failListItems"></div>
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:20px;">
                <button class="btn" style="background:#475569; color:white;" onclick="window.print()"><i class="fas fa-print"></i> طباعة</button>
                <button class="btn" style="background:#e2e8f0;" onclick="location.reload()">بحث جديد</button>
            </div>
        </div>
        <div class="dev-footer-simple">تم تطويره بواسطة عماد الدين نجم</div>
    </div>
</div>

<div class="container" id="adminPortal" style="display:none;">
    <div class="main-card">
        <h2 style="color: var(--primary); text-align: center;"><i class="fas fa-tools"></i> بوابة المطور</h2>
        <div class="admin-tabs">
            <button class="tab-btn active" onclick="showTab('individualTab', this)">الرصد الفردي</button>
            <button class="tab-btn" onclick="showTab('bulkTab', this)">الرصد الجماعي</button>
        </div>

        <div id="individualTab" class="admin-section active">
            <input type="number" id="newStudentID" placeholder="الرقم الوطني...">
            <input type="text" id="inName" placeholder="الاسم الرباعي">
            <select id="inYear" onchange="autoFillSubjects()">
                <option value="">-- الصف --</option>
                <option value="خامس">خامس</option><option value="سادس">سادس</option>
                <option value="سابع">سابع</option><option value="ثامن">ثامن</option>
            </select>
            <div id="subjectsContainer"></div>
            <button class="btn" style="background: var(--success); color:white;" onclick="saveToFirebase()">حفظ البيانات</button>
        </div>
        <button onclick="location.reload()" class="btn" style="background:none; margin-top:20px;">خروج</button>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyDKEPjQMKD2lt74sdGM0k7hY2Wb8E-X55g", 
      databaseURL: "https://istiqlal-school-302c8-default-rtdb.firebaseio.com",
      projectId: "istiqlal-school-302c8",
      appId: "1:1037263844752:web:56dc0ba0d346045610a514"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const schoolSubjects = {
        "خامس": ["التربية الإسلامية", "الحاسوب", "الرياضيات", "العلوم", "الكتابة", "اللغة الإنجليزية", "الاجتماعيات", "اللغة العربية"],
        "سادس": ["التربية الإسلامية", "الحاسوب", "الرياضيات", "العلوم", "الكتابة", "اللغة الإنجليزية", "الاجتماعيات", "اللغة العربية"],
        "سابع": ["التاريخ", "التربية الإسلامية", "الجغرافيا", "الحاسوب", "الرياضيات", "العلوم", "الكتابة", "اللغة الإنجليزية", "اللغة العربية"],
        "ثامن": ["التاريخ", "التربية الإسلامية", "الجغرافيا", "الحاسوب", "الرياضيات", "العلوم", "الكتابة", "اللغة الإنجليزية", "اللغة العربية"]
    };

    function showTab(tabId, btn) {
        document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btn.classList.add('active');
    }

    function enterAdmin() {
        const pass = prompt("رمز المطور:");
        db.ref('settings/dev_pass').once('value', snap => {
            if(String(pass).trim() === String(snap.val()).trim()) {
                document.getElementById('searchSection').style.display='none';
                document.getElementById('adminPortal').style.display='block';
            }
        });
    }

    function loadResult() {
        const sid=document.getElementById('searchID').value;
        if(!sid) return;
        document.getElementById('loadingOverlay').style.display='flex';
        db.ref('students/'+sid).once('value', snap=>{ 
            document.getElementById('loadingOverlay').style.display='none';
            if(snap.exists()) showData(snap.val()); 
            else { alert("عذراً، الرقم غير مسجل."); location.reload(); }
        });
    }

    function showData(data) {
        document.getElementById('welcomeArea').style.display = 'none';
        document.getElementById('resultView').style.display='block';
        document.getElementById('outName').innerText = data.name;
        document.getElementById('outYear').innerText = "الصف: " + data.year;
        let h=""; let failed=[]; let hasFail=false;
        const sortedKeys = schoolSubjects[data.year] || Object.keys(data.subjects);
        sortedKeys.forEach(k => {
            if(data.subjects[k]) {
                const s = data.subjects[k]; 
                const isFail = s.sum < (s.max/2);
                if(isFail) { hasFail=true; failed.push(k); }
                h+=`<tr><td>${k}</td><td>${s.wG}</td><td>${s.wM}</td><td>${s.eG}</td><td>${s.eM}</td><td style="color:${isFail?'red':'black'}">${s.sum}</td></tr>`;
            }
        });
        document.getElementById('resTbody').innerHTML=h;
        const gradeEl = document.getElementById('outGrade');
        if(hasFail) {
            gradeEl.innerText = "لها دور ثانٍ"; gradeEl.className = "status-fail-text";
            document.getElementById('totalRow').style.display="none"; document.getElementById('percentRow').style.display="none";
            document.getElementById('failMissions').style.display="block"; document.getElementById('failListItems').innerText = failed.join(' - ');
        } else {
            document.getElementById('totalRow').style.display="flex"; document.getElementById('percentRow').style.display="flex";
            document.getElementById('failMissions').style.display="none";
            document.getElementById('outTotalSum').innerText = data.totalGot + " من " + data.totalMax;
            document.getElementById('outPercent').innerText = data.percent + "%";
            let p=parseFloat(data.percent);
            if(p>=85) gradeEl.innerText="ممتاز"; else if(p>=75) gradeEl.innerText="جيد جداً"; else gradeEl.innerText="ناجحة";
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }
    }

    function autoFillSubjects() {
        const yr = document.getElementById('inYear').value;
        const con = document.getElementById('subjectsContainer'); con.innerHTML = ""; 
        if (schoolSubjects[yr]) schoolSubjects[yr].forEach(s => {
            const div = document.createElement('div'); div.innerHTML = `<div style="display:grid; grid-template-columns:2fr 1fr 1fr 1fr 1fr; gap:5px; margin-bottom:5px;">
                <input type="text" value="${s}" readonly> <input type="number" placeholder="أعمال" class="wG"> <input type="number" value="40" class="wM">
                <input type="number" placeholder="امتحان" class="eG"> <input type="number" value="60" class="eM">
            </div>`; con.appendChild(div);
        });
    }

    function saveToFirebase() {
        const id = document.getElementById('newStudentID').value; 
        const name = document.getElementById('inName').value;
        const yr = document.getElementById('inYear').value;
        if(!id || !name || !yr) return alert("أكمل البيانات");
        let subs = {}; let tG=0; let tM=0;
        document.querySelectorAll('#subjectsContainer > div').forEach(div => {
            const n = div.querySelector('input[type="text"]').value;
            const wg = parseFloat(div.querySelector('.wG').value) || 0;
            const wm = parseFloat(div.querySelector('.wM').value) || 0;
            const eg = parseFloat(div.querySelector('.eG').value) || 0;
            const em = parseFloat(div.querySelector('.eM').value) || 0;
            subs[n] = {wG:wg, wM:wm, eG:eg, eM:em, sum:(wg+eg), max:(wm+em)};
            tG+=(wg+eg); tM+=(wm+em);
        });
        db.ref('students/'+id).set({name, year:yr, subjects:subs, totalGot:tG, totalMax:tM, percent:((tG/tM)*100).toFixed(1)})
        .then(()=>alert("تم الحفظ بنجاح"));
    }
</script>
</body>
</html>
