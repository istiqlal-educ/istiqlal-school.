<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة نتائج مدرسة الاستقلال</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --primary: #1e3a8a; --accent: #b45309; --bg: #f1f5f9; --card: #ffffff; --border: #cbd5e1; }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { margin: 0; background: var(--bg); padding: 10px; }
        .container { max-width: 1000px; margin: 10px auto; }
        .main-card { background: var(--card); border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid var(--border); }
        
        /* تنسيق الجدول لمنع التداخل في الموبايل */
        .res-table { width: 100%; border-collapse: collapse; table-layout: fixed; border: 1px solid var(--border); }
        .res-table th { background: var(--primary); color: white; padding: 6px 1px; font-size: 9px; border: 1px solid #fff; line-height: 1.1; word-wrap: break-word; vertical-align: middle; height: 45px; }
        .res-table th:first-child { width: 22%; } 
        .res-table th:nth-child(3) { width: 15%; } 
        .res-table th:nth-child(5) { width: 18%; font-size: 8.5px; } 
        .res-table td { padding: 8px 1px; border: 1px solid #e2e8f0; text-align: center; font-weight: 900; color: #000; font-size: 13px; }

        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid var(--border); margin-bottom: 10px; text-align: center; font-weight: bold; }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 16px; }
        .btn-primary { background: var(--primary); color: white; }
        
        .admin-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; background: #e2e8f0; font-weight: 700; cursor: pointer; }
        .tab-btn.active { background: var(--primary); color: white; }
        .admin-section { display: none; }
        .admin-section.active { display: block; }
    </style>
</head>
<body>

<div class="container" id="searchSection">
    <div class="main-card">
        <div style="text-align:center; margin-bottom:20px;">
            <div class="school-icon" style="font-size:50px; color:var(--primary); cursor:pointer;" 
                 onclick="loginWithBiometrics()" ondblclick="enterAdmin()">
                <i class="fas fa-school"></i>
            </div>
            <h1 style="margin: 5px 0; font-size: 24px; font-weight: 900; color: var(--primary);">منظومة مدرسة الاستقلال</h1>
            <p style="color: #64748b; font-weight: 700;">اضغط مرة للدخول بالبصمة، مرتين للكود</p>
        </div>

        <div style="max-width:400px; margin:0 auto;">
            <input type="number" id="searchID" placeholder="أدخل الرقم الوطني للطالبة">
            <button class="btn btn-primary" onclick="loadResult()"><i class="fas fa-search"></i> استخراج الشهادة</button>
        </div>

        <div id="resultView" style="display:none; margin-top:25px;">
            <h2 id="outName" style="text-align:center; color: var(--primary);"></h2>
            <table class="res-table">
                <thead><tr><th>المادة</th><th>أعمال</th><th>صغرى</th><th>امتحان</th><th>كبرى</th><th>المجموع</th></tr></thead>
                <tbody id="resTbody"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="container" id="adminPortal" style="display:none;">
    <div class="main-card">
        <h2 style="text-align:center;">بوابة الإدارة</h2>
        
        <button class="btn" style="background:orange; color:white; margin-bottom:20px;" onclick="registerPasskey()">
            <i class="fas fa-fingerprint"></i> تفعيل بصمة هذا الجهاز
        </button>

        <div class="admin-tabs">
            <button class="tab-btn active" onclick="showTab('individualTab', this)">رصد فردي</button>
            <button class="tab-btn" onclick="showTab('bulkTab', this)">رصد جماعي</button>
        </div>
        
        <div id="individualTab" class="admin-section active">
            <input type="number" id="editID" placeholder="الرقم الوطني للطالبة">
            <button class="btn" style="background:#475569; color:white; margin-bottom:15px;" onclick="fetchForEdit()">جلب البيانات</button>
            <input type="text" id="inName" placeholder="اسم الطالبة">
            <select id="inYear" onchange="autoFillSubjects()">
                <option value="">-- اختر الصف --</option>
                <option value="خامس">خامس</option><option value="سادس">سادس</option>
                <option value="سابع">سابع</option><option value="ثامن">ثامن</option>
            </select>
            <div id="subjectsContainer"></div>
            <button class="btn btn-primary" onclick="saveToFirebase()">حفظ البيانات</button>
        </div>
        
        <button onclick="location.reload()" class="btn" style="background:none; color:red; margin-top:20px;">خروج</button>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyDKEPjQMKD2lt74sdGM0k7hY2Wb8E-X55g", 
      databaseURL: "https://istiqlal-school-302c8-default-rtdb.firebaseio.com",
      projectId: "istiqlal-school-302c8",
      appId: "1:1037263844752:web:56dc0ba0d346045610a514"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // دالة الدخول بالبصمة
    async function loginWithBiometrics() {
        if (window.PublicKeyCredential) {
            try {
                const credential = await navigator.credentials.get({
                    publicKey: { challenge: new Uint8Array([1, 2, 3, 4]), userVerification: "required" }
                });
                if (credential) { openAdmin(); }
            } catch (err) {
                console.log("البصمة غير مسجلة، جرب الكود السري");
                enterAdmin(); 
            }
        } else { enterAdmin(); }
    }

    // دالة تعريف البصمة للكروم (تُستخدم مرة واحدة)
    async function registerPasskey() {
        try {
            await navigator.credentials.create({
                publicKey: {
                    challenge: new Uint8Array([1, 2, 3, 4]),
                    rp: { name: "مدرسة الاستقلال" },
                    user: { id: new Uint8Array([1]), name: "admin", displayName: "Admin" },
                    pubKeyCredParams: [{ alg: -7, type: "public-key" }],
                    timeout: 60000,
                    authenticatorSelection: { userVerification: "required" }
                }
            });
            alert("تم تفعيل البصمة بنجاح!");
        } catch (err) { alert("خطأ في التفعيل: " + err.message); }
    }

    function enterAdmin() { if(prompt("رمز المطور:") === "74742000") openAdmin(); }
    function openAdmin() { document.getElementById('searchSection').style.display='none'; document.getElementById('adminPortal').style.display='block'; }
    function showTab(t, b) { document.querySelectorAll('.admin-section').forEach(s=>s.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active')); document.getElementById(t).classList.add('active'); b.classList.add('active'); }

    // بقية دوال الرصد والحفظ (التي تعمل عندك سابقاً)
    function autoFillSubjects() {
        const yr = document.getElementById('inYear').value;
        const subjects = ["التاريخ", "التربية الإسلامية", "الجغرافيا", "الحاسوب", "الرياضيات", "العلوم", "الكتابة", "اللغة الإنجليزية", "اللغة العربية"];
        const con = document.getElementById('subjectsContainer'); con.innerHTML = "";
        subjects.forEach(s => {
            const div = document.createElement('div'); div.style="border:1px solid #ddd; padding:10px; margin-bottom:5px; border-radius:10px;";
            div.innerHTML = `<div style="display:grid; grid-template-columns:2fr 1fr 1fr 1fr 1fr; gap:5px;">
                <input type="text" class="m-name" value="${s}" readonly>
                <input type="number" class="m-w-got" placeholder="أعمال">
                <input type="number" class="m-w-max" value="40">
                <input type="number" class="m-e-got" placeholder="امتحان">
                <input type="number" class="m-e-max" value="60">
            </div>`;
            con.appendChild(div);
        });
    }

    function saveToFirebase() {
        const id=document.getElementById('editID').value; const name=document.getElementById('inName').value; const yr=document.getElementById('inYear').value;
        let subs={}; let tS=0; let tM=0;
        document.querySelectorAll('.m-name').forEach((nEl)=>{
            const p=nEl.parentElement;
            const wg=parseFloat(p.querySelector('.m-w-got').value)||0; const wm=parseFloat(p.querySelector('.m-w-max').value)||0;
            const eg=parseFloat(p.querySelector('.m-e-got').value)||0; const em=parseFloat(p.querySelector('.m-e-max').value)||0;
            subs[nEl.value]={wG:wg, wM:wm, eG:eg, eM:em, sum:(wg+eg), max:(wm+em)}; tS+=(wg+eg); tM+=(wm+em);
        });
        db.ref('students/'+id).set({name, year:yr, subjects:subs, percent:((tS/tM)*100).toFixed(1), totalGot:tS, totalMax:tM}).then(()=>alert("تم الحفظ!"));
    }

    function loadResult() {
        const sid=document.getElementById('searchID').value;
        db.ref('students/'+sid).once('value', snap=>{
            if(snap.exists()) {
                const d = snap.val(); document.getElementById('resultView').style.display='block';
                document.getElementById('outName').innerText = d.name;
                let h=""; for(let k in d.subjects){ const s = d.subjects[k]; h+=`<tr><td>${k}</td><td>${s.wG}</td><td>${s.wM}</td><td>${s.eG}</td><td>${s.eM}</td><td>${s.sum}</td></tr>`; }
                document.getElementById('resTbody').innerHTML=h;
            } else alert("الرقم غير مسجل");
        });
    }
</script>
</body>
</html>
