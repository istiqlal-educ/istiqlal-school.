<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة نتائج الامتحانات الاستقلال</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --primary: #1e3a8a;
            --accent: #b45309;
            --success: #059669;
            --danger: #e11d48;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #1e293b;
            --border: #cbd5e1;
        }

        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; transition: 0.2s ease; }
        body { margin: 0; background: var(--bg); color: var(--text); padding: 5px; min-height: 100vh; position: relative; }
        .container { max-width: 950px; margin: 15px auto; position: relative; z-index: 10; }
        .main-card { background: var(--card); border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid var(--border); }
        .school-header { text-align: center; margin-bottom: 25px; }
        .school-icon { font-size: 45px; color: var(--primary); margin-bottom: 8px; cursor: pointer; }
        input, select { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid var(--border); background: #f8fafc; color: var(--text); outline: none; font-size: 16px; margin-bottom: 12px; text-align: center; }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 17px; }
        .btn-primary { background: var(--primary); color: white; }
        #resultView { display: none; margin-top: 20px; padding: 20px; border: 3px solid var(--primary); border-radius: 12px; background: #fff; }
        .res-table { width: 100%; border-collapse: collapse; background: white; }
        .res-table th { background: var(--primary); color: white; padding: 12px 5px; font-size: 11px; border: 1px solid #ddd; }
        .res-table td { padding: 12px 5px; border: 1px solid #eee; text-align: center; font-weight: 900; font-size: 16px; }
        
        /* ستايلات بوابة المطور الجديدة */
        .admin-dashboard { background: #f8fafc; border-radius: 20px; padding: 15px; border: 1px solid var(--border); }
        .admin-card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .bulk-student-row { border: 2px solid #e2e8f0; border-radius: 12px; padding: 15px; margin-bottom: 15px; background: white; }
        .bulk-student-name { font-weight: 900; color: var(--primary); font-size: 18px; margin-bottom: 10px; display: block; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .bulk-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 8px; align-items: center; margin-bottom: 5px; background: #f9fafb; padding: 5px; border-radius: 8px; }
        .bulk-grid label { font-size: 13px; font-weight: 700; color: #475569; }
        .bulk-grid input { margin-bottom: 0; padding: 5px; font-size: 14px; border-radius: 5px; }

        .status-badge { padding: 5px 10px; border-radius: 20px; font-size: 12px; float: left; margin-top: 5px; font-weight: 700; }
        .status-online { background: #dcfce7; color: #166534; }
        .status-offline { background: #fee2e2; color: #991b1b; }

        .dev-footer-simple { text-align: center; margin-top: 30px; padding: 20px; color: #000; font-weight: 700; font-size: 15px; border-top: 1px solid #e2e8f0; }

        @media print {
            .btn, .search-container, .dev-footer-simple, #adminPortal, .school-header { display: none !important; }
            #resultView { display: block !important; width: 100%; border: none; }
        }
    </style>
</head>
<body>

<div class="container" id="searchSection">
    <div class="main-card">
        <div class="school-header">
            <div class="school-icon" ondblclick="enterAdmin()"><i class="fas fa-school"></i></div>
            <h1 style="margin: 0; font-size: 28px; font-weight: 900; color: var(--primary);">منظومة نتائج الاستقلال</h1>
            <p style="color: #64748b; font-weight: 700; font-size: 14px;">نتائج الامتحانات للعام الدراسي 2026</p>
        </div>

        <div class="search-container">
            <label style="display:block; font-weight:800; margin-bottom:8px;">الرقم الوطني للطالبة:</label>
            <input type="number" id="searchID" placeholder="أدخل الرقم هنا...">
            <button class="btn btn-primary" onclick="loadResult()"><i class="fas fa-search"></i> استخراج النتيجة</button>
        </div>

        <div id="resultView">
            <div style="text-align: center; margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 15px;">
                <h2 id="outName" style="margin: 0; font-size: 22px; color: var(--text);"></h2>
                <div id="outYear" style="color: var(--accent); font-weight: 800; font-size: 16px; margin-top: 5px;"></div>
            </div>
            <table class="res-table">
                <thead>
                    <tr><th style="width: 180px;">المادة</th><th>أعمال</th><th>من</th><th>نهائي</th><th>من</th><th>المجموع</th></tr>
                </thead>
                <tbody id="resTbody"></tbody>
            </table>
            <div id="statsSection" style="margin-top:0px; border:2px solid var(--primary); border-top:none; background:#f8fafc; border-radius:0 0 10px 10px;">
                <div style="display:flex; justify-content:space-between; padding:12px 20px; border-bottom:1px solid #e2e8f0;">
                    <span>المجموع الكلي:</span><span id="outTotalSum" style="font-weight:900; color:var(--primary); font-size:20px;"></span>
                </div>
                <div style="display:flex; justify-content:space-between; padding:12px 20px; border-bottom:1px solid #e2e8f0;">
                    <span>النسبة المئوية:</span><span id="outPercent" style="font-weight:900; color:var(--primary); font-size:20px;"></span>
                </div>
                <div style="display:flex; justify-content:space-between; padding:12px 20px;">
                    <span>التقدير العام:</span><span id="outGrade" style="font-weight:900; color:var(--primary); font-size:20px;"></span>
                </div>
            </div>
            <div id="failMissions" class="fail-box" style="display:none; background:#fff1f2; border:2px solid var(--danger); color:var(--danger); padding:15px; border-radius:10px; margin-top:15px; text-align:center;"></div>
            <button class="btn" style="background:#475569; color:white; margin-top:25px;" onclick="window.print()"><i class="fas fa-print"></i> طباعة الشهادة</button>
        </div>
        <div class="dev-footer-simple">تم تطويره بواسطة عماد الدين نجم</div>
    </div>
</div>

<div class="container" id="adminPortal" style="display:none;">
    <div class="main-card" style="border-top: 10px solid var(--accent);">
        <h2 style="color: var(--primary); text-align: center;"><i class="fas fa-tools"></i> بوابة المطور</h2>
        <div class="admin-dashboard">
            
            <div class="admin-card" style="border: 2px dashed var(--primary); background: #eff6ff;">
                <div id="systemStatusDisplay" class="status-badge">جاري التحقق...</div>
                <button id="toggleSystemBtn" onclick="toggleSystemStatus()" class="btn" style="margin-top: 10px; font-size: 14px; padding: 8px;">تبديل الحالة</button>
            </div>

            <div class="admin-card" style="background: #f0fdf4; border: 2px solid var(--success);">
                <h3 style="color:var(--success); margin-top:0;"><i class="fas fa-bolt"></i> الرصد السريع لكل طالبات الصف</h3>
                <select id="bulkSelectYear" onchange="loadBulkStudentsList()">
                    <option value="">-- اختر الصف لرصد درجاته --</option>
                    <option value="خامس">خامس</option><option value="سادس">سادس</option>
                    <option value="سابع">سابع</option><option value="ثامن">ثامن</option>
                </select>
                <div id="bulkStudentsContainer" style="max-height: 500px; overflow-y: auto; margin-top:10px;">
                    <p style="text-align:center; color:#64748b;">اختر الصف ليظهر شيت الرصد...</p>
                </div>
                <button id="saveAllBulkBtn" class="btn" style="display:none; background:var(--success); color:white; margin-top:15px;" onclick="saveAllBulkData()">
                    <i class="fas fa-save"></i> حفظ جميع الطالبات في هذا الصف
                </button>
            </div>

            <div class="admin-card">
                <label>إضافة/تعديل طالبة فردية</label>
                <div style="display: flex; gap: 8px; margin-bottom:10px;">
                    <input type="number" id="editID" placeholder="الرقم الوطني...">
                    <button onclick="fetchForEdit()" style="background:var(--primary); color:white; border:none; padding:0 15px; border-radius:10px;">جلب</button>
                </div>
                <input type="text" id="inName" placeholder="الاسم الرباعي">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <input type="number" id="inID" placeholder="الرقم الوطني">
                    <select id="inYear" onchange="autoFillSubjects()">
                        <option value="">-- الصف --</option>
                        <option value="خامس">خامس</option><option value="سادس">سادس</option>
                        <option value="سابع">سابع</option><option value="ثامن">ثامن</option>
                    </select>
                </div>
                <div id="subjectsContainer"></div>
                <button onclick="addNewSubject()" class="btn" style="background:#e2e8f0; color:#475569; margin-bottom:15px;">+ إضافة مادة</button>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <button class="btn" style="background: var(--success); color:white;" onclick="saveToFirebase()">حفظ الطالبة</button>
                    <button class="btn" style="background: var(--danger); color:white;" onclick="deleteStudent()">حذف</button>
                </div>
            </div>
            
            <button onclick="location.reload()" class="btn" style="background:none;">خروج</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyDKEPjQMKD2lt74sdGM0k7hY2Wb8E-X55g", 
      databaseURL: "https://istiqlal-school-302c8-default-rtdb.firebaseio.com",
      projectId: "istiqlal-school-302c8",
      appId: "1:1037263844752:web:56dc0ba0d346045610a514"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let isSystemEnabled = true;
    db.ref('system_status').on('value', snap => {
        isSystemEnabled = snap.exists() ? snap.val() : true;
        updateAdminStatusUI();
    });

    function updateAdminStatusUI() {
        const d = document.getElementById('systemStatusDisplay');
        const b = document.getElementById('toggleSystemBtn');
        if(!d || !b) return;
        d.innerText = isSystemEnabled ? "المنظومة: مفعلة" : "المنظومة: معطلة";
        d.className = "status-badge " + (isSystemEnabled ? "status-online" : "status-offline");
        b.innerText = isSystemEnabled ? "تعطيل المنظومة" : "تفعيل المنظومة";
        b.style.background = isSystemEnabled ? "var(--danger)" : "var(--success)";
    }

    function toggleSystemStatus() { db.ref('system_status').set(!isSystemEnabled); }

    const schoolSubjects = {
        "خامس": ["الرياضيات", "اللغة العربية", "الحاسوب", "العلوم", "التربية الإسلامية", "اللغة الإنجليزية", "الاجتماعيات", "الكتابة"],
        "سادس": ["الرياضيات", "اللغة العربية", "الحاسوب", "العلوم", "التربية الإسلامية", "اللغة الإنجليزية", "الاجتماعيات", "الكتابة"],
        "سابع": ["العلوم", "الكتابة", "التربية الإسلامية", "اللغة الإنجليزية", "التاريخ", "الحاسوب", "الرياضيات", "الجغرافيا", "اللغة العربية"],
        "ثامن": ["العلوم", "الكتابة", "التربية الإسلامية", "اللغة الإنجليزية", "التاريخ", "الحاسوب", "الرياضيات", "الجغرافيا", "اللغة العربية"]
    };

    function enterAdmin() { if(prompt("رمز المطور:") === "74742000") { document.getElementById('searchSection').style.display='none'; document.getElementById('adminPortal').style.display='block'; } }

    function addNewSubject(v={n:'',wg:'',wm:40,eg:'',em:60}) {
        const div = document.createElement('div'); div.className = 'subject-entry-card';
        div.style = "border:1px solid #ddd; padding:10px; border-radius:10px; margin-bottom:5px; position:relative;";
        div.innerHTML = `<i class="fas fa-trash" style="position:absolute; left:10px; color:red; cursor:pointer;" onclick="this.parentElement.remove()"></i>
            <input type="text" class="m-name" value="${v.n}" style="width:70%; margin-bottom:5px;">
            <div style="display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:5px;">
                <input type="number" class="m-w-got" value="${v.wg}" placeholder="أعمال">
                <input type="number" class="m-w-max" value="${v.wm}" placeholder="من">
                <input type="number" class="m-e-got" value="${v.eg}" placeholder="نهائي">
                <input type="number" class="m-e-max" value="${v.em}" placeholder="من">
            </div>`;
        document.getElementById('subjectsContainer').appendChild(div);
    }

    function autoFillSubjects() {
        const yr = document.getElementById('inYear').value;
        const con = document.getElementById('subjectsContainer'); con.innerHTML = ""; 
        if (schoolSubjects[yr]) schoolSubjects[yr].forEach(s => addNewSubject({n:s, wg:'', wm:40, eg:'', em:60}));
    }

    // وظيفة الرصد الجماعي (طلبك)
    function loadBulkStudentsList() {
        const yr = document.getElementById('bulkSelectYear').value;
        const container = document.getElementById('bulkStudentsContainer');
        if(!yr) { container.innerHTML = ""; return; }
        container.innerHTML = "<p style='text-align:center;'>جاري جلب الطالبات...</p>";
        
        db.ref('students').orderByChild('year').equalTo(yr).once('value', snap => {
            if(!snap.exists()) { container.innerHTML = "لا يوجد طالبات مسجلات في هذا الصف"; return; }
            let h = "";
            snap.forEach(child => {
                const s = child.val();
                const sid = child.key;
                h += `<div class="bulk-student-row" data-id="${sid}">
                    <span class="bulk-student-name">${s.name}</span>`;
                schoolSubjects[yr].forEach(subName => {
                    const existing = (s.subjects && s.subjects[subName]) ? s.subjects[subName] : {wG:'', eG:'', wM:40, eM:60};
                    h += `<div class="bulk-grid" data-sub="${subName}">
                        <label>${subName}</label>
                        <input type="number" class="bw-g" value="${existing.wG}" placeholder="أعمال">
                        <input type="number" class="be-g" value="${existing.eG}" placeholder="نهائي">
                    </div>`;
                });
                h += `</div>`;
            });
            container.innerHTML = h;
            document.getElementById('saveAllBulkBtn').style.display = 'block';
        });
    }

    async function saveAllBulkData() {
        const rows = document.querySelectorAll('.bulk-student-row');
        const yr = document.getElementById('bulkSelectYear').value;
        for(let row of rows) {
            const sid = row.getAttribute('data-id');
            let subs = {}; let tS = 0; let tM = 0;
            row.querySelectorAll('.bulk-grid').forEach(grid => {
                const n = grid.getAttribute('data-sub');
                const wg = parseFloat(grid.querySelector('.bw-g').value) || 0;
                const eg = parseFloat(grid.querySelector('.be-g').value) || 0;
                const wm = (yr === 'خامس' || yr === 'سادس') ? 40 : 40; // يمكنك تغييرها حسب الصف
                const em = (yr === 'خامس' || yr === 'سادس') ? 60 : 60;
                subs[n] = {wG:wg, wM:wm, eG:eg, eM:em, sum:(wg+eg), max:(wm+em)};
                tS += (wg+eg); tM += (wm+em);
            });
            await db.ref('students/'+sid).update({subjects:subs, totalGot:tS, totalMax:tM, percent:((tS/tM)*100).toFixed(1)});
        }
        alert("تم حفظ درجات الصف " + yr + " بالكامل بنجاح!");
    }

    function fetchForEdit() {
        const id = document.getElementById('editID').value;
        db.ref('students/'+id).once('value', snap => {
            if(snap.exists()){
                const d = snap.val();
                document.getElementById('inName').value = d.name; document.getElementById('inID').value = id; document.getElementById('inYear').value = d.year;
                const con = document.getElementById('subjectsContainer'); con.innerHTML = "";
                for(let k in d.subjects){ const s = d.subjects[k]; addNewSubject({n:k, wg:s.wG, wm:s.wM, eg:s.eG, em:s.eM}); }
            } else alert("غير موجود");
        });
    }

    function saveToFirebase() {
        const id=document.getElementById('inID').value; const name=document.getElementById('inName').value; const yr=document.getElementById('inYear').value;
        if(!id||!name) return alert("أكمل البيانات");
        let subs={}; let tS=0; let tM=0;
        document.querySelectorAll('.subject-entry-card').forEach(el=>{
            const n=el.querySelector('.m-name').value;
            const wg=parseFloat(el.querySelector('.m-w-got').value)||0; const wm=parseFloat(el.querySelector('.m-w-max').value)||0;
            const eg=parseFloat(el.querySelector('.m-e-got').value)||0; const em=parseFloat(el.querySelector('.m-e-max').value)||0;
            if(n){ subs[n]={wG:wg, wM:wm, eG:eg, eM:em, sum:(wg+eg), max:(wm+em)}; tS+=(wg+eg); tM+=(wm+em); }
        });
        db.ref('students/'+id).set({name, year:yr, subjects:subs, percent:((tS/tM)*100).toFixed(1), totalGot:tS, totalMax:tM}).then(()=>alert("تم الحفظ"));
    }

    function deleteStudent() {
        const id = document.getElementById('inID').value;
        if(id && confirm("حذف نهائي؟")) db.ref('students/'+id).remove().then(()=>location.reload());
    }

    function loadResult() {
        if(!isSystemEnabled) { alert("المنظومة معطلة حالياً للرصد."); return; }
        const sid=document.getElementById('searchID').value;
        db.ref('students/'+sid).once('value', snap=>{ if(snap.exists()) showData(snap.val()); else alert("غير مسجل"); });
    }

    function showData(data) {
        document.getElementById('resultView').style.display='block';
        document.getElementById('outName').innerText = data.name;
        document.getElementById('outYear').innerText = "الصف: " + data.year;
        document.getElementById('outPercent').innerText = data.percent + "%";
        document.getElementById('outTotalSum').innerText = data.totalGot + " من " + data.totalMax;
        let h=""; let failed=[]; let hasFail=false;
        for(let k in data.subjects){
            const s=data.subjects[k]; const isFail = s.sum < (s.max/2);
            if(isFail) { hasFail=true; failed.push(k); }
            h+=`<tr><td>${k}</td><td>${s.wG}</td><td>${s.wM}</td><td>${s.eG}</td><td>${s.eM}</td><td style="color:${isFail?'red':'black'}">${s.sum}</td></tr>`;
        }
        document.getElementById('resTbody').innerHTML=h;
        let p=parseFloat(data.percent);
        document.getElementById('outGrade').innerText = hasFail ? "له دور ثانٍ" : (p>=85?"ممتاز":p>=75?"جيد جداً":p>=65?"جيد":p>=50?"مقبول":"ضعيف");
        document.getElementById('failMissions').style.display=hasFail?'block':'none';
        if(hasFail) document.getElementById('failMissions').innerHTML="المواد: "+failed.join(' - ');
    }
</script>
</body>
</html>
