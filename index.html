<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة نتائج الامتحانات الاستقلال</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --primary: #1e3a8a;
            --accent: #b45309;
            --success: #059669;
            --danger: #e11d48;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #1e293b;
            --border: #cbd5e1;
        }

        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); padding: 10px; min-height: 100vh; }
        .container { max-width: 1000px; margin: 10px auto; position: relative; }
        
        .main-card { 
            background: var(--card); border-radius: 20px; padding: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid var(--border);
            position: relative; z-index: 1; width: 100%;
        }

        /* تنسيق الصورة لتظهر بشكل مرتب */
        .school-logo {
            width: 150px;
            height: 150px;
            object-fit: contain;
            margin-bottom: 10px;
            cursor: pointer;
            border-radius: 15px;
            border: 2px solid #eee;
            background: #fff;
        }
        
        .admin-tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { flex: 1; min-width: 120px; padding: 12px; border-radius: 10px; border: none; background: #e2e8f0; font-weight: 700; cursor: pointer; color: #64748b; }
        .tab-btn.active { background: var(--primary); color: white; }

        .admin-section { display: none; }
        .admin-section.active { display: block; }

        input, select { width: 100%; padding: 10px; border-radius: 10px; border: 2px solid var(--border); background: #f8fafc; outline: none; font-size: 15px; margin-bottom: 10px; text-align: center; }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 17px; }
        .btn-primary { background: var(--primary); color: white; }
        
        #resultView { display: none; margin-top: 20px; padding: 10px; border-radius: 12px; background: #fff; }
        
        .res-table { width: 100%; border-collapse: collapse; table-layout: fixed; border: 1px solid var(--border); }
        .res-table th { 
            background: var(--primary); color: white; padding: 5px 2px; font-size: 10px; border: 1px solid #fff;
        }
        .res-table td { padding: 10px 2px; border: 1px solid #e2e8f0; text-align: center; font-weight: 900; color: #000; font-size: 13px; }

        .dev-footer-simple { text-align: center; margin-top: 30px; padding: 20px; color: #000; font-weight: 700; border-top: 1px solid #e2e8f0; }

        @media print {
            .btn, .search-container, #adminPortal, .admin-tabs, .dev-footer-simple, .school-header { display: none !important; }
            #resultView { display: block !important; width: 100%; border: none; padding: 0; }
        }
    </style>
</head>
<body>

<div class="container" id="searchSection">
    <div class="main-card">
        <div id="welcomeArea">
            <div class="school-header" style="text-align:center; margin-bottom:20px;">
                
                <img src="1000255616.jpg" 
                     onerror="this.src='1000255595.jpg'; this.onerror=function(){this.src='logo.jpg';};" 
                     class="school-logo" 
                     alt="شعار المدرسة" 
                     ondblclick="enterAdmin()">
                
                <h1 style="margin: 0; font-size: 24px; font-weight: 900; color: var(--primary);">مدرسة الإستقلال للتعليم الأساسي</h1>
                <p style="color: #64748b; font-weight: 700; font-size: 14px;">نتائج الامتحانات 2026</p>
            </div>

            <div class="search-container" id="searchBox" style="max-width:450px; margin:0 auto;">
                <input type="number" id="searchID" placeholder="أدخل الرقم الوطني للطالبة...">
                <button class="btn btn-primary" onclick="loadResult()"><i class="fas fa-search"></i> استخراج النتيجة</button>
            </div>
        </div>

        <div id="resultView">
             <div style="text-align: center; margin-bottom: 15px;">
                <h2 id="outName" style="margin: 0;"></h2>
                <div id="outYear" style="color: var(--accent); font-weight: 800;"></div>
            </div>
            <table class="res-table">
                <thead>
                    <tr><th>المادة</th><th>أعمال</th><th>صغرى</th><th>امتحان</th><th>كبرى</th><th>المجموع</th></tr>
                </thead>
                <tbody id="resTbody"></tbody>
            </table>
            <div style="margin-top:10px; font-weight:bold; text-align:center;" id="outGrade"></div>
            <button class="btn" style="background:#e2e8f0; margin-top:20px;" onclick="location.reload()">بحث جديد</button>
        </div>
        <div class="dev-footer-simple">تم تطويره بواسطة عماد الدين نجم</div>
    </div>
</div>

<script>
    // إعدادات الفايربيس
    const firebaseConfig = {
      apiKey: "AIzaSyDKEPjQMKD2lt74sdGM0k7hY2Wb8E-X55g", 
      databaseURL: "https://istiqlal-school-302c8-default-rtdb.firebaseio.com",
      projectId: "istiqlal-school-302c8",
      appId: "1:1037263844752:web:56dc0ba0d346045610a514"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function enterAdmin() {
        const pass = prompt("رمز المطور:");
        db.ref('settings/dev_pass').once('value', snap => {
            if(String(pass).trim() === String(snap.val()).trim()) alert("مرحباً بك يا عماد");
        });
    }

    function loadResult() {
        const sid=document.getElementById('searchID').value;
        if(!sid) return alert("أدخل الرقم الوطني");
        db.ref('students/'+sid).once('value', snap=>{ 
            if(snap.exists()) showData(snap.val()); 
            else alert("الرقم غير مسجل");
        });
    }

    function showData(data) {
        document.getElementById('welcomeArea').style.display = 'none';
        document.getElementById('resultView').style.display='block';
        document.getElementById('outName').innerText = data.name;
        document.getElementById('outYear').innerText = "الصف: " + data.year;
        let h="";
        for(let k in data.subjects){
            const s = data.subjects[k];
            h+=`<tr><td>${k}</td><td>${s.wG}</td><td>${s.wM}</td><td>${s.eG}</td><td>${s.eM}</td><td>${s.sum}</td></tr>`;
        }
        document.getElementById('resTbody').innerHTML=h;
        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
    }
</script>
</body>
</html>
