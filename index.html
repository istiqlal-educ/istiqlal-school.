<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة مدرسة الاستقلال | الإصدار الرسمي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --primary: #1e3a8a;
            --primary-light: #3b82f6;
            --accent: #b45309;
            --success: #059669;
            --danger: #e11d48;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #1e293b;
            --border: #cbd5e1;
        }

        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; transition: 0.2s ease; }
        body { margin: 0; background: var(--bg); color: var(--text); padding: 10px; min-height: 100vh; }

        .container { max-width: 800px; margin: 20px auto; }
        .main-card { background: var(--card); border-radius: 25px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid var(--border); }

        .school-header { text-align: center; margin-bottom: 30px; }
        .school-icon { font-size: 50px; color: var(--primary); margin-bottom: 10px; cursor: pointer; }

        /* البحث والشهادة */
        .search-container { max-width: 500px; margin: 0 auto; text-align: center; }
        input, select { 
            width: 100%; padding: 14px; border-radius: 12px; border: 2px solid var(--border); 
            background: #f8fafc; color: var(--text); outline: none; font-size: 16px; margin-bottom: 15px; text-align: center;
        }
        input:focus { border-color: var(--primary); background: #fff; }

        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 17px; }
        .btn-primary { background: var(--primary); color: white; }

        /* تصميم الشهادة */
        #resultView { 
            display: none; margin-top: 30px; padding: 25px; border: 6px double var(--accent); border-radius: 15px; background: #fff; position: relative; 
        }
        .res-table { width: 100%; border-collapse: collapse; margin-bottom: 0; font-size: 14px; }
        .res-table th { background: var(--primary); color: white; padding: 10px; border: 1px solid #ddd; }
        .res-table td { padding: 12px; border: 1px solid #eee; text-align: center; font-weight: 700; }
        .sub-name { text-align: right !important; color: var(--primary); background: #f9fafb; width: 30%; }

        .cert-footer { 
            display: grid; grid-template-columns: 1fr 1fr 1fr; background: #f8fafc; border: 2px solid var(--primary); border-top: none; padding: 15px; text-align: center; border-radius: 0 0 10px 10px;
        }
        .footer-val { font-size: 18px; font-weight: 900; color: var(--primary); display: block; }
        .footer-label { font-size: 11px; font-weight: 700; color: #64748b; }

        /* بوابة المطور - تعديل الخانات الصغير */
        #adminPortal { display: none; }
        .admin-dashboard { background: #f8fafc; border-radius: 20px; padding: 15px; border: 1px solid var(--border); }
        .admin-card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        /* تصميم بطاقة المادة الجديد - مريح للهاتف */
        .subject-entry-card {
            background: white; border: 2px solid #e2e8f0; border-radius: 18px; padding: 20px; margin-bottom: 20px; position: relative;
        }
        .subject-entry-card .m-name { 
            font-size: 18px; font-weight: 900; color: var(--primary); border: none; border-bottom: 2px solid #eee; border-radius: 0; text-align: right; background: transparent; margin-bottom: 15px;
        }
        .score-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
        }
        .score-item { display: flex; flex-direction: column; gap: 5px; }
        .score-item label { font-size: 12px; color: #64748b; margin-bottom: 0; text-align: right; padding-right: 5px; }
        .score-item input { margin-bottom: 0; padding: 12px; font-size: 18px; font-weight: 700; background: #fff; border: 2px solid #cbd5e1; }
        
        .remove-btn { position: absolute; left: 15px; top: 15px; color: var(--danger); font-size: 20px; cursor: pointer; }

        @media print {
            .btn, .search-container, footer, #adminPortal, .school-header { display: none !important; }
            #resultView { display: block !important; border: 5px double black; }
        }

        footer { text-align: center; padding: 20px; color: #94a3b8; font-weight: 700; }
    </style>
</head>
<body>

<div class="container" id="searchSection">
    <div class="main-card">
        <div class="school-header">
            <div class="school-icon" ondblclick="enterAdmin()"><i class="fas fa-school"></i></div>
            <h1 style="margin: 0; font-size: 30px; font-weight: 900; color: var(--primary);">مدرسة الاستقلال</h1>
            <p style="color: #64748b; font-weight: 700;">منظومة النتائج والشهادات</p>
        </div>

        <div class="search-container">
            <label>الرقم الوطني للطالبة</label>
            <input type="number" id="searchID" placeholder="أدخل الرقم الوطني...">
            <button class="btn btn-primary" onclick="loadResult()"><i class="fas fa-file-signature"></i> عرض الشهادة</button>
        </div>

        <div id="resultView">
            <div style="text-align: center; margin-bottom: 20px;">
                <h2 id="outName" style="margin: 0; font-size: 24px;"></h2>
                <div id="outYear" style="color: var(--accent); font-weight: 800;"></div>
            </div>
            <table class="res-table">
                <thead><tr><th>المادة</th><th>أعمال</th><th>من</th><th>نهائي</th><th>من</th><th>المجموع</th></tr></thead>
                <tbody id="resTbody"></tbody>
            </table>
            <div class="cert-footer">
                <div class="footer-item"><span class="footer-label">المجموع</span><span class="footer-val" id="outTotalSum">0</span></div>
                <div class="footer-item"><span class="footer-label">النسبة</span><span class="footer-val" id="outPercent">0%</span></div>
                <div class="footer-item"><span class="footer-label">التقدير</span><span class="footer-val" id="outGrade">---</span></div>
            </div>
            <div id="failMissions" style="display:none; background:var(--danger); color:white; padding:10px; border-radius:8px; margin-top:15px; text-align:center; font-weight:bold;"></div>
            <button class="btn" style="background: #475569; color: white; margin-top: 20px;" onclick="window.print()">طباعة</button>
        </div>
    </div>
</div>

<div class="container" id="adminPortal">
    <div class="main-card" style="border-top: 10px solid var(--accent);">
        <h2 style="color: var(--primary); text-align: center;"><i class="fas fa-tools"></i> بوابة المطور</h2>
        
        <div class="admin-dashboard">
            <div class="admin-card">
                <label>تعديل طالبة سابقة</label>
                <div style="display: flex; gap: 8px;">
                    <input type="number" id="editID" placeholder="الرقم الوطني..." style="margin-bottom:0;">
                    <button onclick="fetchForEdit()" style="background:var(--primary); color:white; border:none; padding:0 20px; border-radius:10px; cursor:pointer;">جلب</button>
                </div>
            </div>

            <div class="admin-card">
                <label>بيانات الطالبة</label>
                <input type="text" id="inName" placeholder="الاسم الرباعي">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <input type="number" id="inID" placeholder="الرقم الوطني">
                    <select id="inYear" onchange="autoFillSubjects()">
                        <option value="">-- الصف --</option>
                        <option value="سادس">سادس</option><option value="سابع">سابع</option><option value="ثامن">ثامن</option>
                    </select>
                </div>
            </div>

            <div id="subjectsContainer"></div>

            <button onclick="addNewSubject()" class="btn" style="background:#e2e8f0; color:#475569; margin-bottom:15px;">+ إضافة مادة</button>
            <button class="btn" style="background: var(--success); color:white;" onclick="saveToFirebase()">حفظ البيانات</button>
            <button onclick="location.reload()" class="btn" style="background:none; color:#64748b; font-size:14px;">إلغاء</button>
        </div>
    </div>
</div>

<footer>عماد الدين نجم &copy; 2026</footer>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyDKEPjQMKD2lt74sdGM0k7hY2Wb8E-X55g", 
      databaseURL: "https://istiqlal-school-302c8-default-rtdb.firebaseio.com",
      projectId: "istiqlal-school-302c8",
      appId: "1:1037263844752:web:56dc0ba0d346045610a514"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const schoolSubjects = {
        "ثامن": ["اللغة العربية", "التربية الإسلامية", "علوم", "كتابة", "اللغة الإنجليزية", "تاريخ", "حاسوب", "رياضيات", "جغرافيا"],
        "سادس": ["التربية الإسلامية", "اللغة العربية", "الرياضيات", "العلوم", "اللغة الإنجليزية"],
        "سابع": ["التربية الإسلامية", "اللغة العربية", "الرياضيات", "العلوم", "اللغة الإنجليزية"]
    };

    function enterAdmin() { if(prompt("رمز المطور:") === "74742000") { document.getElementById('searchSection').style.display='none'; document.getElementById('adminPortal').style.display='block'; } }

    function addNewSubject(v={n:'',wg:'',wm:40,eg:'',em:60}) {
        const div = document.createElement('div'); div.className = 'subject-entry-card';
        div.innerHTML = `
            <i class="fas fa-trash-alt remove-btn" onclick="this.parentElement.remove()"></i>
            <input type="text" class="m-name" value="${v.n}" placeholder="اسم المادة">
            <div class="score-grid">
                <div class="score-item"><label>درجة الأعمال</label><input type="number" class="m-w-got" value="${v.wg}"></div>
                <div class="score-item"><label>من (الأعمال)</label><input type="number" class="m-w-max" value="${v.wm}"></div>
                <div class="score-item"><label>درجة النهائي</label><input type="number" class="m-e-got" value="${v.eg}"></div>
                <div class="score-item"><label>من (النهائي)</label><input type="number" class="m-e-max" value="${v.em}"></div>
            </div>`;
        document.getElementById('subjectsContainer').appendChild(div);
    }

    function autoFillSubjects() {
        const yr = document.getElementById('inYear').value;
        const con = document.getElementById('subjectsContainer'); con.innerHTML = ""; 
        if (schoolSubjects[yr]) schoolSubjects[yr].forEach(s => addNewSubject({n:s, wg:'', wm:40, eg:'', em:60}));
    }

    function fetchForEdit() {
        const id = document.getElementById('editID').value;
        db.ref('students/'+id).once('value', snap => {
            if(snap.exists()){
                const d = snap.val();
                document.getElementById('inName').value = d.name; document.getElementById('inID').value = id; document.getElementById('inYear').value = d.year;
                const con = document.getElementById('subjectsContainer'); con.innerHTML = "";
                for(let k in d.subjects){ const s = d.subjects[k]; addNewSubject({n:k, wg:s.wG, wm:s.wM, eg:s.eG, em:s.eM}); }
            } else alert("غير موجود");
        });
    }

    function saveToFirebase() {
        const id=document.getElementById('inID').value; const name=document.getElementById('inName').value; const yr=document.getElementById('inYear').value;
        if(!id||!name) return alert("أكمل البيانات");
        let subs={}; let tS=0; let tM=0;
        document.querySelectorAll('.subject-entry-card').forEach(el=>{
            const n=el.querySelector('.m-name').value;
            const wg=parseFloat(el.querySelector('.m-w-got').value)||0; const wm=parseFloat(el.querySelector('.m-w-max').value)||0;
            const eg=parseFloat(el.querySelector('.m-e-got').value)||0; const em=parseFloat(el.querySelector('.m-e-max').value)||0;
            if(n){ subs[n]={wG:wg, wM:wm, eG:eg, eM:em, sum:(wg+eg), max:(wm+em)}; tS+=(wg+eg); tM+=(wm+em); }
        });
        db.ref('students/'+id).set({name, year:yr, subjects:subs, percent:((tS/tM)*100).toFixed(1), totalGot:tS, totalMax:tM}).then(()=>alert("تم الحفظ بنجاح"));
    }

    function loadResult() {
        const sid=document.getElementById('searchID').value;
        db.ref('students/'+sid).once('value', snap=>{ if(snap.exists()) showData(snap.val()); else alert("غير مسجل"); });
    }

    function showData(data) {
        document.getElementById('resultView').style.display='block';
        document.getElementById('outName').innerText = data.name;
        document.getElementById('outYear').innerText = "الصف: " + data.year;
        document.getElementById('outPercent').innerText = data.percent + "%";
        document.getElementById('outTotalSum').innerText = data.totalGot + " / " + data.totalMax;
        let h=""; let failed=[]; let hasFail=false;
        for(let k in data.subjects){
            const s=data.subjects[k]; const isFail = s.sum < (s.max/2);
            if(isFail) { hasFail=true; failed.push(k); }
            h+=`<tr><td class="sub-name">${k}</td><td>${s.wG}</td><td>${s.wM}</td><td>${s.eG}</td><td>${s.eM}</td><td style="color:${isFail?'red':'black'}">${s.sum}</td></tr>`;
        }
        document.getElementById('resTbody').innerHTML=h;
        const gBox=document.getElementById('outGrade');
        if(hasFail){
            gBox.innerText = "دور ثانٍ"; gBox.style.color = "red";
            document.getElementById('failMissions').style.display='block';
            document.getElementById('failMissions').innerText = "لم توفق في: " + failed.join(' - ');
        } else {
            let p=parseFloat(data.percent);
            let g = p>=85?"ممتاز":p>=75?"جيد جداً":p>=65?"جيد":p>=50?"مقبول":"ضعيف";
            gBox.innerText = g; gBox.style.color = "#059669";
            document.getElementById('failMissions').style.display='none';
        }
    }
</script>
</body>
</html>
