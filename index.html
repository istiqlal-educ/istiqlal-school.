<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة نتائج الامتحانات الاستقلال</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --primary: #1e3a8a;
            --accent: #b45309;
            --success: #059669;
            --danger: #e11d48;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #1e293b;
            --border: #cbd5e1;
        }

        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); padding: 10px; min-height: 100vh; overflow-x: hidden; }
        .container { max-width: 1000px; margin: 10px auto; position: relative; }
        
        /* Loading Overlay */
        #loadingOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8); z-index: 9999; justify-content: center; align-items: center; flex-direction: column;
        }
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .container::before, .container::after {
            content: ""; position: absolute; top: 0; bottom: 0; width: 8px;
            background: var(--primary); z-index: 0; border-radius: 10px; opacity: 0.8;
        }
        .container::before { right: -15px; }
        .container::after { left: -15px; }

        .main-card { 
            background: var(--card); border-radius: 20px; padding: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid var(--border);
            position: relative; z-index: 1; width: 100%;
        }
        
        .admin-tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { flex: 1; min-width: 120px; padding: 12px; border-radius: 10px; border: none; background: #e2e8f0; font-weight: 700; cursor: pointer; color: #64748b; }
        .tab-btn.active { background: var(--primary); color: white; }

        .admin-section { display: none; }
        .admin-section.active { display: block; }

        input, select { width: 100%; padding: 10px; border-radius: 10px; border: 2px solid var(--border); background: #f8fafc; outline: none; font-size: 15px; margin-bottom: 10px; text-align: center; }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 17px; }
        .btn-primary { background: var(--primary); color: white; }
        
        #resultView { display: none; margin-top: 20px; padding: 10px; border-radius: 12px; background: #fff; }
        
        .res-table { width: 100%; border-collapse: collapse; table-layout: fixed; border: 1px solid var(--border); }
        .res-table th { 
            background: var(--primary); color: white; padding: 6px 1px; font-size: 9px; border: 1px solid #fff;
            line-height: 1.1; word-wrap: break-word; vertical-align: middle; height: 40px;
        }
        .res-table td { padding: 8px 1px; border: 1px solid #e2e8f0; text-align: center; font-weight: 900; color: #000; font-size: 12px; }

        .summary-box { margin-top: 0; border: 2px solid var(--primary); background: #f8fafc; border-radius: 0 0 10px 10px; }
        
        .grade-excellent { color: #065f46 !important; background: #dcfce7; padding: 2px 10px; border-radius: 8px; border: 1px solid #059669; }
        .grade-fail { color: #991b1b !important; background: #fee2e2; padding: 2px 10px; border-radius: 8px; border: 1px solid #ef4444; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-card { background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .stat-val { display: block; font-size: 20px; font-weight: 900; color: var(--primary); }

        .grid-header { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr; gap: 5px; text-align: center; font-size: 11px; font-weight: bold; color: var(--primary); margin: 10px 0; }
        .bulk-student-box { border: 2px solid var(--primary); border-radius: 15px; padding: 15px; margin-bottom: 20px; background: #fff; position: relative; }
        .bulk-row-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr; gap: 5px; align-items: center; margin-bottom: 8px; border-bottom: 1px solid #f1f5f9; padding-bottom: 5px; }

        /* ستايلات الألوان المطلوبة للإحصائيات */
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .status-pass { background: #dcfce7; color: #059669; border: 1px solid #059669; }
        .status-fail { background: #fee2e2; color: #dc2626; border: 1px solid #dc2626; }

        .dev-footer-simple { text-align: center; margin-top: 30px; padding: 20px; color: #000; font-weight: 700; font-size: 15px; border-top: 1px solid #e2e8f0; }

        @media print {
            .btn, .search-container, #adminPortal, .admin-tabs, .dev-footer-simple, .container::before, .container::after, #backToStatsBtn { display: none !important; }
            #resultView { display: block !important; width: 100%; border: none; padding: 0; }
        }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner"></div>
    <p style="margin-top:15px; font-weight:900; color:var(--primary);">جاري جلب البيانات...</p>
</div>

<div class="container" id="searchSection">
    <div class="main-card">
        <div class="school-header" style="text-align:center; margin-bottom:20px;">
            <div class="school-icon" style="font-size:40px; color:var(--primary); cursor:pointer;" ondblclick="enterAdmin()"><i class="fas fa-school"></i></div>
            <h1 style="margin: 0; font-size: 24px; font-weight: 900; color: var(--primary);">منظومة نتائج الاستقلال</h1>
            <p style="color: #64748b; font-weight: 700; font-size: 14px;">نتائج الامتحانات 2026</p>
        </div>

        <div class="search-container" id="searchBox" style="max-width:400px; margin:0 auto;">
            <label style="font-weight:800; display:block; margin-bottom:8px;">الرقم الوطني للطالبة:</label>
            <input type="number" id="searchID" placeholder="أدخل الرقم هنا...">
            <button class="btn btn-primary" onclick="loadResult()"><i class="fas fa-search"></i> استخراج النتيجة</button>
        </div>

        <div id="resultView">
            <button id="backToStatsBtn" class="btn" style="background:var(--accent); color:white; margin-bottom:15px; display:none;" onclick="returnToStats()">
                <i class="fas fa-arrow-right"></i> العودة للإحصائيات
            </button>

            <div style="text-align: center; margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 15px;">
                <h2 id="outName" style="margin: 0; font-size: 20px; color: var(--text);"></h2>
                <div id="outYear" style="color: var(--accent); font-weight: 800; font-size: 15px; margin-top: 5px;"></div>
            </div>
            
            <table class="res-table">
                <thead><tr><th>المادة</th><th>أعمال</th><th>من</th><th>امتحان</th><th>من</th><th>المجموع</th></tr></thead>
                <tbody id="resTbody"></tbody>
            </table>

            <div class="summary-box">
                <div id="totalRow" style="display:flex; justify-content:space-between; padding:10px 15px; border-bottom:1px solid #e2e8f0;">
                    <span>المجموع الكلي:</span><span id="outTotalSum" style="font-weight:900; color:var(--primary);"></span>
                </div>
                <div id="percentRow" style="display:flex; justify-content:space-between; padding:10px 15px; border-bottom:1px solid #e2e8f0;">
                    <span>النسبة المئوية:</span><span id="outPercent" style="font-weight:900; color:var(--primary);"></span>
                </div>
                <div style="display:flex; justify-content:space-between; padding:10px 15px;">
                    <span>التقدير العام:</span><span id="outGrade" style="font-weight:900;"></span>
                </div>
            </div>
            
            <div id="failMissions" style="display:none; background:#fee2e2; border:2px solid var(--danger); color:#991b1b; padding:15px; border-radius:10px; margin-top:15px; text-align:center; font-weight:900;">
                <div style="margin-bottom:5px; text-decoration:underline;">المواد التي لم توفق فيها:</div>
                <div id="failListItems"></div>
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:20px;">
                <button class="btn" style="background:#475569; color:white;" onclick="window.print()"><i class="fas fa-print"></i> طباعة</button>
                <button class="btn" style="background:#e2e8f0;" onclick="location.reload()">بحث جديد</button>
            </div>
        </div>
        <div class="dev-footer-simple">تم تطويره بواسطة عماد الدين نجم</div>
    </div>
</div>

<div class="container" id="adminPortal" style="display:none;">
    <div class="main-card">
        <h2 style="color: var(--primary); text-align: center;"><i class="fas fa-tools"></i> بوابة المطور</h2>
        <div class="admin-tabs">
            <button class="tab-btn active" onclick="showTab('individualTab', this)">الرصد الفردي</button>
            <button class="tab-btn" onclick="showTab('bulkTab', this)">الرصد الجماعي</button>
            <button class="tab-btn" id="statsTabBtn" onclick="showTab('statsTab', this)">إحصائيات الصفوف</button>
        </div>

        <div id="individualTab" class="admin-section active">
            <input type="number" id="editID" placeholder="الرقم الوطني للتعديل...">
            <button onclick="fetchForEdit()" class="btn" style="background:var(--primary); color:white; margin-bottom:15px;">جلب البيانات</button>
            <input type="text" id="inName" placeholder="الاسم الرباعي">
            <select id="inYear" onchange="autoFillSubjects()">
                <option value="">-- الصف --</option>
                <option value="خامس">خامس</option><option value="سادس">سادس</option>
                <option value="سابع">سابع</option><option value="ثامن">ثامن</option>
            </select>
            <div id="subjectsContainer"></div>
            <button class="btn" style="background: var(--success); color:white;" onclick="saveToFirebase()">حفظ الطالبة</button>
        </div>

        <div id="bulkTab" class="admin-section">
             <select id="bulkSelectYear" onchange="loadBulkStudentsList()">
                <option value="">-- اختر الصف --</option>
                <option value="خامس">خامس</option><option value="سادس">سادس</option>
                <option value="سابع">سابع</option><option value="ثامن">ثامن</option>
            </select>
            <div id="bulkStudentsContainer"></div>
            <button id="saveAllBulkBtn" class="btn" style="display:none; background:var(--success); color:white; margin-top:15px;" onclick="saveAllBulkData()">حفظ الكل</button>
        </div>

        <div id="statsTab" class="admin-section">
            <select id="statsSelectYear" onchange="loadClassStats()">
                <option value="">-- اختر الصف --</option>
                <option value="خامس">خامس</option><option value="سادس">سادس</option>
                <option value="سابع">سابع</option><option value="ثامن">ثامن</option>
            </select>
            <div id="statsContent" style="display:none;">
                <div class="stats-grid">
                    <div class="stat-card"><span id="countTotal" class="stat-val">0</span><span>إجمالي</span></div>
                    <div class="stat-card"><span id="countPass" class="stat-val" style="color:var(--success)">0</span><span>ناجحة</span></div>
                    <div class="stat-card"><span id="countFail" class="stat-val" style="color:var(--danger)">0</span><span>راسبة</span></div>
                    <div class="stat-card"><span id="passPercent" class="stat-val">0%</span><span>النسبة</span></div>
                </div>
                <table style="width:100%; border-collapse:collapse; background:#fff; border-radius:10px; overflow:hidden;">
                    <thead style="background:var(--primary); color:white;"><tr><th style="padding:10px;">الاسم</th><th style="padding:10px;">الحالة</th></tr></thead>
                    <tbody id="statsTbody"></tbody>
                </table>
            </div>
        </div>

        <button onclick="location.reload()" class="btn" style="background:none; margin-top:20px;">خروج</button>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyDKEPjQMKD2lt74sdGM0k7hY2Wb8E-X55g", 
      databaseURL: "https://istiqlal-school-302c8-default-rtdb.firebaseio.com",
      projectId: "istiqlal-school-302c8",
      appId: "1:1037263844752:web:56dc0ba0d346045610a514"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const schoolSubjects = {
        "خامس": ["التاريخ", "التربية الإسلامية", "الجغرافيا", "الحاسوب", "الرياضيات", "العلوم", "الكتابة", "اللغة الإنجليزية", "اللغة العربية"],
        "سادس": ["التاريخ", "التربية الإسلامية", "الجغرافيا", "الحاسوب", "الرياضيات", "العلوم", "الكتابة", "اللغة الإنجليزية", "اللغة العربية"],
        "سابع": ["التاريخ", "التربية الإسلامية", "الجغرافيا", "الحاسوب", "الرياضيات", "العلوم", "الكتابة", "اللغة الإنجليزية", "اللغة العربية"],
        "ثامن": ["التاريخ", "التربية الإسلامية", "الجغرافيا", "الحاسوب", "الرياضيات", "العلوم", "الكتابة", "اللغة الإنجليزية", "اللغة العربية"]
    };

    function showTab(tabId, btn) {
        document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btn.classList.add('active');
    }

    function enterAdmin() {
        const pass = prompt("رمز المطور:");
        db.ref('settings/dev_pass').once('value', snap => {
            if(String(pass).trim() === String(snap.val()).trim()) {
                document.getElementById('searchSection').style.display='none';
                document.getElementById('adminPortal').style.display='block';
            }
        });
    }

    function loadClassStats() {
        const yr = document.getElementById('statsSelectYear').value;
        const content = document.getElementById('statsContent');
        if(!yr) { content.style.display='none'; return; }
        db.ref('students').orderByChild('year').equalTo(yr).once('value', snap => {
            let students = []; let passed = 0; let failed = 0;
            snap.forEach(c => { students.push({id: c.key, ...c.val()}); });
            students.sort((a,b) => a.name.localeCompare(b.name, 'ar'));
            let rows = "";
            students.forEach(s => {
                let isFail = false;
                for(let k in s.subjects) { if(s.subjects[k].sum < (s.subjects[k].max/2)) { isFail = true; break; } }
                if(isFail) failed++; else passed++;
                // هنا التعديل المطلوب للألوان
                rows += `<tr onclick="viewFromStats('${s.id}')" style="cursor:pointer; border-bottom:1px solid #eee;">
                    <td style="padding:10px; font-weight:700; color:var(--primary);">${s.name}</td>
                    <td style="padding:10px; text-align:center;"><span class="status-badge ${isFail?'status-fail':'status-pass'}">${isFail?'دور ثانٍ':'ناجحة'}</span></td>
                </tr>`;
            });
            document.getElementById('countTotal').innerText = students.length;
            document.getElementById('countPass').innerText = passed;
            document.getElementById('countFail').innerText = failed;
            document.getElementById('passPercent').innerText = ((passed/students.length)*100).toFixed(1) + "%";
            document.getElementById('statsTbody').innerHTML = rows;
            content.style.display = 'block';
        });
    }

    function viewFromStats(id) {
        document.getElementById('adminPortal').style.display='none';
        document.getElementById('searchSection').style.display='block';
        document.getElementById('searchBox').style.display='none';
        document.getElementById('backToStatsBtn').style.display='flex';
        document.getElementById('searchID').value = id;
        loadResult();
    }

    function returnToStats() {
        document.getElementById('resultView').style.display='none';
        document.getElementById('searchSection').style.display='none';
        document.getElementById('adminPortal').style.display='block';
        document.getElementById('searchBox').style.display='block';
        document.getElementById('backToStatsBtn').style.display='none';
        showTab('statsTab', document.getElementById('statsTabBtn'));
    }

    function loadResult() {
        const sid=document.getElementById('searchID').value;
        if(!sid) return;
        document.getElementById('loadingOverlay').style.display='flex';
        
        setTimeout(() => {
            db.ref('students/'+sid).once('value', snap=>{ 
                document.getElementById('loadingOverlay').style.display='none';
                if(snap.exists()) showData(snap.val()); 
                else { alert("عذراً، الرقم غير مسجل."); location.reload(); }
            });
        }, 800);
    }

    function showData(data) {
        document.getElementById('resultView').style.display='block';
        document.getElementById('outName').innerText = data.name;
        document.getElementById('outYear').innerText = "الصف: " + data.year;
        let h=""; let failed=[]; let hasFail=false;
        const sortedKeys = schoolSubjects[data.year] || Object.keys(data.subjects);
        sortedKeys.forEach(k => {
            if(data.subjects[k]) {
                const s = data.subjects[k]; 
                const isFail = s.sum < (s.max/2);
                if(isFail) { hasFail=true; failed.push(k); }
                h+=`<tr><td>${k}</td><td>${s.wG}</td><td>${s.wM}</td><td>${s.eG}</td><td>${s.eM}</td><td style="color:${isFail?'red':'black'}">${s.sum}</td></tr>`;
            }
        });
        document.getElementById('resTbody').innerHTML=h;
        const gradeEl = document.getElementById('outGrade');
        if(hasFail) {
            gradeEl.innerText = "له دور ثانٍ"; gradeEl.className = "grade-fail";
            document.getElementById('totalRow').style.display="none"; document.getElementById('percentRow').style.display="none";
            document.getElementById('failMissions').style.display="block"; document.getElementById('failListItems').innerText = failed.join(' - ');
        } else {
            document.getElementById('totalRow').style.display="flex"; document.getElementById('percentRow').style.display="flex";
            document.getElementById('failMissions').style.display="none";
            document.getElementById('outTotalSum').innerText = data.totalGot + " من " + data.totalMax;
            document.getElementById('outPercent').innerText = data.percent + "%";
            let p=parseFloat(data.percent);
            if(p>=85) { gradeEl.innerText="ممتاز"; gradeEl.className="grade-excellent"; }
            else if(p>=75) gradeEl.innerText="جيد جداً"; else if(p>=65) gradeEl.innerText="جيد"; else gradeEl.innerText="مقبول";
        }
    }

    function autoFillSubjects() {
        const yr = document.getElementById('inYear').value;
        const con = document.getElementById('subjectsContainer'); con.innerHTML = ""; 
        if (schoolSubjects[yr]) schoolSubjects[yr].forEach(s => {
            const div = document.createElement('div'); div.innerHTML = `<div style="display:grid; grid-template-columns:2fr 1fr 1fr 1fr 1fr; gap:5px; margin-bottom:5px;">
                <input type="text" value="${s}" readonly> <input type="number" placeholder="أعمال" class="wG"> <input type="number" value="40" class="wM">
                <input type="number" placeholder="امتحان" class="eG"> <input type="number" value="60" class="eM">
            </div>`; con.appendChild(div);
        });
    }

    function saveToFirebase() {
        const id = document.getElementById('editID').value || document.getElementById('inID')?.value;
        const name = document.getElementById('inName').value;
        const yr = document.getElementById('inYear').value;
        if(!id || !name || !yr) return alert("أكمل البيانات");
        
        let subs = {}; let tG=0; let tM=0;
        document.querySelectorAll('#subjectsContainer > div').forEach(div => {
            const n = div.querySelector('input[type="text"]').value;
            const wg = parseFloat(div.querySelector('.wG').value) || 0;
            const wm = parseFloat(div.querySelector('.wM').value) || 0;
            const eg = parseFloat(div.querySelector('.eG').value) || 0;
            const em = parseFloat(div.querySelector('.eM').value) || 0;
            subs[n] = {wG:wg, wM:wm, eG:eg, eM:em, sum:(wg+eg), max:(wm+em)};
            tG+=(wg+eg); tM+=(wm+em);
        });

        db.ref('students/'+id).set({name, year:yr, subjects:subs, totalGot:tG, totalMax:tM, percent:((tG/tM)*100).toFixed(1)})
        .then(()=>alert("تم الحفظ"));
    }
</script>
</body>
</html>
