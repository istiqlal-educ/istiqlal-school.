<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدرسة الاستقلال للتعليم الأساسي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root { --primary: #1e3a8a; --accent: #b45309; --success: #059669; --danger: #e11d48; --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --border: #cbd5e1; }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); padding: 5px; min-height: 100vh; overflow-x: hidden; }
        .container { max-width: 1000px; margin: 2px auto; position: relative; }
        #loadingOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .main-card { background: var(--card); border-radius: 20px; padding: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid var(--border); position: relative; z-index: 1; width: 100%; }
        .res-table { width: 100%; border-collapse: collapse; table-layout: fixed; border: 1px solid var(--border); margin-bottom: 5px; }
        .res-table th { background: var(--primary); color: white; padding: 4px 1px; font-size: 9px; border: 1px solid #fff; line-height: 1.1; word-wrap: break-word; vertical-align: middle; }
        .res-table td { padding: 4px 1px; border: 1px solid #e2e8f0; text-align: center; font-weight: 900; color: #000; font-size: 11px; }
        .summary-box { border: 2px solid var(--primary); background: #f8fafc; border-radius: 0 0 10px 10px; }
        .btn { width: 100%; padding: 12px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 16px; }
        .btn-primary { background: var(--primary); color: white; }
        
        /* زر التواصل الجديد */
        .support-link-btn {
            position: fixed; bottom: 20px; right: 20px; 
            background: #25D366; color: white; padding: 10px 18px; 
            border-radius: 30px; font-weight: 700; font-size: 13px;
            display: flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
            text-decoration: none; z-index: 999;
            transition: transform 0.2s;
        }
        .support-link-btn:active { transform: scale(0.95); }

        .dev-footer-simple { text-align: center; margin-top: 15px; padding: 8px; color: #000; font-weight: 700; font-size: 13px; border-top: 1px solid #e2e8f0; }
        input, select { width: 100%; padding: 10px; border-radius: 10px; border: 2px solid var(--border); margin-bottom: 8px; text-align: center; }
    </style>
</head>
<body>

<div id="loadingOverlay"><div class="spinner"></div></div>

<div class="container" id="searchSection">
    <div class="main-card">
        <div id="welcomeArea" style="text-align:center;">
            <div ondblclick="enterAdmin()"><img src="1000255629.jpg" style="width: 100px; border-radius: 12px;"></div>
            <h1 style="font-size: 20px; font-weight: 900; color: var(--primary);">مدرسة الاستقلال للتعليم الأساسي</h1>
            <p style="color: #64748b; font-weight: 700; font-size: 12px;">نتائج الامتحانات 2026</p>
            <div style="max-width:450px; margin:0 auto;">
                <input type="number" id="searchID" placeholder="أدخل الرقم الوطني للطالبة">
                <button class="btn btn-primary" onclick="loadResult()"><i class="fas fa-search"></i> استخراج النتيجة</button>
            </div>
        </div>

        <div id="resultView" style="display:none;">
            <div style="text-align: center; margin-bottom: 5px;">
                <h2 id="outName" style="margin: 0; font-size: 17px;"></h2>
                <div id="outYear" style="color: var(--accent); font-weight: 800; font-size: 13px;"></div>
            </div>
            <table class="res-table">
                <thead><tr><th>المادة</th><th>أعمال</th><th>من</th><th>امتحان</th><th>من</th><th>المجموع</th></tr></thead>
                <tbody id="resTbody"></tbody>
            </table>
            <div class="summary-box">
                <div style="display:flex; justify-content:space-between; padding:5px 12px; font-size:13px;"><span>المجموع:</span><span id="outTotalSum" style="font-weight:900;"></span></div>
                <div style="display:flex; justify-content:space-between; padding:5px 12px; font-size:13px;"><span>النسبة:</span><span id="outPercent" style="font-weight:900;"></span></div>
                <div style="text-align:center; padding:10px; font-weight:900; border-top:1px solid #eee;" id="outGrade"></div>
                <div id="adminMessageArea" style="text-align:center; padding:10px; font-size:13px; font-style:italic;"></div>
            </div>
            <button class="btn" style="background:#e2e8f0; margin-top:10px;" onclick="location.reload()">بحث جديد</button>
        </div>
        <div class="dev-footer-simple">تم تطويره بواسطة عماد الدين نجم</div>
    </div>
</div>

<a href="https://wa.me/218920317335?text=السلام%20عليكم،%20عندي%20استفسار%20بخصوص%20المنظومة" class="support-link-btn">
    <i class="fab fa-whatsapp"></i>
    التواصل هنا للاستفسار
</a>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyDKEPjQMKD2lt74sdGM0k796icnyFTmmIQ",
      databaseURL: "https://istiqlal-school-302c8-default-rtdb.firebaseio.com",
      projectId: "istiqlal-school-302c8",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function loadResult() {
        const id = document.getElementById('searchID').value;
        if(!id) return;
        document.getElementById('loadingOverlay').style.display='flex';
        db.ref('students/'+id).once('value', snap => {
            document.getElementById('loadingOverlay').style.display='none';
            if(snap.exists()) showData(snap.val());
            else alert("الرقم غير موجود");
        });
    }

    function showData(data) {
        document.getElementById('welcomeArea').style.display='none';
        document.getElementById('resultView').style.display='block';
        document.getElementById('outName').innerText = data.name;
        document.getElementById('outYear').innerText = "الصف: " + data.year;
        let h=""; let hasFail=false;
        const subjects = ["التربية الإسلامية", "الحاسوب", "الرياضيات", "العلوم", "الكتابة", "اللغة الإنجليزية", "الاجتماعيات", "اللغة العربية"];
        subjects.forEach(k => {
            if(data.subjects && data.subjects[k]) {
                const s = data.subjects[k];
                const isFail = s.sum < (s.max/2);
                if(isFail) hasFail = true;
                h+=`<tr><td>${k}</td><td>${s.wG}</td><td>${s.wM}</td><td>${s.eG}</td><td>${s.eM}</td><td style="color:${isFail?'red':'black'}">${s.sum}</td></tr>`;
            }
        });
        document.getElementById('resTbody').innerHTML=h;
        document.getElementById('outTotalSum').innerText = data.totalGot + " / " + data.totalMax;
        document.getElementById('outPercent').innerText = data.percent + "%";
        const g = document.getElementById('outGrade');
        if(hasFail) {
            g.innerText = "فرصة ثانية (الدور الثاني)"; g.style.color = "var(--danger)";
        } else {
            g.innerText = "ناجحة"; g.style.color = "var(--success)";
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        }
    }
</script>
</body>
</html>
