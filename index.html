<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة نتائج الامتحانات الاستقلال</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --primary: #1e3a8a;
            --accent: #b45309;
            --success: #059669;
            --danger: #e11d48;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #1e293b;
            --border: #cbd5e1;
        }

        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; transition: 0.2s ease; }
        body { margin: 0; background: var(--bg); color: var(--text); padding: 5px; min-height: 100vh; position: relative; }
        .container { max-width: 1100px; margin: 15px auto; position: relative; z-index: 10; }
        .main-card { background: var(--card); border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid var(--border); }
        
        /* التبويبات */
        .admin-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; background: #e2e8f0; font-weight: 700; cursor: pointer; color: #64748b; }
        .tab-btn.active { background: var(--primary); color: white; }

        .admin-section { display: none; }
        .admin-section.active { display: block; }

        input, select { width: 100%; padding: 10px; border-radius: 10px; border: 2px solid var(--border); background: #f8fafc; outline: none; font-size: 15px; margin-bottom: 10px; text-align: center; }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 17px; }
        .btn-primary { background: var(--primary); color: white; }
        
        #resultView { display: none; margin-top: 20px; padding: 20px; border: 3px solid var(--primary); border-radius: 12px; background: #fff; }
        .res-table { width: 100%; border-collapse: collapse; }
        .res-table th { background: var(--primary); color: white; padding: 10px 5px; font-size: 12px; border: 1px solid #ddd; }
        .res-table td { padding: 10px 5px; border: 1px solid #eee; text-align: center; font-weight: 900; }

        /* شيت الرصد الجماعي */
        .bulk-student-box { border: 2px solid var(--primary); border-radius: 15px; padding: 15px; margin-bottom: 20px; background: #fff; }
        .bulk-student-name { font-weight: 900; color: var(--primary); font-size: 19px; display: block; padding-bottom: 10px; margin-bottom: 10px; border-bottom: 2px solid #eff6ff; }
        .bulk-row-grid { display: grid; grid-template-columns: 2fr 1fr 0.8fr 1fr 0.8fr; gap: 5px; align-items: center; margin-bottom: 8px; border-bottom: 1px solid #f1f5f9; padding-bottom: 5px; }
        .bulk-row-grid input { margin-bottom: 0; padding: 6px; font-size: 13px; border: 1px solid #cbd5e1; }
        .header-labels { display: grid; grid-template-columns: 2fr 1fr 0.8fr 1fr 0.8fr; gap: 5px; text-align: center; font-size: 11px; font-weight: 800; color: #64748b; margin-bottom: 5px; }

        .status-badge { padding: 5px 10px; border-radius: 20px; font-size: 12px; float: left; margin-top: 5px; font-weight: 700; }
        .status-online { background: #dcfce7; color: #166534; }
        .status-offline { background: #fee2e2; color: #991b1b; }

        .dev-footer-simple { text-align: center; margin-top: 30px; padding: 20px; color: #000; font-weight: 700; font-size: 15px; border-top: 1px solid #e2e8f0; }

        @media print {
            .btn, .search-container, #adminPortal, .admin-tabs, .dev-footer-simple { display: none !important; }
            #resultView { display: block !important; width: 100%; border: none; }
        }
    </style>
</head>
<body>

<div class="container" id="searchSection">
    <div class="main-card">
        <div class="school-header" style="text-align:center; margin-bottom:25px;">
            <div class="school-icon" style="font-size:45px; color:var(--primary); cursor:pointer;" ondblclick="enterAdmin()"><i class="fas fa-school"></i></div>
            <h1 style="margin: 0; font-size: 28px; font-weight: 900; color: var(--primary);">منظومة نتائج الاستقلال</h1>
            <p style="color: #64748b; font-weight: 700; font-size: 14px;">نتائج الامتحانات 2026</p>
        </div>

        <div class="search-container" style="max-width:450px; margin:0 auto;">
            <label style="display:block; font-weight:800; margin-bottom:8px;">الرقم الوطني للطالبة:</label>
            <input type="number" id="searchID" placeholder="أدخل الرقم هنا...">
            <button class="btn btn-primary" onclick="loadResult()"><i class="fas fa-search"></i> استخراج النتيجة</button>
        </div>

        <div id="resultView">
            <div style="text-align: center; margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 15px;">
                <h2 id="outName" style="margin: 0; font-size: 22px; color: var(--text);"></h2>
                <div id="outYear" style="color: var(--accent); font-weight: 800; font-size: 16px; margin-top: 5px;"></div>
            </div>
            <table class="res-table" style="width:100%;">
                <thead>
                    <tr><th style="width: 180px;">المادة</th><th>الأعمال</th><th>النهاية الصغرى</th><th>الامتحان</th><th>النهاية الكبرى</th><th>المجموع</th></tr>
                </thead>
                <tbody id="resTbody"></tbody>
            </table>
            <div style="margin-top:0px; border:2px solid var(--primary); border-top:none; background:#f8fafc; border-radius:0 0 10px 10px;">
                <div style="display:flex; justify-content:space-between; padding:12px 20px; border-bottom:1px solid #e2e8f0;">
                    <span>المجموع الكلي:</span><span id="outTotalSum" style="font-weight:900; color:var(--primary); font-size:20px;"></span>
                </div>
                <div style="display:flex; justify-content:space-between; padding:12px 20px; border-bottom:1px solid #e2e8f0;">
                    <span>النسبة المئوية:</span><span id="outPercent" style="font-weight:900; color:var(--primary); font-size:20px;"></span>
                </div>
                <div style="display:flex; justify-content:space-between; padding:12px 20px;">
                    <span>التقدير العام:</span><span id="outGrade" style="font-weight:900; color:var(--primary); font-size:20px;"></span>
                </div>
            </div>
            <div id="failMissions" style="display:none; background:#fff1f2; border:2px solid var(--danger); color:var(--danger); padding:15px; border-radius:10px; margin-top:15px; text-align:center;"></div>
            <button class="btn" style="background:#475569; color:white; margin-top:25px;" onclick="window.print()"><i class="fas fa-print"></i> طباعة الشهادة</button>
        </div>
        <div class="dev-footer-simple">تم تطويره بواسطة عماد الدين نجم</div>
    </div>
</div>

<div class="container" id="adminPortal" style="display:none;">
    <div class="main-card">
        <h2 style="color: var(--primary); text-align: center;"><i class="fas fa-tools"></i> بوابة المطور</h2>
        
        <div id="systemStatusDisplay" class="status-badge">...</div>
        <button onclick="toggleSystemStatus()" class="btn" style="width:auto; padding:5px 15px; font-size:12px; margin-bottom:15px;">تبديل حالة المنظومة</button>

        <div class="admin-tabs">
            <button class="tab-btn active" onclick="showTab('individualTab', this)">الرصد الفردي</button>
            <button class="tab-btn" onclick="showTab('bulkTab', this)">الرصد الجماعي الشامل</button>
        </div>

        <div id="individualTab" class="admin-section active">
            <div style="background:#f8fafc; padding:15px; border-radius:15px; border:1px solid #ddd;">
                <label>تعديل طالبة سابقة:</label>
                <div style="display: flex; gap: 8px; margin-bottom:10px;">
                    <input type="number" id="editID" placeholder="الرقم الوطني...">
                    <button onclick="fetchForEdit()" style="background:var(--primary); color:white; border:none; padding:0 15px; border-radius:10px;">جلب</button>
                </div>
                <input type="text" id="inName" placeholder="الاسم الرباعي">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <input type="number" id="inID" placeholder="الرقم الوطني">
                    <select id="inYear" onchange="autoFillSubjects()">
                        <option value="">-- الصف --</option>
                        <option value="خامس">خامس</option><option value="سادس">سادس</option>
                        <option value="سابع">سابع</option><option value="ثامن">ثامن</option>
                    </select>
                </div>
                <div id="subjectsContainer"></div>
                <button onclick="addNewSubject()" class="btn" style="background:#e2e8f0; color:#475569; margin-bottom:15px;">+ إضافة مادة</button>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <button class="btn" style="background: var(--success); color:white;" onclick="saveToFirebase()">حفظ البيانات</button>
                    <button class="btn" style="background: var(--danger); color:white;" onclick="deleteStudent()">حذف</button>
                </div>
            </div>
        </div>

        <div id="bulkTab" class="admin-section">
            <div style="background:#f0fdf4; padding:15px; border-radius:15px; border:2px solid var(--success);">
                <select id="bulkSelectYear" onchange="loadBulkStudentsList()">
                    <option value="">-- اختر الصف لعرض شيت الرصد --</option>
                    <option value="خامس">خامس</option><option value="سادس">سادس</option>
                    <option value="سابع">سابع</option><option value="ثامن">ثامن</option>
                </select>
                <div id="bulkStudentsContainer" style="max-height: 600px; overflow-y: auto; margin-top:10px; padding:5px;">
                    <p style="text-align:center; color:#64748b;">اختر الصف من القائمة بالأعلى...</p>
                </div>
                <button id="saveAllBulkBtn" class="btn" style="display:none; background:var(--success); color:white; margin-top:15px;" onclick="saveAllBulkData()">
                    <i class="fas fa-save"></i> حفظ جميع الطالبات في هذا الصف
                </button>
            </div>
        </div>

        <button onclick="location.reload()" class="btn" style="background:none; margin-top:20px;">خروج</button>
        <div class="dev-footer-simple">تم تطويره بواسطة عماد الدين نجم</div>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyDKEPjQMKD2lt74sdGM0k7hY2Wb8E-X55g", 
      databaseURL: "https://istiqlal-school-302c8-default-rtdb.firebaseio.com",
      projectId: "istiqlal-school-302c8",
      appId: "1:1037263844752:web:56dc0ba0d346045610a514"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function showTab(tabId, btn) {
        document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btn.classList.add('active');
    }

    let isSystemEnabled = true;
    db.ref('system_status').on('value', snap => {
        isSystemEnabled = snap.exists() ? snap.val() : true;
        const d = document.getElementById('systemStatusDisplay');
        if(d) {
            d.innerText = isSystemEnabled ? "المنظومة: مفعلة" : "المنظومة: معطلة";
            d.className = "status-badge " + (isSystemEnabled ? "status-online" : "status-offline");
        }
    });
    function toggleSystemStatus() { db.ref('system_status').set(!isSystemEnabled); }

    const schoolSubjects = {
        "خامس": ["الرياضيات", "العلوم", "اللغة العربية", "اللغة الإنجليزية", "التربية الإسلامية", "الاجتماعيات", "الحاسوب", "الكتابة"],
        "سادس": ["الرياضيات", "العلوم", "اللغة العربية", "اللغة الإنجليزية", "التربية الإسلامية", "الاجتماعيات", "الحاسوب", "الكتابة"],
        "سابع": ["الرياضيات", "العلوم", "اللغة العربية", "اللغة الإنجليزية", "التربية الإسلامية", "التاريخ", "الجغرافيا", "الحاسوب", "الكتابة"],
        "ثامن": ["الرياضيات", "العلوم", "اللغة العربية", "اللغة الإنجليزية", "التربية الإسلامية", "التاريخ", "الجغرافيا", "الحاسوب", "الكتابة"]
    };

    function enterAdmin() { if(prompt("رمز المطور:") === "74742000") { document.getElementById('searchSection').style.display='none'; document.getElementById('adminPortal').style.display='block'; } }

    function addNewSubject(v={n:'',wg:'',wm:40,eg:'',em:60}) {
        const div = document.createElement('div'); div.style = "border:1px solid #ddd; padding:10px; border-radius:10px; margin-bottom:10px; position:relative; background:#fff;";
        div.innerHTML = `<i class="fas fa-trash" style="position:absolute; left:10px; color:red; cursor:pointer;" onclick="this.parentElement.remove()"></i>
            <input type="text" class="m-name" value="${v.n}" style="width:80%; margin-bottom:8px; font-weight:bold;">
            <div style="display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:5px; text-align:center; font-size:11px;">
                <span>أعمال</span><span>من</span><span>امتحان</span><span>من</span>
                <input type="number" class="m-w-got" value="${v.wg}">
                <input type="number" class="m-w-max" value="${v.wm}">
                <input type="number" class="m-e-got" value="${v.eg}">
                <input type="number" class="m-e-max" value="${v.em}">
            </div>`;
        document.getElementById('subjectsContainer').appendChild(div);
    }

    function autoFillSubjects() {
        const yr = document.getElementById('inYear').value;
        const con = document.getElementById('subjectsContainer'); con.innerHTML = ""; 
        if (schoolSubjects[yr]) schoolSubjects[yr].forEach(s => addNewSubject({n:s, wg:'', wm:40, eg:'', em:60}));
    }

    function loadBulkStudentsList() {
        const yr = document.getElementById('bulkSelectYear').value;
        const container = document.getElementById('bulkStudentsContainer');
        if(!yr) return;
        container.innerHTML = "<p style='text-align:center;'>جاري التحميل...</p>";
        db.ref('students').orderByChild('year').equalTo(yr).once('value', snap => {
            if(!snap.exists()) { container.innerHTML = "لا يوجد طالبات"; return; }
            let h = "";
            snap.forEach(child => {
                const s = child.val(); const sid = child.key;
                h += `<div class="bulk-student-box" data-id="${sid}">
                    <span class="bulk-student-name">${s.name}</span>
                    <div class="header-labels"><div>المادة</div><div>أعمال</div><div>من</div><div>امتحان</div><div>من</div></div>`;
                schoolSubjects[yr].forEach(subName => {
                    const ex = (s.subjects && s.subjects[subName]) ? s.subjects[subName] : {wG:'', eG:'', wM:40, eM:60};
                    h += `<div class="bulk-row-grid" data-sub="${subName}">
                        <label>${subName}</label>
                        <input type="number" class="bw-g" value="${ex.wG}">
                        <input type="number" class="bw-m" value="${ex.wM}">
                        <input type="number" class="be-g" value="${ex.eG}">
                        <input type="number" class="be-m" value="${ex.eM}">
                    </div>`;
                });
                h += `</div>`;
            });
            container.innerHTML = h; document.getElementById('saveAllBulkBtn').style.display = 'block';
        });
    }

    async function saveAllBulkData() {
        const boxes = document.querySelectorAll('.bulk-student-box');
        for(let box of boxes) {
            const sid = box.getAttribute('data-id');
            let subs = {}; let tS = 0; let tM = 0;
            box.querySelectorAll('.bulk-row-grid').forEach(grid => {
                const n = grid.getAttribute('data-sub');
                const wg = parseFloat(grid.querySelector('.bw-g').value) || 0;
                const wm = parseFloat(grid.querySelector('.bw-m').value) || 0;
                const eg = parseFloat(grid.querySelector('.be-g').value) || 0;
                const em = parseFloat(grid.querySelector('.be-m').value) || 0;
                subs[n] = {wG:wg, wM:wm, eG:eg, eM:em, sum:(wg+eg), max:(wm+em)};
                tS += (wg+eg); tM += (wm+em);
            });
            await db.ref('students/'+sid).update({subjects:subs, totalGot:tS, totalMax:tM, percent:((tS/tM)*100).toFixed(1)});
        }
        alert("تم الحفظ بنجاح لكل طالبات الصف!");
    }

    function fetchForEdit() {
        const id = document.getElementById('editID').value;
        db.ref('students/'+id).once('value', snap => {
            if(snap.exists()){
                const d = snap.val();
                document.getElementById('inName').value = d.name; document.getElementById('inID').value = id; document.getElementById('inYear').value = d.year;
                const con = document.getElementById('subjectsContainer'); con.innerHTML = "";
                for(let k in d.subjects){ const s = d.subjects[k]; addNewSubject({n:k, wg:s.wG, wm:s.wM, eg:s.eG, em:s.eM}); }
            } else alert("غير موجود");
        });
    }

    function saveToFirebase() {
        const id=document.getElementById('inID').value; const name=document.getElementById('inName').value; const yr=document.getElementById('inYear').value;
        if(!id||!name) return alert("أكمل البيانات");
        let subs={}; let tS=0; let tM=0;
        document.querySelectorAll('.m-name').forEach((nEl, i)=>{
            const n=nEl.value; const parent=nEl.parentElement;
            const wg=parseFloat(parent.querySelector('.m-w-got').value)||0; const wm=parseFloat(parent.querySelector('.m-w-max').value)||0;
            const eg=parseFloat(parent.querySelector('.m-e-got').value)||0; const em=parseFloat(parent.querySelector('.m-e-max').value)||0;
            if(n){ subs[n]={wG:wg, wM:wm, eG:eg, eM:em, sum:(wg+eg), max:(wm+em)}; tS+=(wg+eg); tM+=(wm+em); }
        });
        db.ref('students/'+id).set({name, year:yr, subjects:subs, percent:((tS/tM)*100).toFixed(1), totalGot:tS, totalMax:tM}).then(()=>alert("تم الحفظ"));
    }

    function deleteStudent() {
        const id = document.getElementById('inID').value;
        if(id && confirm("حذف نهائي؟")) db.ref('students/'+id).remove().then(()=>location.reload());
    }

    function loadResult() {
        if(!isSystemEnabled) { alert("المنظومة معطلة حالياً للرصد."); return; }
        const sid=document.getElementById('searchID').value;
        db.ref('students/'+sid).once('value', snap=>{ if(snap.exists()) showData(snap.val()); else alert("الرقم الوطني غير مسجل"); });
    }

    function showData(data) {
        document.getElementById('resultView').style.display='block';
        document.getElementById('outName').innerText = data.name;
        document.getElementById('outYear').innerText = "الصف: " + data.year;
        document.getElementById('outPercent').innerText = data.percent + "%";
        document.getElementById('outTotalSum').innerText = data.totalGot + " من " + data.totalMax;
        let h=""; let failed=[]; let hasFail=false;
        for(let k in data.subjects){
            const s=data.subjects[k]; const isFail = s.sum < (s.max/2);
            if(isFail) { hasFail=true; failed.push(k); }
            h+=`<tr><td>${k}</td><td>${s.wG}</td><td>${s.wM}</td><td>${s.eG}</td><td>${s.eM}</td><td style="color:${isFail?'red':'black'}">${s.sum}</td></tr>`;
        }
        document.getElementById('resTbody').innerHTML=h;
        let p=parseFloat(data.percent);
        document.getElementById('outGrade').innerText = hasFail ? "له دور ثانٍ" : (p>=85?"ممتاز":p>=75?"جيد جداً":p>=65?"جيد":p>=50?"مقبول":"ضعيف");
        document.getElementById('failMissions').style.display=hasFail?'block':'none';
        if(hasFail) document.getElementById('failMissions').innerHTML="المواد: "+failed.join(' - ');
    }
</script>
</body>
</html>
