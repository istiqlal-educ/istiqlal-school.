<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدرسة الاستقلال للتعليم الأساسي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --primary: #1e3a8a;
            --accent: #b45309;
            --success: #059669;
            --danger: #e11d48;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #1e293b;
            --border: #cbd5e1;
        }

        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); padding: 5px; min-height: 100vh; overflow-x: hidden; }
        .container { max-width: 1000px; margin: 2px auto; position: relative; }
        
        #loadingOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8); z-index: 9999; justify-content: center; align-items: center; flex-direction: column;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* حواف جمالية للكود الأصلي */
        .container::before, .container::after {
            content: ""; position: absolute; top: 0; bottom: 0; width: 6px;
            background: var(--primary); z-index: 0; border-radius: 10px; opacity: 0.8;
        }
        .container::before { right: -12px; }
        .container::after { left: -12px; }

        .main-card { 
            background: var(--card); border-radius: 20px; padding: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid var(--border);
            position: relative; z-index: 1; width: 100%;
        }
        
        /* تنسيقات بوابة المطور المطورة */
        .admin-tabs { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .tab-btn { flex: 1; min-width: 100px; padding: 10px; border-radius: 10px; border: none; background: #e2e8f0; font-weight: 700; cursor: pointer; color: #64748b; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(30,58,138,0.3); }

        .admin-section { display: none; padding: 10px; }
        .admin-section.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        input, select, textarea { width: 100%; padding: 10px; border-radius: 10px; border: 2px solid var(--border); background: #f8fafc; outline: none; font-size: 14px; margin-bottom: 8px; text-align: center; transition: 0.3s; }
        input:focus { border-color: var(--primary); background: #fff; }

        .btn { width: 100%; padding: 12px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 16px; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn:active { transform: scale(0.98); }
        
        #resultView { display: none; margin-top: 5px; padding: 2px; border-radius: 12px; background: #fff; }
        
        /* جدول النتائج - الكود الأصلي */
        .res-table { width: 100%; border-collapse: collapse; table-layout: fixed; border: 1px solid var(--border); margin-bottom: 5px; }
        .res-table th { background: var(--primary); color: white; padding: 4px 1px; font-size: 9px; border: 1px solid #fff; }
        .res-table td { padding: 4px 1px; border: 1px solid #e2e8f0; text-align: center; font-weight: 900; color: #000; font-size: 11px; }

        .summary-box { margin-top: 0; border: 2px solid var(--primary); background: #f8fafc; border-radius: 0 0 10px 10px; }
        
        .status-pass-text { color: var(--success) !important; font-weight: 900; }
        .status-fail-text { color: var(--danger) !important; font-weight: 900; }

        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-box { padding: 15px; border-radius: 15px; text-align: center; border: 1px solid var(--border); background: #fff; }
        .stat-value { font-size: 22px; color: var(--primary); display: block; font-weight: 900; }

        .dev-footer-simple { text-align: center; margin-top: 15px; padding: 8px; color: #000; font-weight: 700; font-size: 13px; border-top: 1px solid #e2e8f0; }

        .bulk-row { background: #fff; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid var(--border); position: relative; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .bulk-row:hover { border-color: var(--primary); }
        .bulk-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr; gap: 5px; margin-top: 10px; }
        .delete-btn { position: absolute; left: 15px; top: 15px; color: var(--danger); cursor: pointer; font-size: 18px; transition: 0.3s; }

        #statusCard { padding: 15px; border-radius: 12px; margin-top: 10px; text-align: center; font-weight: 800; font-size: 14px; border: 2px solid transparent; }
        .card-excellent { background: #f0fdf4; color: #166534; border-color: #22c55e !important; }
        .card-good { background: #fefce8; color: #854d0e; border-color: #eab308 !important; }
        .card-fail { background: #fef2f2; color: #991b1b; border-color: #ef4444 !important; }
        
        .support-link-btn { position: fixed; bottom: 20px; right: 20px; background: #25D366; color: white; padding: 10px 18px; border-radius: 30px; font-weight: 700; font-size: 13px; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-decoration: none; z-index: 999; }

        @media print {
            .btn, .search-container, #adminPortal, .admin-tabs, .dev-footer-simple, .container::before, .container::after, #backToStatsBtn, .school-header, .support-link-btn { display: none !important; }
            #resultView { display: block !important; width: 100%; border: none; padding: 0; }
        }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner"></div>
    <div style="margin-top:10px; font-weight:900; color:var(--primary);">جاري العمل...</div>
</div>

<div class="container" id="searchSection">
    <div class="main-card">
        <div id="welcomeArea">
            <div class="school-header" style="text-align:center; margin-bottom:10px;">
                <div style="cursor:pointer;" ondblclick="enterAdmin()">
                    <img src="1000255629.jpg" style="width: 100px; height: auto; border-radius: 12px; margin-bottom: 2px;">
                </div>
                <h1 style="margin: 0; font-size: 20px; font-weight: 900; color: var(--primary);">مدرسة الاستقلال للتعليم الأساسي</h1>
                <p style="color: #64748b; font-weight: 700; font-size: 12px; margin: 0;">نتائج الامتحانات 2026</p>
            </div>

            <div style="max-width:450px; margin:0 auto;">
                <input type="number" id="searchID" placeholder="أدخل الرقم الوطني للطالبة...">
                <button class="btn btn-primary" onclick="loadResult()"><i class="fas fa-search"></i> استخراج النتيجة</button>
            </div>
        </div>

        <div id="resultView">
            <button id="backToStatsBtn" class="btn" style="background:var(--accent); color:white; margin-bottom:8px; padding: 8px; font-size:13px; display:none;" onclick="returnToStats()">
                <i class="fas fa-arrow-right"></i> العودة للإحصائيات
            </button>

            <div style="text-align: center; margin-bottom: 5px; border-bottom: 2px solid #eee; padding-bottom: 5px;">
                <h2 id="outName" style="margin: 0; font-size: 17px; color: var(--text);"></h2>
                <div id="outYear" style="color: var(--accent); font-weight: 800; font-size: 13px;"></div>
            </div>
            
            <table class="res-table">
                <thead><tr><th style="width:26%;">المادة</th><th>أعمال</th><th>صغرى</th><th>امتحان</th><th>كبرى</th><th>المجموع</th></tr></thead>
                <tbody id="resTbody"></tbody>
            </table>

            <div class="summary-box">
                <div id="totalRow" style="display:flex; justify-content:space-between; padding:5px 12px; border-bottom:1px solid #e2e8f0;"><span>المجموع:</span><span id="outTotalSum" style="font-weight:900;"></span></div>
                <div id="percentRow" style="display:flex; justify-content:space-between; padding:5px 12px; border-bottom:1px solid #e2e8f0;"><span>النسبة:</span><span id="outPercent" style="font-weight:900;"></span></div>
                <div style="display:flex; justify-content:space-between; padding:5px 12px;"><span>التقدير:</span><span id="outGrade" style="font-weight:900;"></span></div>
            </div>
            
            <div id="failMissions" style="display:none; background:#fee2e2; color:#991b1b; padding:8px; border-radius:10px; margin-top:8px; text-align:center; font-weight:900;">
                <div style="text-decoration:underline;">مواد الدور الثاني:</div>
                <div id="failListItems"></div>
            </div>

            <div id="statusCard" style="display:none;"></div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-top:10px;">
                <button class="btn" style="background:#475569; color:white;" onclick="window.print()"><i class="fas fa-print"></i> طباعة</button>
                <button class="btn" style="background:#e2e8f0;" onclick="location.reload()">بحث جديد</button>
            </div>
        </div>
        <div class="dev-footer-simple">تم تطويره بواسطة عماد الدين نجم</div>
    </div>
</div>

<a href="https://wa.me/218920317335" class="support-link-btn"><i class="fab fa-whatsapp"></i> التواصل للاستفسار</a>

<div class="container" id="adminPortal" style="display:none;">
    <div class="main-card">
        <h2 style="color: var(--primary); text-align: center; margin-bottom: 20px;"><i class="fas fa-user-shield"></i> لوحة تحكم المطور</h2>
        
        <div class="admin-tabs">
            <button class="tab-btn active" onclick="showTab('individualTab', this)">رصد فردي</button>
            <button class="tab-btn" onclick="showTab('bulkTab', this)">رصد جماعي</button>
            <button class="tab-btn" onclick="showTab('quickAddTab', this)">إضافة سريعة</button>
            <button class="tab-btn" id="statsTabBtn" onclick="showTab('statsTab', this)">إحصائيات</button>
        </div>

        <div id="individualTab" class="admin-section active">
            <input type="number" id="editID" placeholder="بحث بالرقم الوطني...">
            <button onclick="fetchForEdit()" class="btn btn-primary" style="margin-bottom:15px;">جلب البيانات</button>
            <input type="number" id="newStudentID" placeholder="الرقم الوطني">
            <input type="text" id="inName" placeholder="الاسم الرباعي">
            <select id="inYear" onchange="autoFillSubjects()">
                <option value="">-- اختر الصف --</option>
                <option value="خامس">خامس</option><option value="سادس">سادس</option>
                <option value="سابع">سابع</option><option value="ثامن">ثامن</option>
            </select>
            <div id="subjectsContainer"></div>
            <button class="btn" style="background:var(--success); color:white;" onclick="saveToFirebase()">حفظ الطالبة</button>
        </div>

        <div id="bulkTab" class="admin-section">
             <select id="bulkSelectYear" onchange="loadBulkStudentsList()">
                <option value="">-- اختر الصف (الرصد الجماعي الأبجدي) --</option>
                <option value="خامس">خامس</option><option value="سادس">سادس</option>
                <option value="سابع">سابع</option><option value="ثامن">ثامن</option>
            </select>
            <div id="bulkStudentsContainer"></div>
            <button id="saveAllBulkBtn" class="btn" style="display:none; background:var(--success); color:white; margin-top:15px;" onclick="saveAllBulkData()">حفظ الكل</button>
        </div>

        <div id="quickAddTab" class="admin-section">
            <select id="quickAddYear">
                <option value="">-- اختر الصف --</option>
                <option value="خامس">خامس</option><option value="سادس">سادس</option>
                <option value="سابع">سابع</option><option value="ثامن">ثامن</option>
            </select>
            <textarea id="quickAddArea" rows="10" placeholder="الاسم - الرقم الوطني (كل طالبة في سطر)"></textarea>
            <button class="btn btn-primary" onclick="processQuickAdd()">تنفيذ الإضافة</button>
        </div>

        <div id="statsTab" class="admin-section">
            <select id="statsSelectYear" onchange="loadClassStats()">
                <option value="">-- اختر الصف --</option>
                <option value="خامس">خامس</option><option value="سادس">سادس</option>
                <option value="سابع">سابع</option><option value="ثامن">ثامن</option>
            </select>
            <div id="statsContent" style="display:none;">
                <div class="stats-grid">
                    <div class="stat-box"><span>الإجمالي</span><span id="countTotal" class="stat-value">0</span></div>
                    <div class="stat-box"><span>ناجحة</span><span id="countPass" class="stat-value" style="color:var(--success)">0</span></div>
                </div>
                <table style="width:100%; border-collapse:collapse; background:#fff;">
                    <thead style="background:var(--primary); color:white;"><tr><th style="padding:10px;">الاسم (مرتب أبجدياً)</th><th>الحالة</th></tr></thead>
                    <tbody id="statsTbody"></tbody>
                </table>
            </div>
        </div>

        <button onclick="location.reload()" class="btn" style="background:none; margin-top:20px; color:var(--danger);">تسجيل الخروج</button>
    </div>
</div>

<script>
    // الإعدادات الأصلية
    const firebaseConfig = {
      apiKey: "AIzaSyDKEPjQMKD2lt74sdGM0k796icnyFTmmIQ",
      authDomain: "istiqlal-school-302c8.firebaseapp.com",
      databaseURL: "https://istiqlal-school-302c8-default-rtdb.firebaseio.com",
      projectId: "istiqlal-school-302c8",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    const schoolSubjects = {
        "خامس": ["التربية الإسلامية", "الحاسوب", "الرياضيات", "العلوم", "الكتابة", "اللغة الإنجليزية", "الاجتماعيات", "اللغة العربية"],
        "سادس": ["التربية الإسلامية", "الحاسوب", "الرياضيات", "العلوم", "الكتابة", "اللغة الإنجليزية", "الاجتماعيات", "اللغة العربية"],
        "سابع": ["التاريخ", "التربية الإسلامية", "الجغرافيا", "الحاسوب", "الرياضيات", "العلوم", "الكتابة", "اللغة الإنجليزية", "اللغة العربية"],
        "ثامن": ["التاريخ", "التربية الإسلامية", "الجغرافيا", "الحاسوب", "الرياضيات", "العلوم", "الكتابة", "اللغة الإنجليزية", "اللغة العربية"]
    };

    function showTab(tabId, btn) {
        document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btn.classList.add('active');
    }

    function enterAdmin() {
        const pass = prompt("رمز المطور:");
        if(!pass) return;
        document.getElementById('loadingOverlay').style.display='flex';
        db.ref('settings/dev_pass').once('value', snap => {
            if(String(pass).trim() === String(snap.val()).trim()) {
                auth.signInWithEmailAndPassword("istiqlaladmin@gmail.com", "emadnajm74742000").then(() => {
                    document.getElementById('loadingOverlay').style.display='none';
                    document.getElementById('searchSection').style.display='none';
                    document.getElementById('adminPortal').style.display='block';
                }).catch(e => { alert(e.message); document.getElementById('loadingOverlay').style.display='none'; });
            } else { alert("خطأ!"); document.getElementById('loadingOverlay').style.display='none'; }
        });
    }

    // الترتيب الأبجدي في الرصد الجماعي
    function loadBulkStudentsList() {
        const yr = document.getElementById('bulkSelectYear').value;
        const con = document.getElementById('bulkStudentsContainer');
        if(!yr) return;
        document.getElementById('loadingOverlay').style.display='flex';
        db.ref('students').orderByChild('year').equalTo(yr).once('value', snap => {
            let list = [];
            snap.forEach(c => { list.push({id: c.key, ...c.val()}); });
            list.sort((a,b) => a.name.localeCompare(b.name, 'ar')); // فرز أبجدي

            let html = "";
            list.forEach(s => {
                html += `<div class="bulk-row" data-id="${s.id}">
                    <i class="fas fa-trash delete-btn" onclick="deleteStudent('${s.id}')"></i>
                    <div style="font-weight:900; color:var(--primary);">${s.name}</div>`;
                schoolSubjects[yr].forEach(sub => {
                    const d = s.subjects[sub] || {wG:0, wM:40, eG:0, eM:60};
                    html += `<div class="bulk-grid" data-subject="${sub}">
                        <input type="text" value="${sub}" readonly style="background:#f0f9ff;">
                        <input type="number" class="wG" value="${d.wG}"> <input type="number" class="wM" value="${d.wM}">
                        <input type="number" class="eG" value="${d.eG}"> <input type="number" class="eM" value="${d.eM}">
                    </div>`;
                });
                html += `</div>`;
            });
            con.innerHTML = html;
            document.getElementById('saveAllBulkBtn').style.display = html ? "block" : "none";
            document.getElementById('loadingOverlay').style.display='none';
        });
    }

    // الترتيب الأبجدي في الإحصائيات
    function loadClassStats() {
        const yr = document.getElementById('statsSelectYear').value;
        db.ref('students').orderByChild('year').equalTo(yr).once('value', snap => {
            let list = []; let p=0, f=0;
            snap.forEach(s => { list.push({id: s.key, ...s.val()}); });
            list.sort((a,b) => a.name.localeCompare(b.name, 'ar')); // فرز أبجدي

            let rows = "";
            list.forEach(s => {
                let fail=false; for(let k in s.subjects){ if(s.subjects[k].sum < (s.subjects[k].max/2)) fail=true; }
                if(fail) f++; else p++;
                rows += `<tr onclick="viewFromStats('${s.id}')" style="cursor:pointer; border-bottom:1px solid #eee;">
                    <td style="padding:10px; font-weight:700;">${s.name}</td>
                    <td style="text-align:center;"><span class="${fail?'status-fail-text':'status-pass-text'}">${fail?'دور ثانٍ':'ناجحة'}</span></td>
                </tr>`;
            });
            document.getElementById('countTotal').innerText=list.length;
            document.getElementById('countPass').innerText=p;
            document.getElementById('statsTbody').innerHTML=rows;
            document.getElementById('statsContent').style.display='block';
        });
    }

    function saveAllBulkData() {
        if(!confirm("حفظ جميع التعديلات؟")) return;
        let updates = {};
        document.querySelectorAll('.bulk-row').forEach(row => {
            const id = row.getAttribute('data-id');
            const yr = document.getElementById('bulkSelectYear').value;
            const name = row.querySelector('div[style*="900"]').innerText;
            let subs = {}; let tG=0, tM=0;
            row.querySelectorAll('.bulk-grid').forEach(g => {
                const sub = g.getAttribute('data-subject');
                const wg = parseFloat(g.querySelector('.wG').value)||0;
                const wm = parseFloat(g.querySelector('.wM').value)||0;
                const eg = parseFloat(g.querySelector('.eG').value)||0;
                const em = parseFloat(g.querySelector('.eM').value)||0;
                subs[sub] = {wG:wg, wM:wm, eG:eg, eM:em, sum:(wg+eg), max:(wm+em)};
                tG+=(wg+eg); tM+=(wm+em);
            });
            updates['students/'+id] = {name, year:yr, subjects:subs, totalGot:tG, totalMax:tM, percent:((tG/tM)*100).toFixed(1)};
        });
        db.ref().update(updates).then(()=>alert("تم الحفظ بنجاح"));
    }

    // باقي الدوال الأصلية كما هي
    function loadResult() {
        const id=document.getElementById('searchID').value;
        db.ref('students/'+id).once('value', snap=>{ 
            if(snap.exists()) showData(snap.val()); else alert("غير موجود");
        });
    }

    function showData(data) {
        document.getElementById('welcomeArea').style.display = 'none';
        document.getElementById('resultView').style.display='block';
        document.getElementById('outName').innerText = data.name;
        document.getElementById('outYear').innerText = "الصف: " + data.year;
        let h=""; let failed=[]; let hasFail=false;
        const keys = schoolSubjects[data.year] || Object.keys(data.subjects);
        keys.forEach(k => {
            if(data.subjects[k]) {
                const s = data.subjects[k]; const isFail = s.sum < (s.max/2);
                if(isFail) { hasFail=true; failed.push(k); }
                h+=`<tr><td>${k}</td><td>${s.wG}</td><td>${s.wM}</td><td>${s.eG}</td><td>${s.eM}</td><td style="color:${isFail?'red':'black'}">${s.sum}</td></tr>`;
            }
        });
        document.getElementById('resTbody').innerHTML=h;
        const g = document.getElementById('outGrade');
        const card = document.getElementById('statusCard');
        card.style.display = "block";

        if(hasFail) {
            g.innerText = "لها دور ثانٍ"; g.className = "status-fail-text";
            document.getElementById('totalRow').style.display="none"; 
            document.getElementById('percentRow').style.display="none";
            document.getElementById('failMissions').style.display="block"; 
            document.getElementById('failListItems').innerText = failed.join(' - ');
            card.className = "card-fail";
            card.innerHTML = "لكل جواد كبوة، ونحن بانتظار عودتكِ للنجاح في الدور الثاني بإذن الله.";
        } else {
            document.getElementById('totalRow').style.display="flex"; 
            document.getElementById('percentRow').style.display="flex";
            document.getElementById('failMissions').style.display="none";
            document.getElementById('outTotalSum').innerText = data.totalGot + " من " + data.totalMax;
            document.getElementById('outPercent').innerText = data.percent + "%";
            let p = parseFloat(data.percent);
            if(p>=85) { g.innerText="ممتاز"; card.className="card-excellent"; card.innerHTML="ألف مبارك التفوق! أنتِ فخر للمدرسة. 🌟"; confetti(); }
            else { g.innerText="ناجحة"; card.className="card-good"; card.innerHTML="مبارك النجاح! تمنياتنا لكِ بمزيد من التقدم. ✨"; }
        }
    }

    function autoFillSubjects() {
        const yr = document.getElementById('inYear').value;
        const con = document.getElementById('subjectsContainer'); con.innerHTML = "";
        if(schoolSubjects[yr]) schoolSubjects[yr].forEach(s => {
            con.innerHTML += `<div style="display:grid; grid-template-columns:2fr 1fr 1fr 1fr 1fr; gap:5px; margin-bottom:5px;">
                <input type="text" value="${s}" readonly style="color:var(--success); font-weight:bold;">
                <input type="number" placeholder="أعمال" class="wG"> <input type="number" value="40" class="wM">
                <input type="number" placeholder="امتحان" class="eG"> <input type="number" value="60" class="eM">
            </div>`;
        });
    }

    function fetchForEdit() {
        const id = document.getElementById('editID').value;
        db.ref('students/'+id).once('value', snap => {
            if(!snap.exists()) return alert("غير موجود");
            const d = snap.val();
            document.getElementById('newStudentID').value = id;
            document.getElementById('inName').value = d.name;
            document.getElementById('inYear').value = d.year;
            autoFillSubjects();
            setTimeout(() => {
                document.querySelectorAll('#subjectsContainer > div').forEach(div => {
                    const subName = div.querySelector('input[type="text"]').value;
                    if(d.subjects[subName]) {
                        div.querySelector('.wG').value = d.subjects[subName].wG;
                        div.querySelector('.eG').value = d.subjects[subName].eG;
                    }
                });
            }, 200);
        });
    }

    function saveToFirebase() {
        const id = document.getElementById('newStudentID').value;
        const name = document.getElementById('inName').value;
        const yr = document.getElementById('inYear').value;
        let subs = {}; let tG=0, tM=0;
        document.querySelectorAll('#subjectsContainer > div').forEach(div => {
            const n = div.querySelector('input[type="text"]').value;
            const wg = parseFloat(div.querySelector('.wG').value)||0;
            const wm = parseFloat(div.querySelector('.wM').value)||0;
            const eg = parseFloat(div.querySelector('.eG').value)||0;
            const em = parseFloat(div.querySelector('.eM').value)||0;
            subs[n] = {wG:wg, wM:wm, eG:eg, eM:em, sum:(wg+eg), max:(wm+em)}; tG+=(wg+eg); tM+=(wm+em);
        });
        db.ref('students/'+id).set({name, year:yr, subjects:subs, totalGot:tG, totalMax:tM, percent:((tG/tM)*100).toFixed(1)}).then(()=>alert("تم الحفظ"));
    }

    function processQuickAdd() {
        const yr = document.getElementById('quickAddYear').value;
        const text = document.getElementById('quickAddArea').value;
        const lines = text.trim().split('\n');
        let updates = {};
        lines.forEach(line => {
            const parts = line.split(/[-،,]/);
            if(parts.length >= 2) {
                const name = parts[0].trim(); const id = parts[1].trim();
                let subs = {}; schoolSubjects[yr].forEach(s => { subs[s] = {wG:0, wM:40, eG:0, eM:60, sum:0, max:100}; });
                updates['students/'+id] = {name, year:yr, subjects:subs, totalGot:0, totalMax:schoolSubjects[yr].length*100, percent:"0.0"};
            }
        });
        db.ref().update(updates).then(()=>alert("تمت الإضافة"));
    }

    function deleteStudent(id) { if(confirm("حذف نهائي؟")) db.ref('students/'+id).remove().then(()=>loadBulkStudentsList()); }
    function viewFromStats(id) {
        document.getElementById('adminPortal').style.display='none';
        document.getElementById('searchSection').style.display='block';
        document.getElementById('welcomeArea').style.display='none';
        document.getElementById('backToStatsBtn').style.display='flex';
        document.getElementById('searchID').value = id;
        loadResult();
    }
    function returnToStats() {
        document.getElementById('resultView').style.display='none';
        document.getElementById('searchSection').style.display='none';
        document.getElementById('adminPortal').style.display='block';
        showTab('statsTab', document.getElementById('statsTabBtn'));
    }
</script>
</body>
</html>
