<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة مدرسة الاستقلال | المهندس عماد الدين نجم</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root{--primary:#2c3e50;--secondary:#34495e;--accent:#3498db;--success:#27ae60;--danger:#e74c3c;--light:#ecf0f1}body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background-color:#f4f7f6;margin:0;padding:20px;color:var(--primary)}.container{max-width:950px;margin:auto;background:#fff;padding:30px;border-radius:15px;box-shadow:0 10px 25px rgba(0,0,0,0.1);border-top:5px solid var(--accent)}header{text-align:center;margin-bottom:30px;border-bottom:2px solid var(--light);padding-bottom:20px;position:relative}h1{margin:0;color:var(--primary);font-size:24px}.dev-tag{font-size:12px;color:#7f8c8d;margin-top:5px;display:block}.admin-trigger{position:absolute;top:0;left:0;background:none;border:none;cursor:pointer;color:#eee;font-size:10px}.search-box{display:flex;gap:10px;margin-bottom:30px;justify-content:center;background:var(--light);padding:20px;border-radius:10px}input,select{padding:12px;border:1px solid #ddd;border-radius:8px;outline:0;font-size:16px;transition:.3s}button{padding:12px 25px;border:none;border-radius:8px;cursor:pointer;font-weight:700;transition:.3s;font-size:16px}.btn-search{background-color:var(--accent);color:#fff}.btn-search:hover{background-color:#2980b9}.admin-section{display:none;margin-top:20px;padding:20px;border:1px dashed #ccc;border-radius:10px;background:#fafafa}.admin-section.active{display:block}.tabs{display:flex;gap:5px;margin-bottom:15px;border-bottom:1px solid #ddd;padding-bottom:10px}.tab-btn{background:#eee;color:#666;padding:8px 15px;font-size:14px;border-radius:5px 5px 0 0}.tab-btn.active{background:var(--secondary);color:#fff}.result-card{display:none;background:#fff;border-radius:15px;overflow:hidden;box-shadow:0 5px 15px rgba(0,0,0,0.05);margin-top:20px;border:1px solid #eee}.result-header{background:var(--primary);color:#fff;padding:20px;text-align:center}table{width:100%;border-collapse:collapse;margin-top:10px}td,th{border:1px solid #eee;padding:12px;text-align:center}th{background-color:var(--light);color:var(--secondary)}.grade-excellent{color:#27ae60;font-weight:700}.grade-vgood{color:#2980b9;font-weight:700}.grade-good{color:#f39c12;font-weight:700}.grade-fail{color:#e74c3c;font-weight:700}.footer-note{text-align:center;margin-top:40px;font-size:12px;color:#95a5a6;border-top:1px solid #eee;padding-top:15px}.bulk-student-box{background:#fff;border:1px solid #ddd;border-radius:10px;padding:15px;margin-bottom:15px}.bulk-row-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;gap:5px;align-items:center;margin-bottom:5px;padding:5px;border-bottom:1px solid #f9f9f9}.bulk-row-grid input{padding:4px;text-align:center;font-size:12px}.grid-header{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;gap:5px;font-weight:700;text-align:center;margin-bottom:5px;color:#7f8c8d;font-size:10px}
    </style>
</head>
<body>
<div class="container">
    <header>
        <button class="admin-trigger" onclick="enterAdmin()">المطور</button>
        <h1>منظومة عرض النتائج الإلكترونية</h1>
        <span class="dev-tag">مدرسة الاستقلال للتعليم الأساسي</span>
    </header>
    <div id="searchSection"><div class="search-box"><input type="text" id="searchID" placeholder="أدخل رقم القيد الخاص بك..."><button class="btn-search" onclick="loadResult()">بحث عن النتيجة</button></div></div>
    <div id="adminPortal" style="display:none"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px"><h3 style="margin:0;color:var(--accent)">بوابة الإدارة</h3><button onclick="location.reload()" style="background:#7f8c8d;color:#fff;padding:5px 15px;font-size:12px">خروج</button></div><div class="tabs"><button class="tab-btn active" onclick="showTab('addSingle',this)">إضافة/تعديل طالب</button><button class="tab-btn" onclick="showTab('bulkEdit',this)">رصد درجات الصف</button></div><div id="addSingle" class="admin-section active"><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:15px"><input type="text" id="inName" placeholder="اسم الطالب الرباعي"><input type="text" id="inID" placeholder="رقم القيد"><select id="inYear" onchange="autoFillSubjects()"><option value="">اختر الصف</option><option value="خامس">خامس</option><option value="سادس">سادس</option><option value="سابع">سابع</option><option value="ثامن">ثامن</option></select></div><div id="subjectsContainer" style="margin-bottom:15px"></div><div style="display:flex;gap:10px"><button onclick="saveToFirebase()" style="background:var(--success);color:#fff;flex:2">حفظ البيانات</button><input type="text" id="editID" placeholder="رقم القيد للتعديل" style="flex:1"><button onclick="fetchForEdit()" style="background:var(--accent);color:#fff">تعديل</button><button onclick="deleteStudent()" style="background:var(--danger);color:#fff">حذف</button></div></div><div id="bulkEdit" class="admin-section"><div style="margin-bottom:15px;display:flex;gap:10px"><select id="bulkSelectYear" style="flex:1"><option value="">اختر الصف للرصد</option><option value="خامس">خامس</option><option value="سادس">سادس</option><option value="سابع">سابع</option><option value="ثامن">ثامن</option></select><button onclick="loadBulkStudentsList()" style="background:var(--accent);color:#fff">عرض قائمة الصف</button></div><div id="bulkStudentsContainer"></div><button id="saveAllBulkBtn" onclick="saveAllBulkData()" style="display:none;width:100%;margin-top:20px;background:var(--success);color:#fff">حفظ جميع الدرجات المرصودة الآن</button></div></div>
    <div id="resultView" class="result-card"><div class="result-header"><h2 id="outName" style="margin:0 0 10px 0">اسم الطالب</h2><div id="outYear" style="opacity:.9">الصف الدراسي</div></div><div style="padding:20px"><table><thead><tr><th>المادة</th><th>أعمال</th><th>من</th><th>امتحان</th><th>من</th><th>المجموع</th></tr></thead><tbody id="resTbody"></tbody></table><div id="totalRow" style="display:flex;justify-content:space-between;margin-top:20px;padding:15px;background:var(--light);border-radius:8px"><strong>المجموع الكلي:</strong> <span id="outTotalSum" style="font-weight:700"></span></div><div id="percentRow" style="display:flex;justify-content:space-between;margin-top:5px;padding:15px;background:var(--light);border-radius:8px"><strong>النسبة المئوية:</strong> <span id="outPercent" style="font-weight:700"></span></div><div id="failMissions" style="display:none;margin-top:20px;padding:15px;background:#fdf2f2;border:1px solid #f8d7da;border-radius:8px;color:#721c24"><strong>مواد الدور الثاني:</strong><p id="failListItems" style="margin:10px 0 0 0;font-weight:700"></p></div><div style="text-align:center;margin-top:20px;padding:20px;border-top:2px solid var(--light)"><div style="font-size:14px;color:#7f8c8d;margin-bottom:5px">التقدير العام</div><div id="outGrade" style="font-size:32px">جاري الحساب...</div></div></div><button onclick="location.reload()" style="width:100%;border-radius:0;background:var(--secondary);color:#fff">بحث جديد</button></div>
    <footer class="footer-note">جميع الحقوق محفوظة &copy; 2024 - مدرسة الاستقلال<br><span style="color:#2c3e50;font-weight:700;margin-top:5px;display:inline-block">تم التطوير بواسطة م. عماد الدين نجم</span></footer>
</div>
<script>
const firebaseConfig={apiKey:"AIzaSyDKEPjQMKD2lt74sdGM0k7hY2Wb8E-X55g",databaseURL:"https://istiqlal-school-302c8-default-rtdb.firebaseio.com",projectId:"istiqlal-school-302c8",appId:"1:1037263844752:web:56dc0ba0d346045610a514"};firebase.initializeApp(firebaseConfig);const db=firebase.database();const schoolSubjects={"خامس":["التاريخ","التربية الإسلامية","الجغرافيا","الحاسوب","الرياضيات","العلوم","الكتابة","اللغة الإنجليزية","اللغة العربية"],"سادس":["التاريخ","التربية الإسلامية","الجغرافيا","الحاسوب","الرياضيات","العلوم","الكتابة","اللغة الإنجليزية","اللغة العربية"],"سابع":["التاريخ","التربية الإسلامية","الجغرافيا","الحاسوب","الرياضيات","العلوم","الكتابة","اللغة الإنجليزية","اللغة العربية"],"ثامن":["التاريخ","التربية الإسلامية","الجغرافيا","الحاسوب","الرياضيات","العلوم","الكتابة","اللغة الإنجليزية","اللغة العربية"]};function showTab(t,e){document.querySelectorAll(".admin-section").forEach(t=>t.classList.remove("active")),document.querySelectorAll(".tab-btn").forEach(t=>t.classList.remove("active")),document.getElementById(t).classList.add("active"),e.classList.add("active")}function enterAdmin(){const t=prompt("أدخل رمز المطور للدخول:");t&&db.ref("settings/dev_pass").once("value",e=>{e.val()===t?(document.getElementById("searchSection").style.display="none",document.getElementById("adminPortal").style.display="block"):alert("الرمز غير صحيح!")})}function addNewSubject(t={n:"",wg:"",wm:40,eg:"",em:60}){const e=document.createElement("div");e.style="border:1px solid #ddd; padding:8px; border-radius:10px; margin-bottom:8px; background:#fff;",e.innerHTML=`<div style="display:grid; grid-template-columns:2fr 1fr 1fr 1fr 1fr; gap:5px;"><input type="text" class="m-name" value="${t.n}" style="font-size:12px; margin-bottom:0;"><input type="number" class="m-w-got" value="${t.wg}" placeholder="أعمال" style="margin-bottom:0; padding:5px; font-size:12px;"><input type="number" class="m-w-max" value="${t.wm}" placeholder="من" style="margin-bottom:0; padding:5px; font-size:12px;"><input type="number" class="m-e-got" value="${t.eg}" placeholder="امتحان" style="margin-bottom:0; padding:5px; font-size:12px;"><input type="number" class="m-e-max" value="${t.em}" placeholder="من" style="margin-bottom:0; padding:5px; font-size:12px;"></div>`,document.getElementById("subjectsContainer").appendChild(e)}function autoFillSubjects(){const t=document.getElementById("inYear").value,e=document.getElementById("subjectsContainer");e.innerHTML="",schoolSubjects[t]&&schoolSubjects[t].forEach(t=>addNewSubject({n:t,wg:"",wm:40,eg:"",em:60}))}function loadBulkStudentsList(){const t=document.getElementById("bulkSelectYear").value,e=document.getElementById("bulkStudentsContainer");t?(e.innerHTML="جاري تحميل قائمة الطلاب...",db.ref("students").orderByChild("year").equalTo(t).once("value",n=>{if(!n.exists())return void(e.innerHTML="لا يوجد طلاب مسجلين في هذا الصف.");let a="";n.forEach(e=>{const n=e.val(),o=e.key;a+=`<div class="bulk-student-box" data-id="${o}"><strong style="display:block; margin-bottom:10px; color:var(--primary);">${n.name}</strong><div class="grid-header"><div>المادة</div><div>أعمال</div><div>من</div><div>امتحان</div><div>من</div></div>`,schoolSubjects[t].forEach(t=>{const e=n.subjects&&n.subjects[t]?n.subjects[t]:{wG:"",eG:"",wM:40,eM:60};a+=`<div class="bulk-row-grid" data-sub="${t}"><span style="font-size:11px;">${t}</span><input type="number" class="bw-g" value="${e.wG}"><input type="number" class="bw-m" value="${e.wM}"><input type="number" class="be-g" value="${e.eG}"><input type="number" class="be-m" value="${e.eM}"></div>`}),a+="</div>"}),e.innerHTML=a,document.getElementById("saveAllBulkBtn").style.display="block"})):void 0}async function saveAllBulkData(){const t=document.querySelectorAll(".bulk-student-box");for(let e of t){const t=e.getAttribute("data-id");let n={},a=0,o=0;e.querySelectorAll(".bulk-row-grid").forEach(t=>{const e=t.getAttribute("data-sub"),p=parseFloat(t.querySelector(".bw-g").value)||0,r=parseFloat(t.querySelector(".bw-m").value)||0,l=parseFloat(t.querySelector(".be-g").value)||0,u=parseFloat(t.querySelector(".be-m").value)||0;n[e]={wG:p,wM:r,eG:l,eM:u,sum:p+l,max:r+u},a+=p+l,o+=r+u}),await db.ref("students/"+t).update({subjects:n,totalGot:a,totalMax:o,percent:(a/o*100).toFixed(1)})}alert("تم حفظ جميع الدرجات بنجاح!")}function saveToFirebase(){const t=document.getElementById("inID").value,e=document.getElementById("inName").value,n=document.getElementById("inYear").value;if(!t||!e)return alert("يرجى إدخال الاسم ورقم القيد");let a={},o=0,p=0;document.querySelectorAll(".m-name").forEach(t=>{const e=t.value,n=t.parentElement,r=parseFloat(n.querySelector(".m-w-got").value)||0,l=parseFloat(n.querySelector(".m-w-max").value)||0,u=parseFloat(n.querySelector(".m-e-got").value)||0,s=parseFloat(n.querySelector(".m-e-max").value)||0;e&&(a[e]={wG:r,wM:l,eG:u,eM:s,sum:r+u,max:l+s},o+=r+u,p+=l+s)}),db.ref("students/"+t).set({name:e,year:n,subjects:a,totalGot:o,totalMax:p,percent:(o/p*100).toFixed(1)}).then(()=>alert("تم الحفظ"))}function fetchForEdit(){const t=document.getElementById("editID").value;db.ref("students/"+t).once("value",e=>{if(!e.exists())return alert("الطالب غير موجود");const n=e.val();document.getElementById("inName").value=n.name,document.getElementById("inID").value=t,document.getElementById("inYear").value=n.year;const a=document.getElementById("subjectsContainer");a.innerHTML="";for(let t in n.subjects){const e=n.subjects[t];addNewSubject({n:t,wg:e.wG,wm:e.wM,eg:e.eG,em:e.eM})}})}function deleteStudent(){const t=document.getElementById("inID").value;t&&confirm("هل أنت متأكد من الحذف النهائي؟")&&db.ref("students/"+t).remove().then(()=>location.reload())}function loadResult(){const t=document.getElementById("searchID").value;db.ref("students/"+t).once("value",t=>{t.exists()?showData(t.val()):alert("رقم القيد غير صحيح أو النتيجة لم ترفع بعد.")})}function showData(t){document.getElementById("searchSection").style.display="none",document.getElementById("resultView").style.display="block",document.getElementById("outName").innerText=t.name,document.getElementById("outYear").innerText="الصف: "+t.year;let e="",n=[],a=!1;for(let o in t.subjects){const p=t.subjects[o],r=p.sum<p.max/2;r&&(a=!0,n.push(o)),e+=`<tr><td>${o}</td><td>${p.wG}</td><td>${p.wM}</td><td>${p.eG}</td><td>${p.eM}</td><td style="color:${r?"red":"black"}; font-weight:bold;">${p.sum}</td></tr>`}document.getElementById("resTbody").innerHTML=e;const o=document.getElementById("outGrade"),p=document.getElementById("totalRow"),r=document.getElementById("percentRow"),l=document.getElementById("failMissions");if(a)o.innerText="له دور ثانٍ",o.className="grade-fail",p.style.display="none",r.style.display="none",l.style.display="block",document.getElementById("failListItems").innerText=n.join(" - ");else{p.style.display="flex",r.style.display="flex",l.style.display="none",document.getElementById("outTotalSum").innerText=t.totalGot+" من "+t.totalMax,document.getElementById("outPercent").innerText=t.percent+"%";const e=parseFloat(t.percent);e>=85?(o.innerText="ممتاز",o.className="grade-excellent"):e>=75?(o.innerText="جيد جداً",o.className="grade-vgood"):e>=65?(o.innerText="جيد",o.className="grade-good"):e>=50?(o.innerText="مقبول",o.className="grade-good"):(o.innerText="ضعيف",o.className="grade-fail")}}
</script>
</body>
</html>
