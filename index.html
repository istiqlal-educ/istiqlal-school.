<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة نتائج الطلاب</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background-color: #0056b3; }
        #result { margin-top: 20px; text-align: right; border-top: 2px solid #eee; padding-top: 15px; display: none; }
        .dev-panel { display: none; margin-top: 20px; padding: 15px; border: 1px dashed #28a745; border-radius: 10px; background: #f8fff9; }
    </style>
</head>
<body>

<div class="container">
    <h2>الاستعلام عن النتيجة 🔍</h2>
    <input type="text" id="searchInput" placeholder="أدخل الرقم الوطني أو الكود السري">
    <button onclick="handleAction()">دخول / بحث</button>

    <div id="devPanel" class="dev-panel">
        <h4>لوحة المطور 🛠️</h4>
        <p style="font-size: 12px; color: #666;">اختر ملف الإكسل (ورقة ١) لتحديث البيانات</p>
        <input type="file" id="excelFile" accept=".xlsx, .xls">
        <button onclick="uploadExcel()" style="background-color: #28a745;">بدء الرفع للمنظومة</button>
        <p id="uploadStatus" style="font-size: 13px; font-weight: bold;"></p>
    </div>

    <div id="result"></div>
</div>

<script>
    // إعدادات Firebase (تأكد من وضع بياناتك الحقيقية هنا)
    const firebaseConfig = {
        apiKey: "AIzaSy...", 
        authDomain: "your-project.firebaseapp.com",
        databaseURL: "https://your-project-default-rtdb.firebaseio.com/",
        projectId: "your-project",
        storageBucket: "your-project.appspot.com",
        messagingSenderId: "...",
        appId: "..."
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function handleAction() {
        const val = document.getElementById('searchInput').value.trim();
        
        if (val === "74742000") {
            document.getElementById('devPanel').style.display = "block";
            document.getElementById('result').style.display = "none";
            alert("مرحباً بك يا هندسة في لوحة المطور");
        } else if (val !== "") {
            searchStudent(val);
        } else {
            alert("الرجاء إدخال رقم صحيح");
        }
    }

    function searchStudent(id) {
        const resDiv = document.getElementById('result');
        db.ref('students/' + id).once('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                resDiv.style.display = "block";
                resDiv.innerHTML = `
                    <p><b>الاسم:</b> ${data.name}</p>
                    <p><b>السنة:</b> ${data.year}</p>
                    <hr>
                    <p><b>العربي:</b> ${data.arabic || 0}</p>
                    <p><b>الرياضيات:</b> ${data.math || 0}</p>
                `;
            } else {
                alert("عذراً، الرقم الوطني غير موجود");
                resDiv.style.display = "none";
            }
        });
    }

    // وظيفة رفع الإكسل - تعمل فقط داخل بوابة المطور
    async function uploadExcel() {
        const fileInput = document.getElementById('excelFile');
        const status = document.getElementById('uploadStatus');
        if (!fileInput.files[0]) { alert("اختار الملف أولاً!"); return; }

        status.innerText = "جاري معالجة البيانات... ⏳";
        const data = await fileInput.files[0].arrayBuffer();
        const workbook = XLSX.read(data);
        const sheet = workbook.Sheets[workbook.SheetNames[0]]; // يقرأ ورقة ١
        const rows = XLSX.utils.sheet_to_json(sheet);

        let count = 0;
        for (const row of rows) {
            // يعتمد على اسم العمود "الرقم_الوطني" في الإكسل
            if (row.الرقم_الوطني) {
                await db.ref('students/' + row.الرقم_الوطني).set({
                    name: row.الاسم,
                    year: row.السنة,
                    arabic: row.عربي_أعمال,
                    math: row.رياضيات_أعمال
                });
                count++;
            }
        }
        status.innerText = `تم بنجاح رفع (${count}) طالبة ✅`;
        status.style.color = "green";
    }
</script>

</body>
</html>
