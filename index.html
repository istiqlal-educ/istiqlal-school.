<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدرسة الاستقلال للتعليم الأساسي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --primary: #1e3a8a; --accent: #b45309; --success: #059669; --danger: #e11d48;
            --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --border: #cbd5e1;
        }

        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); padding: 5px; min-height: 100vh; }
        .container { max-width: 1100px; margin: 2px auto; position: relative; }
        
        #loadingOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8); z-index: 9999; justify-content: center; align-items: center; flex-direction: column;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .main-card { 
            background: var(--card); border-radius: 20px; padding: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid var(--border);
            position: relative; z-index: 1; width: 100%;
        }
        
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 10000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 350px;
            text-align: center;
        }

        .admin-tabs { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .tab-btn { flex: 1; min-width: 100px; padding: 10px; border-radius: 10px; border: none; background: #e2e8f0; font-weight: 700; cursor: pointer; color: #64748b; }
        .tab-btn.active { background: var(--primary); color: white; }

        .admin-section { display: none; }
        .admin-section.active { display: block; }

        input, select { width: 100%; padding: 8px; border-radius: 10px; border: 2px solid var(--border); background: #f8fafc; font-size: 13px; margin-bottom: 5px; text-align: center; font-weight: bold; }
        .btn { width: 100%; padding: 12px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 16px; }
        .btn-primary { background: var(--primary); color: white; }
        
        /* تصميم جدول الشهادة */
        .res-table { width: 100%; border-collapse: collapse; border: 2px solid #000; margin-top: 10px; }
        .res-table th { 
            background: #e2e8f0; color: #000; padding: 4px; font-size: 10px; border: 1.5px solid #000;
            line-height: 1.1; font-weight: 900;
        }
        .res-table td { padding: 4px; border: 1.5px solid #000; text-align: center; font-weight: 900; color: #000; font-size: 11px; }

        /* أسطر الرصد (نفس التوزيع الأصلي مع الخانات الجديدة) */
        .grid-header { display: grid; grid-template-columns: 1.5fr repeat(8, 1fr) 1fr; gap: 2px; font-size: 8.5px; font-weight: 900; text-align: center; color: var(--primary); margin-bottom: 5px; }
        .grid-inputs { display: grid; grid-template-columns: 1.5fr repeat(8, 1fr) 1fr; gap: 2px; margin-bottom: 3px; }

        .dev-footer-simple { text-align: center; margin-top: 20px; font-size: 12px; font-weight: 900; color: #94a3b8; }

        @media print {
            .btn, #searchSection input, .admin-tabs, .dev-footer-simple, .school-header button { display: none !important; }
            #resultView { display: block !important; width: 100%; }
        }
    </style>
</head>
<body>

<div id="loadingOverlay"><div class="spinner"></div></div>

<div class="container" id="searchSection">
    <div class="main-card">
        <div id="welcomeArea">
            <div class="school-header" style="text-align:center; margin-bottom:10px;">
                <div ondblclick="enterAdmin()"><img src="1000255629.jpg" style="width: 100px; border-radius: 12px;"></div>
                <h1 style="margin: 0; font-size: 20px; font-weight: 900; color: var(--primary);">مدرسة الاستقلال للتعليم الأساسي</h1>
            </div>
            <div style="max-width:400px; margin:0 auto;">
                <input type="number" id="searchID" placeholder="أدخل الرقم الوطني للطالبة...">
                <button class="btn btn-primary" onclick="loadResult()">استخراج النتيجة</button>
            </div>
        </div>

        <div id="resultView" style="display:none;">
            <div style="text-align: center; margin-bottom: 10px;">
                <h2 id="outName" style="margin:0;"></h2>
                <div id="outYear" style="font-weight:800;"></div>
            </div>
            
            <table class="res-table">
                <thead>
                    <tr>
                        <th rowspan="2">المادة</th>
                        <th colspan="2">الفترة الأولى</th>
                        <th colspan="2">الفترة الثانية</th>
                        <th rowspan="2">النهاية الصغرى</th>
                        <th rowspan="2">النهاية الكبرى</th>
                        <th rowspan="2">المجموع</th>
                        <th rowspan="2">النتيجة</th>
                    </tr>
                    <tr>
                        <th>أعمال</th>
                        <th>امتحان</th>
                        <th>أعمال</th>
                        <th>امتحان</th>
                    </tr>
                </thead>
                <tbody id="resTbody"></tbody>
            </table>

            <div style="margin-top:10px; border:2px solid #000; padding:10px; font-weight:900;">
                <div>المجموع الكلي: <span id="outTotalSum"></span></div>
                <div>النسبة: <span id="outPercent"></span></div>
                <div>التقدير: <span id="outGrade"></span></div>
            </div>
            
            <button class="btn btn-primary" style="margin-top:10px;" onclick="window.print()">طباعة</button>
            <button class="btn" style="margin-top:5px; background:#ccc;" onclick="location.reload()">عودة</button>
        </div>
        <div class="dev-footer-simple">تم تطويره بواسطة عماد الدين نجم</div>
    </div>
</div>

<!-- بوابة المطور -->
<div id="adminModal" class="modal-overlay">
    <div class="modal-content">
        <h3>بوابة المطور</h3>
        <input type="password" id="devPassInput" placeholder="الرمز السري">
        <button class="btn btn-primary" onclick="checkDevPass()">دخول</button>
    </div>
</div>

<div class="container" id="adminPortal" style="display:none;">
    <div class="main-card">
        <div class="admin-tabs">
            <button class="tab-btn active" onclick="showTab('individualTab', this)">الرصد الفردي</button>
        </div>

        <div id="individualTab" class="admin-section active">
            <input type="number" id="newStudentID" placeholder="الرقم الوطني">
            <input type="text" id="inName" placeholder="الاسم الرباعي">
            <select id="inYear" onchange="autoFillSubjects()">
                <option value="">-- الصف --</option>
                <option value="خامس">خامس</option>
                <option value="سادس">سادس</option>
                <option value="سابع">سابع</option>
                <option value="ثامن">ثامن</option>
            </select>

            <!-- هيدر الأسطر كما طلبت -->
            <div class="grid-header">
                <span>المادة</span>
                <span>أ1</span><span>من</span>
                <span>إ1</span><span>من</span>
                <span>أ2</span><span>من</span>
                <span>إ2</span><span>من</span>
                <span>المجموع</span>
            </div>
            <div id="subjectsContainer"></div>
            
            <button class="btn btn-primary" style="margin-top:15px;" onclick="saveToFirebase()">حفظ ورصد الدرجات</button>
        </div>
        <button onclick="location.reload()" class="btn" style="background:none; color:red;">خروج</button>
    </div>
</div>

<script>
    // تهيئة Firebase (استخدم نفس بياناتك السابقة)
    const firebaseConfig = {
      apiKey: "AIzaSyDKEPjQMKD2lt74sdGM0k796icnyFTmmIQ",
      authDomain: "istiqlal-school-302c8.firebaseapp.com",
      databaseURL: "https://istiqlal-school-302c8-default-rtdb.firebaseio.com",
      projectId: "istiqlal-school-302c8",
      storageBucket: "istiqlal-school-302c8.firebasestorage.app",
      messagingSenderId: "1037263844752",
      appId: "1:1037263844752:web:56dc0badd84262b5e3ef15"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const schoolSubjects = {
        "خامس": ["التربية الإسلامية", "الحاسوب", "الرياضيات", "العلوم", "اللغة الإنجليزية", "الاجتماعيات", "اللغة العربية"],
        "سادس": ["التربية الإسلامية", "الحاسوب", "الرياضيات", "العلوم", "اللغة الإنجليزية", "الاجتماعيات", "اللغة العربية"],
        "سابع": ["التاريخ", "التربية الإسلامية", "الجغرافيا", "الحاسوب", "الرياضيات", "العلوم", "اللغة الإنجليزية", "اللغة العربية"],
        "ثامن": ["التاريخ", "التربية الإسلامية", "الجغرافيا", "الحاسوب", "الرياضيات", "العلوم", "اللغة الإنجليزية", "اللغة العربية"]
    };

    function enterAdmin() { document.getElementById('adminModal').style.display='flex'; }
    
    function checkDevPass() {
        const p = document.getElementById('devPassInput').value;
        db.ref('settings/dev_pass').once('value', snap => {
            if(p === snap.val()) {
                document.getElementById('adminModal').style.display='none';
                document.getElementById('searchSection').style.display='none';
                document.getElementById('adminPortal').style.display='block';
            } else alert("خطأ!");
        });
    }

    function autoFillSubjects() {
        const yr = document.getElementById('inYear').value;
        const con = document.getElementById('subjectsContainer'); con.innerHTML = "";
        if(schoolSubjects[yr]) schoolSubjects[yr].forEach(s => {
            con.innerHTML += `
            <div class="grid-inputs" data-sub="${s}">
                <input type="text" value="${s}" readonly style="font-size:10px;">
                <input type="number" class="wG1" placeholder="0"> <input type="number" class="wM1" value="20">
                <input type="number" class="eG1" placeholder="0"> <input type="number" class="eM1" value="30">
                <input type="number" class="wG2" placeholder="0"> <input type="number" class="wM2" value="20">
                <input type="number" class="eG2" placeholder="0"> <input type="number" class="eM2" value="30">
                <input type="number" class="rowTotal" readonly placeholder="100">
            </div>`;
        });
    }

    function saveToFirebase() {
        const id = document.getElementById('newStudentID').value;
        const name = document.getElementById('inName').value;
        const yr = document.getElementById('inYear').value;
        if(!id || !name || !yr) return alert("أكمل البيانات");

        let subs = {}; let totalG = 0; let totalM = 0;
        document.querySelectorAll('.grid-inputs').forEach(g => {
            const n = g.getAttribute('data-sub');
            const wg1 = parseFloat(g.querySelector('.wG1').value)||0; const wm1 = parseFloat(g.querySelector('.wM1').value)||0;
            const eg1 = parseFloat(g.querySelector('.eG1').value)||0; const em1 = parseFloat(g.querySelector('.eM1').value)||0;
            const wg2 = parseFloat(g.querySelector('.wG2').value)||0; const wm2 = parseFloat(g.querySelector('.wM2').value)||0;
            const eg2 = parseFloat(g.querySelector('.eG2').value)||0; const em2 = parseFloat(g.querySelector('.eM2').value)||0;
            
            const sum = wg1 + eg1 + wg2 + eg2;
            const max = wm1 + em1 + wm2 + em2;
            
            subs[n] = {wg1, wm1, eg1, em1, wg2, wm2, eg2, em2, sum, max};
            totalG += sum; totalM += max;
        });

        db.ref('students/'+id).set({
            name, year:yr, subjects:subs, totalGot:totalG, totalMax:totalM, 
            percent:((totalG/totalM)*100).toFixed(1)
        }).then(()=>alert("تم الرصد بنجاح"));
    }

    function loadResult() {
        const id = document.getElementById('searchID').value;
        if(!id) return;
        document.getElementById('loadingOverlay').style.display='flex';
        db.ref('students/'+id).once('value', snap => {
            document.getElementById('loadingOverlay').style.display='none';
            if(snap.exists()) showData(snap.val()); else alert("غير موجود");
        });
    }

    function showData(d) {
        document.getElementById('welcomeArea').style.display='none';
        document.getElementById('resultView').style.display='block';
        document.getElementById('outName').innerText = d.name;
        document.getElementById('outYear').innerText = d.year;
        
        let h = "";
        for(let k in d.subjects) {
            const s = d.subjects[k];
            h += `<tr>
                <td>${k}</td>
                <td>${s.wg1}</td><td>${s.eg1}</td>
                <td>${s.wg2}</td><td>${s.eg2}</td>
                <td>${s.max/2}</td><td>${s.max}</td>
                <td>${s.sum}</td><td>${s.sum >= (s.max/2)?'ناجحة':'دور ثان'}</td>
            </tr>`;
        }
        document.getElementById('resTbody').innerHTML = h;
        document.getElementById('outTotalSum').innerText = d.totalGot + " / " + d.totalMax;
        document.getElementById('outPercent').innerText = d.percent + "%";
        
        const p = parseFloat(d.percent);
        document.getElementById('outGrade').innerText = p>=85?"ممتاز":p>=75?"جيد جداً":p>=65?"جيد":"مقبول";
        if(p >= 50) confetti({ particleCount: 100 });
    }
</script>
</body>
</html>
