<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة نتائج الامتحانات - مدرسة الاستقلال</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --primary: #1e3a8a;
            --accent: #b45309;
            --success: #059669;
            --danger: #e11d48;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #1e293b;
            --border: #cbd5e1;
        }

        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); padding: 10px; min-height: 100vh; }
        .container { max-width: 1000px; margin: 10px auto; position: relative; }
        
        #loadingOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8); z-index: 9999; justify-content: center; align-items: center;
        }
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .main-card { 
            background: var(--card); border-radius: 20px; padding: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid var(--border);
            text-align: center;
        }
        
        /* تنسيق الصورة لضمان الظهور */
        .school-logo-main {
            width: 180px;
            height: auto;
            margin: 0 auto 15px auto;
            display: block;
            cursor: pointer;
        }

        .search-container { max-width: 450px; margin: 20px auto; }
        input { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid var(--border); text-align: center; margin-bottom: 15px; }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 17px; }
        .btn-primary { background: var(--primary); color: white; }

        #resultView { display: none; margin-top: 25px; }
        .res-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .res-table th { background: var(--primary); color: white; padding: 10px; font-size: 12px; }
        .res-table td { padding: 12px; border: 1px solid #e2e8f0; text-align: center; font-weight: 800; }

        .summary-box { background: #f8fafc; border: 2px solid var(--primary); border-radius: 12px; margin-top: 20px; padding: 15px; }
        .dev-footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid #e2e8f0; font-weight: 700; }

        @media print {
            .btn, .search-container, #adminPortal, .dev-footer { display: none !important; }
            #resultView { display: block !important; }
        }
    </style>
</head>
<body>

<div id="loadingOverlay"><div class="spinner"></div></div>

<div class="container" id="searchSection">
    <div class="main-card">
        <div id="welcomeArea">
            <img src="https://i.ibb.co/L637WMT/1000255595.jpg" alt="شعار مدرسة الاستقلال" class="school-logo-main" ondblclick="enterAdmin()">
            <h1 style="margin: 0; font-size: 24px; font-weight: 900; color: var(--primary);">مدرسة الإستقلال للتعليم الأساسي</h1>
            <p style="color: #64748b; font-weight: 700; font-size: 14px;">Al-Istiklal School For Basic Education</p>

            <div class="search-container">
                <p style="font-weight: 800; color: var(--danger);">بالتوفيق لجميع طالباتنا</p>
                <input type="number" id="searchID" placeholder="أدخل الرقم الوطني هنا...">
                <button class="btn btn-primary" onclick="loadResult()"><i class="fas fa-search"></i> استخراج النتيجة</button>
            </div>
        </div>

        <div id="resultView">
            <h2 id="outName"></h2>
            <div id="outYear" style="color: var(--accent); font-weight: 900; margin-bottom: 20px;"></div>
            <table class="res-table"><tbody id="resTbody"></tbody></table>
            <div class="summary-box" id="summaryArea"></div>
            <button class="btn" style="background: #e2e8f0; margin-top: 20px;" onclick="location.reload()">بحث جديد</button>
        </div>

        <div class="dev-footer">تم تطويره بواسطة عماد الدين نجم</div>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyDKEPjQMKD2lt74sdGM0k7hY2Wb8E-X55g", 
      databaseURL: "https://istiqlal-school-302c8-default-rtdb.firebaseio.com",
      projectId: "istiqlal-school-302c8",
      appId: "1:1037263844752:web:56dc0ba0d346045610a514"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function loadResult() {
        const sid = document.getElementById('searchID').value;
        if(!sid) return;
        document.getElementById('loadingOverlay').style.display = 'flex';
        db.ref('students/' + sid).once('value', snap => {
            document.getElementById('loadingOverlay').style.display = 'none';
            if(snap.exists()) showData(snap.val());
            else alert("الرقم غير مسجل.");
        });
    }

    function showData(data) {
        document.getElementById('welcomeArea').style.display = 'none';
        document.getElementById('resultView').style.display = 'block';
        document.getElementById('outName').innerText = data.name;
        document.getElementById('outYear').innerText = "الصف: " + data.year;
        // ... (بقية منطق عرض البيانات كما هو في كودك الأصلي)
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
    }

    function enterAdmin() {
        const pass = prompt("رمز المطور:");
        db.ref('settings/dev_pass').once('value', snap => {
            if(pass === String(snap.val())) alert("مرحباً عماد");
        });
    }
</script>
</body>
</html>
