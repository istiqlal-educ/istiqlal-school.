<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>مدرسة الاستقلال - الشهادة الإلكترونية</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --primary: #1e3a8a;
            --accent: #b45309;
            --text: #000;
            --border: #000;
        }

        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { margin: 0; background: #f1f5f9; color: var(--text); padding: 5px; }
        
        .container { max-width: 800px; margin: 0 auto; }
        
        .main-card { 
            background: #fff; border-radius: 12px; padding: 15px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%;
        }

        /* تنسيق الجدول ليكون مريحاً ومنظماً */
        .res-table { width: 100%; border-collapse: collapse; border: 2px solid #000; margin-bottom: 10px; }
        .res-table th { 
            background: #f8fafc; padding: 4px 2px; font-size: 10px; border: 1px solid #000;
            vertical-align: middle; font-weight: 900;
        }
        .res-table td { padding: 6px 2px; border: 1px solid #000; text-align: center; font-weight: 800; font-size: 13px; }

        /* تدوير النصوص المطلوبة */
        .rotate-text { 
            writing-mode: vertical-rl; transform: rotate(180deg); 
            white-space: nowrap; font-size: 10px; padding: 5px 0;
        }

        .summary-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;
        }

        .box { border: 2px solid #000; padding: 10px; border-radius: 8px; }

        .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: 900; cursor: pointer; font-size: 15px; margin-top: 10px; }
        .btn-primary { background: var(--primary); color: white; }

        @media (max-width: 600px) {
            .res-table td { font-size: 12px; padding: 5px 1px; }
            .res-table th { font-size: 9px; }
            .main-card { padding: 10px; }
        }

        @media print {
            .no-print { display: none !important; }
            body { padding: 0; }
            .main-card { box-shadow: none; border: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="main-card">
        <!-- البحث -->
        <div id="searchArea" style="text-align:center;">
            <img src="1000255629.jpg" style="width: 70px; border-radius: 10px; margin-bottom: 5px;">
            <h2 style="font-size: 18px; margin: 5px 0;">مدرسة الاستقلال للتعليم الأساسي</h2>
            <input type="number" id="searchID" placeholder="أدخل الرقم الوطني للطالبة" style="width:100%; padding:12px; border:2px solid #ccc; border-radius:8px; text-align:center; font-size:16px;">
            <button class="btn btn-primary" onclick="loadResult()">عرض النتيجة</button>
        </div>

        <!-- الشهادة -->
        <div id="resultView" style="display:none; margin-top: 10px;">
            <div style="text-align:center; border-bottom: 2px solid #000; margin-bottom: 10px; padding-bottom: 5px;">
                <h3 id="outName" style="margin:0; font-size: 18px;"></h3>
                <p id="outYear" style="margin:0; font-weight: 700; color: var(--accent);"></p>
            </div>

            <table class="res-table">
                <thead>
                    <tr>
                        <th rowspan="3" style="width:20%">المواد</th>
                        <th colspan="4">أعمال السنة والامتحانات</th>
                        <th colspan="2">النهائيات</th>
                        <th rowspan="3" style="width:8%"><div class="rotate-text">مجموع الفصلين</div></th>
                        <th colspan="2">الدور الثاني</th>
                    </tr>
                    <tr>
                        <th rowspan="2">البيان</th>
                        <th rowspan="2">المقررة</th>
                        <th colspan="2">درجة الطالبة</th>
                        <th rowspan="2">الكبرى</th>
                        <th rowspan="2">الصغرى</th>
                        <th rowspan="2" style="width:8%"><div class="rotate-text">امتحان 40%</div></th>
                        <th rowspan="2" style="width:8%"><div class="rotate-text">النتيجة النهائية</div></th>
                    </tr>
                    <tr>
                        <th>ف1</th>
                        <th>ف2</th>
                    </tr>
                </thead>
                <tbody id="resBody"></tbody>
            </table>

            <div id="summarySection" class="summary-grid">
                <div class="box" id="resultsBox">
                    <div style="display:flex; justify-content:space-between;"><span>المجموع:</span> <span id="finalTotal"></span></div>
                    <div style="display:flex; justify-content:space-between;"><span>النسبة:</span> <span id="finalPercent" style="color:var(--primary)"></span></div>
                    <div style="display:flex; justify-content:space-between;"><span>التقدير:</span> <span id="finalGrade"></span></div>
                </div>
                <div class="box" style="background:#fffbeb; display:flex; align-items:center; justify-content:center; text-align:center;">
                    <p id="motivationalMsg" style="margin:0; font-size: 12px; font-weight: 700; color: var(--accent);"></p>
                </div>
            </div>

            <div id="failPanel" style="display:none; background:#fee2e2; border:2px solid red; padding:10px; border-radius:8px; margin-top:10px; text-align:center;">
                <p style="margin:0; font-weight:900; color:red;">مواد الدور الثاني: <span id="failList" style="color:#000;"></span></p>
            </div>

            <div class="no-print">
                <button class="btn btn-primary" onclick="window.print()">طباعة الشهادة</button>
                <button class="btn" style="background:#64748b; color:white;" onclick="location.reload()">بحث جديد</button>
            </div>
        </div>
    </div>
</div>

<script>
    // الإعدادات ثابتة كما هي
    const firebaseConfig = {
      apiKey: "AIzaSyDKEPjQMKD2lt74sdGM0k796icnyFTmmIQ",
      databaseURL: "https://istiqlal-school-302c8-default-rtdb.firebaseio.com",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function loadResult() {
        const id = document.getElementById('searchID').value;
        if(!id) return;
        db.ref('students/'+id).once('value', snap => {
            if(snap.exists()) render(snap.val());
            else alert("الرقم غير موجود");
        });
    }

    function render(data) {
        document.getElementById('searchArea').style.display='none';
        document.getElementById('resultView').style.display='block';
        document.getElementById('outName').innerText = data.name;
        document.getElementById('outYear').innerText = "الصف: " + data.year;

        let html = ""; let hasFail = false; let fails = [];
        for(let sName in data.subjects) {
            let s = data.subjects[sName];
            let total = s.wG + s.eG;
            let pass = s.max / 2;
            if(total < pass) { hasFail = true; fails.push(sName); }

            html += `
            <tr>
                <td rowspan="2">${sName}</td>
                <td style="font-size:10px">أعمال</td><td>${s.wM}</td><td>${s.wG}</td><td>-</td>
                <td rowspan="2">${s.max}</td><td rowspan="2">${pass}</td>
                <td rowspan="2" style="background:#f1f5f9;">${total}</td>
                <td rowspan="2"></td><td rowspan="2"></td>
            </tr>
            <tr>
                <td style="font-size:10px">امتحان</td><td>${s.eM}</td><td>${s.eG}</td><td>-</td>
            </tr>`;
        }
        document.getElementById('resBody').innerHTML = html;

        if(hasFail) {
            document.getElementById('resultsBox').style.display = "none";
            document.getElementById('failPanel').style.display = "block";
            document.getElementById('failList').innerText = fails.join(' - ');
            document.getElementById('motivationalMsg').innerText = "شدي حيلك في الدور الثاني ونحن معاكِ.. بالتوفيق يا بطلة. ❤️";
        } else {
            document.getElementById('resultsBox').style.display = "block";
            document.getElementById('failPanel').style.display = "none";
            document.getElementById('finalTotal').innerText = data.totalGot + " / " + data.totalMax;
            document.getElementById('finalPercent').innerText = data.percent + "%";
            document.getElementById('finalGrade').innerText = getGrade(parseFloat(data.percent));
            document.getElementById('motivationalMsg').innerText = "مبروك النجاح! مدرسة الاستقلال تفتخر بكِ دائماً. ✨";
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }
    }

    function getGrade(p) {
        if(p >= 85) return "ممتاز";
        if(p >= 75) return "جيد جداً";
        if(p >= 65) return "جيد";
        return "مقبول";
    }
</script>
</body>
</html>
